<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Înregistrare – ECHO</title>
<link rel="stylesheet" href="css/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-brand">
    <span class="nav-domain">englishgrammarchallenge.ro</span>
    <span class="nav-title">ECHO</span>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Acasă</a>
    <a href="news.html" class="nav-link">Noutăți</a>
    <a href="simulari.html" class="nav-link">Simulări</a>
    <a href="register.html" class="nav-link active">Înregistrare</a>
    <a href="dashboard.html" class="nav-link">Dashboard</a>
  </div>
</nav>

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const COUNTIES = ["Alba","Arad","Argeș","Bacău","Bihor","Bistrița-Năsăud","Botoșani","Brăila","Brașov","București","Buzău","Călărași","Caraș-Severin","Cluj","Constanța","Covasna","Dâmbovița","Dolj","Galați","Giurgiu","Gorj","Harghita","Hunedoara","Ialomița","Iași","Ilfov","Maramureș","Mehedinți","Mureș","Neamț","Olt","Prahova","Sălaj","Satu Mare","Sibiu","Suceava","Teleorman","Timiș","Tulcea","Vâlcea","Vaslui","Vrancea"];
const LEVELS  = [{v:"A2",l:"A2 – Elementar"},{v:"B1",l:"B1 – Intermediar"},{v:"B2",l:"B2 – Avansat"},{v:"C1",l:"C1 – Performanță"},{v:"FCE",l:"FCE – First Certificate"},{v:"CAE",l:"CAE – Certificate in Advanced English"}];
const BLOCKED = /[<>"'&;\\{}[\]/]/;
const USERNAME_RE = /^[a-zA-Z0-9_.%-]+$/;

function validateStep1(f) {
  const e = {}, c = s => (s||"").trim();
  if(!c(f.name))         e.name    = "Numele este obligatoriu.";
  else if(c(f.name).length < 4)    e.name    = "Introduceți numele complet (minim 4 caractere).";
  else if(BLOCKED.test(f.name))    e.name    = "Caractere speciale nepermise.";
  if(!c(f.school))       e.school  = "Școala este obligatorie.";
  else if(BLOCKED.test(f.school))  e.school  = "Caractere speciale nepermise.";
  if(!f.county)          e.county  = "Selectați județul.";
  if(!c(f.teacher))      e.teacher = "Profesorul coordonator este obligatoriu.";
  else if(BLOCKED.test(f.teacher)) e.teacher = "Caractere speciale nepermise.";
  if(!f.level)           e.level   = "Selectați nivelul.";
  if(f.grade && BLOCKED.test(f.grade)) e.grade = "Caractere speciale nepermise.";
  return e;
}

function validateStep2(f) {
  const e = {}, c = s => (s||"").trim();
  if(!c(f.username))          e.username = "Username-ul este obligatoriu.";
  else if(c(f.username).length < 3)  e.username = "Minim 3 caractere.";
  else if(c(f.username).length > 20) e.username = "Maxim 20 de caractere.";
  else if(!USERNAME_RE.test(f.username)) e.username = "Doar litere, cifre, '.', '_', '%', '-'.";
  if(!f.password)             e.password = "Parola este obligatorie.";
  else if(f.password.length < 6)    e.password = "Minim 6 caractere.";
  if(!c(f.email))             e.email    = "Email-ul este obligatoriu.";
  else if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(f.email.trim())) e.email = "Format email invalid.";
  return e;
}

function FG({label, req, hint, err, children}) {
  return (
    <div className="fg">
      <label>{label}{req && <span className="req">*</span>}</label>
      {children}
      {err  && <div className="ferr">{err}</div>}
      {hint && !err && <div className="fhint">{hint}</div>}
    </div>
  );
}

const LVLBG = {A2:{background:"#dcfce7",color:"#15803d"},B1:{background:"#fef3c7",color:"#b45309"},
  B2:{background:"#f3e8ff",color:"#7c3aed"},C1:{background:"#dbeafe",color:"#1d4ed8"},
  FCE:{background:"#fef9c3",color:"#854d0e"},CAE:{background:"#e0e7ff",color:"#3730a3"}};

// Left branding panel — shared across success / form states
function LeftPanel() {
  return (
    <div style={{flex:"0 0 42%",background:"linear-gradient(150deg,#0f0524 0%,#2d1068 60%,#1e1b4b 100%)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      padding:"60px 44px",position:"relative",overflow:"hidden",minHeight:"100vh"}}>
      <div style={{position:"absolute",top:-100,right:-100,width:360,height:360,borderRadius:"50%",
        background:"rgba(124,58,237,.15)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",bottom:-60,left:-60,width:240,height:240,borderRadius:"50%",
        background:"rgba(167,139,250,.1)",pointerEvents:"none"}}/>
      <div style={{position:"relative",zIndex:1,textAlign:"center",maxWidth:300}}>
        <div style={{width:64,height:64,borderRadius:20,background:"linear-gradient(135deg,#a78bfa,#7c3aed)",
          display:"inline-flex",alignItems:"center",justifyContent:"center",
          color:"#fff",fontWeight:800,fontSize:26,marginBottom:28,
          boxShadow:"0 8px 32px rgba(124,58,237,.45)"}}>E</div>
        <div style={{fontSize:10,color:"rgba(196,181,253,.6)",letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>englishgrammarchallenge.ro</div>
        <div style={{fontSize:26,fontWeight:800,color:"#fff",lineHeight:1.25,marginBottom:6,letterSpacing:"-.3px"}}>
          English Grammar<br/>Challenge
        </div>
        <div style={{fontSize:12,color:"rgba(196,181,253,.6)",marginBottom:28}}>Prahova County 2026 · Ediția I</div>
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:28}}>
          {["B1","B2","C1"].map(l=>(
            <span key={l} style={{...LVLBG[l],borderRadius:5,padding:"3px 10px",fontSize:11,fontWeight:700}}>{l}</span>
          ))}
        </div>
        <div style={{textAlign:"left",borderTop:"1px solid rgba(255,255,255,.1)",paddingTop:20}}>
          {[
            ["📅","Înscrieri","1–15 Martie 2026"],
            ["🖥️","Calificare online","20–25 Martie 2026"],
            ["🏫","Finală județeană","18 Aprilie 2026"],
            ["🎓","Participare","Complet gratuită"],
          ].map(([icon,label,val])=>(
            <div key={label} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:12}}>
              <span style={{fontSize:15,flexShrink:0}}>{icon}</span>
              <div>
                <div style={{fontSize:10,color:"rgba(196,181,253,.5)",fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>{label}</div>
                <div style={{fontSize:13,color:"rgba(255,255,255,.85)",fontWeight:600}}>{val}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function RegisterApp() {
  CPEEN.seedInitialData();
  const cfg = CPEEN.getConfig();

  const [step, setStep] = useState(1);
  const [f,  setF]  = useState({name:"",school:"",county:"",teacher:"",level:"",grade:"",username:"",password:"",email:""});
  const [e,  setE]  = useState({});
  const [sub, setSub] = useState(null);
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const set = (k, v) => { setF(p=>({...p,[k]:v})); setE(p=>({...p,[k]:""})); setErr(""); };

  const goNext = () => {
    const errs = validateStep1(f);
    if(Object.keys(errs).length) { setE(errs); return; }
    setStep(2); setE({});
  };

  const goBack = () => { setStep(1); setE({}); setErr(""); };

  const submit = () => {
    const errs = validateStep2(f);
    if(Object.keys(errs).length) { setE(errs); return; }
    if(CPEEN.findParticipantByUsername(f.username)) {
      setE(p=>({...p, username:"Acest username este deja folosit."})); return;
    }
    if(cfg.maxPerSchoolPerLevel > 0) {
      const dupes = CPEEN.getParticipants().filter(p =>
        p.school.trim().toLowerCase() === f.school.trim().toLowerCase() && p.level === f.level
      );
      if(dupes.length >= cfg.maxPerSchoolPerLevel) {
        setErr(`Limita de ${cfg.maxPerSchoolPerLevel} participanți per școală per nivel a fost atinsă.`);
        return;
      }
    }
    setBusy(true);
    CPEEN.hashPass(f.password).then(hash => {
      const p = CPEEN.addParticipant({
        name: f.name.trim(), school: f.school.trim(), county: f.county,
        teacher: f.teacher.trim(), level: f.level,
        email: f.email.trim().toLowerCase(), grade: f.grade.trim(),
        username: f.username.trim().toLowerCase(),
        passwordHash: hash
      });
      setSub(p);
      setBusy(false);
    });
  };

  const inp = (k, type="text", ph="") => (
    <input type={type} style={{
      width:"100%",border:`1px solid ${e[k]?"#fca5a5":"#e2e8f0"}`,borderRadius:8,
      padding:"10px 13px",fontSize:14,outline:"none",background:"#fff",color:"#0f172a",fontFamily:"inherit"
    }} value={f[k]} placeholder={ph} onChange={ev=>set(k,ev.target.value)}
    onFocus={ev=>{ if(!e[k]) ev.target.style.borderColor="#7c3aed"; ev.target.style.boxShadow="0 0 0 3px rgba(124,58,237,.12)"; }}
    onBlur={ev=>{ ev.target.style.borderColor=e[k]?"#fca5a5":"#e2e8f0"; ev.target.style.boxShadow="none"; }}/>
  );
  const sel = (k, opts, ph) => (
    <select style={{
      width:"100%",border:`1px solid ${e[k]?"#fca5a5":"#e2e8f0"}`,borderRadius:8,
      padding:"10px 13px",fontSize:14,outline:"none",background:"#fff",color:f[k]?"#0f172a":"#94a3b8",fontFamily:"inherit"
    }} value={f[k]} onChange={ev=>set(k,ev.target.value)}>
      <option value="">{ph}</option>
      {opts.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}
    </select>
  );

  const btnStyle = (disabled) => ({
    width:"100%",padding:"12px",borderRadius:9,border:"none",
    background:disabled?"#a78bfa":"#7c3aed",color:"#fff",fontSize:15,fontWeight:700,
    cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",marginTop:8,
    boxShadow:"0 4px 14px rgba(124,58,237,.3)"
  });

  const lbl = (text, req) => (
    <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:5}}>
      {text}{req && <span style={{color:"#dc2626",marginLeft:2}}>*</span>}
    </label>
  );
  const ferr = (k) => e[k] ? <div style={{color:"#dc2626",fontSize:12,marginTop:4}}>{e[k]}</div> : null;
  const fhint = (hint, k) => (!e[k] && hint) ? <div style={{color:"#64748b",fontSize:12,marginTop:4}}>{hint}</div> : null;
  const fg = (children) => <div style={{marginBottom:14}}>{children}</div>;

  // ── Success screen ──────────────────────────────────────────────────────
  if(sub) return (
    <div style={{minHeight:"100vh",display:"flex",background:"#f5f5f7"}}>
      <LeftPanel/>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 32px"}}>
        <div style={{width:"100%",maxWidth:400,textAlign:"center"}}>
          <div style={{fontSize:56,marginBottom:16}}>✅</div>
          <div style={{fontSize:24,fontWeight:800,color:"#0f172a",marginBottom:6}}>Cont creat cu succes!</div>
          <div style={{fontSize:14,color:"#64748b",marginBottom:24}}>Bine ai venit la ECHO, {sub.name.split(" ")[0]}!</div>
          <div style={{background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",padding:22,textAlign:"left",marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#94a3b8",marginBottom:12}}>Detalii cont</div>
            <div style={{fontSize:14,fontWeight:700,color:"#0f172a",marginBottom:4}}>{sub.name}</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:12}}>{sub.school} · {sub.county}{sub.grade?` · ${sub.grade}`:""}</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{...LVLBG[sub.level],borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700}}>{sub.level}</span>
            </div>
            <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #f1f5f9"}}>
              <div style={{fontSize:11,color:"#94a3b8",fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>Username tău</div>
              <div style={{fontFamily:"monospace",fontSize:18,fontWeight:800,color:"#7c3aed",letterSpacing:1}}>@{sub.username}</div>
            </div>
          </div>
          <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:9,padding:"11px 14px",fontSize:13,color:"#92400e",marginBottom:20,textAlign:"left"}}>
            Reține username-ul și parola — vei avea nevoie de ele pentru a accesa examenul.
          </div>
          <a href="dashboard.html" style={{display:"block",padding:"13px",borderRadius:9,background:"#7c3aed",
            color:"#fff",fontWeight:700,fontSize:15,textDecoration:"none",
            boxShadow:"0 4px 14px rgba(124,58,237,.3)",marginBottom:10}}>
            Mergi la dashboard →
          </a>
          <a href="index.html" style={{display:"block",fontSize:13,color:"#94a3b8",textDecoration:"none",marginTop:8}}>← Pagina principală</a>
        </div>
      </div>
    </div>
  );

  // ── Registrations closed ────────────────────────────────────────────────
  if(cfg.registrationsOpen === false) return (
    <div style={{minHeight:"100vh",display:"flex",background:"#f5f5f7"}}>
      <LeftPanel/>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 32px"}}>
        <div style={{width:"100%",maxWidth:400,textAlign:"center"}}>
          <div style={{fontSize:52,marginBottom:16}}>🔒</div>
          <div style={{fontSize:24,fontWeight:800,color:"#0f172a",marginBottom:8}}>Înregistrarea este închisă</div>
          <div style={{fontSize:14,color:"#64748b",marginBottom:28,lineHeight:1.7}}>
            Perioada de înscriere pentru English Grammar Challenge – Prahova County 2026 s-a încheiat. Urmărește pagina de noutăți pentru informații despre ediția viitoare.
          </div>
          <a href="news.html" style={{display:"block",padding:"12px",borderRadius:9,background:"#7c3aed",
            color:"#fff",fontWeight:700,fontSize:14,textDecoration:"none",marginBottom:10}}>
            Noutăți →
          </a>
          <a href="dashboard.html" style={{display:"block",padding:"12px",borderRadius:9,
            border:"1px solid #e2e8f0",color:"#64748b",fontSize:14,fontWeight:600,textDecoration:"none",
            background:"#fff"}}>
            Am deja cont — Dashboard →
          </a>
          <a href="index.html" style={{display:"block",fontSize:13,color:"#94a3b8",textDecoration:"none",marginTop:16}}>← Pagina principală</a>
        </div>
      </div>
    </div>
  );

  // ── Registration form ───────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",display:"flex",background:"#f5f5f7"}}>
      <LeftPanel/>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 32px",overflowY:"auto"}}>
        <div style={{width:"100%",maxWidth:420}}>
          {/* Progress */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:24}}>
            {[1,2].map(n=>(
              <React.Fragment key={n}>
                <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:12,fontWeight:700,flexShrink:0,
                  background:step>=n?"#7c3aed":"#e2e8f0",color:step>=n?"#fff":"#94a3b8"}}>
                  {step>n?"✓":n}
                </div>
                <div style={{fontSize:12,fontWeight:600,color:step===n?"#0f172a":"#94a3b8",flex:n===1?1:0}}>
                  {n===1?"Informații personale":"Date cont"}
                </div>
                {n===1 && <div style={{height:1,flex:1,background:step>1?"#7c3aed":"#e2e8f0"}}/>}
              </React.Fragment>
            ))}
          </div>

          <div style={{marginBottom:22}}>
            <div style={{fontSize:22,fontWeight:800,color:"#0f172a",letterSpacing:"-.3px",marginBottom:4}}>
              {step===1?"Informații personale":"Creează contul tău"}
            </div>
            <div style={{fontSize:13,color:"#64748b"}}>
              {step===1?"Completați datele participantului și ale școlii.":"Alege username-ul și parola pentru platforma ECHO."}
            </div>
          </div>

          {err && <div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:"11px 14px",marginBottom:14,fontSize:13,color:"#991b1b"}}>{err}</div>}

          {step === 1 && <>
            {fg(<>{lbl("Numele și prenumele",true)}{inp("name","text","ex: Ionescu Maria")}{ferr("name")}</>)}
            {fg(<>{lbl("Școala",true)}{inp("school","text","ex: CN Mihai Viteazul Ploiești")}{ferr("school")}</>)}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {fg(<>{lbl("Județul",true)}{sel("county",COUNTIES,"Selectează județul")}{ferr("county")}</>)}
              {fg(<>{lbl("Clasa")}{inp("grade","text","ex: X A")}{fhint("opțional","grade")}</>)}
            </div>
            {fg(<>{lbl("Profesor coordonator",true)}{inp("teacher","text","ex: Prof. Popescu Ion")}{ferr("teacher")}</>)}
            {fg(<>{lbl("Nivel Cambridge",true)}{sel("level",LEVELS,"Selectează nivelul")}{ferr("level")}</>)}
            <button style={btnStyle(false)} onClick={goNext}>Pasul următor →</button>
            <div style={{textAlign:"center",marginTop:16,fontSize:13,color:"#64748b"}}>
              Am deja cont —{" "}
              <a href="dashboard.html" style={{color:"#7c3aed",fontWeight:600,textDecoration:"none"}}>Dashboard →</a>
            </div>
          </>}

          {step === 2 && <>
            {fg(<>{lbl("Username",true)}{inp("username","text","ex: ionescu.maria")}{ferr("username")}{fhint("3–20 caractere: litere, cifre, '.', '_', '-'","username")}</>)}
            {fg(<>{lbl("Parolă",true)}{inp("password","password","••••••")}{ferr("password")}{fhint("Minim 6 caractere","password")}</>)}
            {fg(<>{lbl("Email",true)}{inp("email","email","ex: maria@scoala.ro")}{ferr("email")}</>)}
            <button style={btnStyle(busy)} onClick={submit} disabled={busy}>
              {busy ? "Se înregistrează…" : "Creează contul →"}
            </button>
            <button onClick={goBack} style={{width:"100%",padding:"11px",borderRadius:9,border:"1px solid #e2e8f0",
              background:"#fff",color:"#64748b",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginTop:8}}>
              ← Înapoi
            </button>
          </>}
        </div>
      </div>
    </div>
  );
}

CPEEN.init().then(()=>ReactDOM.createRoot(document.getElementById("root")).render(<RegisterApp/>));
</script>
</body>
</html>

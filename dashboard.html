<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Elev – ECHO</title>
<link rel="stylesheet" href="css/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,system-ui,sans-serif;color:#7c3aed;font-size:14px;flex-direction:column;gap:12px;"><div style="width:32px;height:32px;border:3px solid #ede9ff;border-top-color:#7c3aed;border-radius:50%;animation:spin 0.8s linear infinite"></div>Se încarcă…</div></div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script type="text/babel">
const { useState, useEffect } = React;
const C = {dark:"#0f172a",mid:"#7c3aed",light:"#e2e8f0",green:"#15803d",amber:"#b45309"};
const STORE_KEY = "cpeen_student_id";
const LETTERS = ['A','B','C','D','E','F'];

function getCorrectDisplay(part, i) {
  if (!part) return '—';
  if (part.type==='p1'||part.type==='p5'||part.type==='mc') return LETTERS[part.items?.[i]?.answer] ?? '—';
  if (part.type==='p8') return part.items?.[i]?.answer ?? '—';
  if (part.type==='p2'||part.type==='p6') {
    const a = part.key?.[i]; return Array.isArray(a) ? a[0] : (a ?? '—');
  }
  if (part.type==='p3'||part.type==='p4') {
    const a = part.items?.[i]?.key; return Array.isArray(a) ? a[0] : (a ?? '—');
  }
  if (part.type==='p7') return part.items?.[i]?.answer ?? '—';
  if (part.type==='ec'||part.type==='e1'||part.type==='e2') return part.key?.[i] ?? '—';
  return '—';
}
function getStudentDisplay(part, raw) {
  if ((part.type==='p1'||part.type==='p5'||part.type==='mc') && raw!=='' && raw!==undefined)
    return LETTERS[parseInt(raw)] ?? raw;
  return raw || '—';
}
function getItemLabel(part, i) {
  if (part.type==='p2'||part.type==='p6') return `(${i+1})`;
  if (part.type==='ec'||part.type==='e1'||part.type==='e2') {
    const line = part.lines?.[i] || '';
    return line.length > 60 ? line.slice(0,60)+'…' : line;
  }
  if (part.type==='p3') return `${part.items?.[i]?.before||''} ___ ${part.items?.[i]?.after||''} [${part.items?.[i]?.kw||''}]`.slice(0,70);
  const q = part.items?.[i]?.question || part.items?.[i]?.s1 || '';
  return q.length > 70 ? q.slice(0,70)+'…' : q;
}
const PART_LABELS_DASH = {p1:"MC Cloze",p2:"Open Cloze",p3:"Word Formation",p4:"KWT",
  p5:"Multiple Choice",p6:"Gapped Text",p7:"Multiple Matching",p8:"Cross-text",
  ec:"Error Correction",mc:"Multiple Choice",e1:"Error Correction I",e2:"Error Correction II",
  l1:"Listening MC",l2:"Listening Completion",l3:"Listening MC Long",l4:"Listening Matching"};

// Builds a self-contained HTML answer sheet for download.
function buildAnswerSheetHtml(session, participant, variant) {
  const date = session.submittedAt ? new Date(session.submittedAt).toLocaleString("ro-RO") : "—";
  const total = session.result?.total ?? "—";
  const grade = typeof total === "number" ? (total/10).toFixed(2) : "—";

  const rows = (variant.parts||[]).map((part, pi) => {
    const det = session.result?.details?.[pi] || [];
    const partAns = session.answers?.parts?.[pi] || [];
    const label = `Part ${pi+1} — ${PART_LABELS_DASH[part.type]||part.type}`;
    const correct = det.filter(Boolean).length;
    const total_p = det.length * part.pts;
    const earned = correct * part.pts;

    const items = det.map((ok, i) => {
      const std = getStudentDisplay(part, partAns[i]);
      const cor = getCorrectDisplay(part, i);
      const lbl = getItemLabel(part, i);
      const bg = ok ? "#f0fdf4" : "#fef2f2";
      const border = ok ? "#86efac" : "#fca5a5";
      const mark = ok ? "✓" : "✗";
      const markColor = ok ? "#15803d" : "#dc2626";
      const extra = !ok ? `<span style="color:#15803d;margin-left:8px">→ ${cor}</span>` : "";
      return `
        <tr style="background:${bg};border-bottom:1px solid ${border}">
          <td style="padding:5px 8px;font-weight:700;color:${markColor};font-size:14px">${mark}</td>
          <td style="padding:5px 8px;color:#374151;font-size:12px">${lbl}</td>
          <td style="padding:5px 8px;font-family:monospace;font-weight:700;color:${markColor};font-size:12px">${std}${extra}</td>
        </tr>`;
    }).join('');

    return `
      <div style="margin-bottom:20px">
        <div style="background:#1e3a5f;color:#fff;padding:7px 12px;border-radius:6px 6px 0 0;font-weight:700;font-size:13px;display:flex;justify-content:space-between">
          <span>${label}</span><span>${earned}/${total_p} pts</span>
        </div>
        <table style="width:100%;border-collapse:collapse;border:1px solid #e2e8f0;border-top:none">
          ${items}
        </table>
      </div>`;
  }).join('');

  const writing = session.answers?.writing ? `
    <div style="margin-bottom:20px">
      <div style="background:#1e3a5f;color:#fff;padding:7px 12px;border-radius:6px 6px 0 0;font-weight:700;font-size:13px">Writing</div>
      <div style="border:1px solid #e2e8f0;border-top:none;padding:12px;white-space:pre-wrap;font-size:13px;line-height:1.7">${session.answers.writing.replace(/</g,'&lt;')}</div>
    </div>` : '';

  return `<!DOCTYPE html>
<html lang="ro"><head><meta charset="UTF-8"/>
<title>ECHO – Copie răspunsuri – ${participant.name}</title>
<style>body{font-family:Inter,system-ui,sans-serif;max-width:760px;margin:32px auto;padding:0 20px;color:#0f172a}@media print{body{margin:0}}</style>
</head><body>
<div style="border-bottom:3px solid #1e3a5f;padding-bottom:16px;margin-bottom:24px">
  <div style="font-size:22px;font-weight:700;color:#1e3a5f">ECHO — Copie răspunsuri</div>
  <div style="font-size:11px;color:#64748b;letter-spacing:2px;text-transform:uppercase">englishgrammarchallenge.ro</div>
</div>
<table style="width:100%;border-collapse:collapse;margin-bottom:24px">
  <tr><td style="padding:4px 0;color:#64748b;font-size:12px;width:120px">Participant</td><td style="font-weight:700">${participant.name}</td></tr>
  <tr><td style="padding:4px 0;color:#64748b;font-size:12px">Școală</td><td>${participant.school} · ${participant.county}${participant.grade?` · Clasa ${participant.grade}`:''}</td></tr>
  ${participant.teacher?`<tr><td style="padding:4px 0;color:#64748b;font-size:12px">Profesor</td><td>${participant.teacher}</td></tr>`:''}
  <tr><td style="padding:4px 0;color:#64748b;font-size:12px">Nivel / Etapă</td><td>${session.level} · ${session.stage==='finala'?'Finală':'Calificare'} · Var. ${session.variantId}</td></tr>
  <tr><td style="padding:4px 0;color:#64748b;font-size:12px">Data</td><td>${date}</td></tr>
  <tr><td style="padding:4px 0;color:#64748b;font-size:12px">Scor</td><td style="font-weight:700;font-size:18px">${total} / 100 &nbsp;·&nbsp; Nota: ${grade}</td></tr>
</table>
${rows}${writing}
<div style="margin-top:32px;border-top:1px solid #e2e8f0;padding-top:12px;font-size:11px;color:#94a3b8;text-align:center">
  Copie generată automat de platforma ECHO · englishgrammarchallenge.ro · ${date}
</div>
</body></html>`;
}

function ResultDetail({parts, answers, result}) {
  return (
    <div style={{marginTop:12,borderTop:"1px solid #e2e8f0",paddingTop:12}}>
      {(parts||[]).map((part, pi) => {
        const det = result?.details?.[pi] || [];
        const correct = det.filter(Boolean).length;
        const label = part.type==='e1'?'E1':part.type==='e2'?'E2':`Part ${pi+1}`;
        return (
          <div key={pi} style={{marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:11,color:C.dark,marginBottom:5,display:"flex",justifyContent:"space-between"}}>
              <span>{label} · {PART_LABELS_DASH[part.type]||part.type}</span>
              <span style={{color:correct===det.length?C.green:C.mid}}>{correct}/{det.length}</span>
            </div>
            {det.map((ok, i) => {
              const raw = answers?.parts?.[pi]?.[i];
              const std = getStudentDisplay(part, raw);
              const cor = getCorrectDisplay(part, i);
              const lbl = getItemLabel(part, i);
              return (
                <div key={i} style={{
                  display:"flex",gap:6,alignItems:"flex-start",padding:"3px 7px",borderRadius:4,marginBottom:2,
                  background:ok?"#f0fdf4":"#fef2f2"
                }}>
                  <span style={{color:ok?C.green:"#dc2626",fontWeight:700,fontSize:12,minWidth:14,flexShrink:0}}>{ok?"✓":"✗"}</span>
                  <span style={{flex:1,fontSize:11,color:"#555",lineHeight:1.4}}>{lbl}</span>
                  <span style={{fontSize:11,fontFamily:"monospace",fontWeight:700,color:ok?C.green:"#dc2626",flexShrink:0}}>{std}</span>
                  {!ok && <span style={{fontSize:11,fontFamily:"monospace",fontWeight:700,color:C.green,flexShrink:0}}>→ {cor}</span>}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

const SB = {
  sidebar:{position:"fixed",top:0,left:0,width:240,height:"100vh",background:"#fff",
    borderRight:"1px solid #e8e8ec",display:"flex",flexDirection:"column",zIndex:300,overflow:"hidden"},
  brand:{padding:"20px 18px",borderBottom:"1px solid #f1f5f9",flexShrink:0,display:"flex",alignItems:"center",gap:10},
  logoCircle:{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#a78bfa,#7c3aed)",
    display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:13,flexShrink:0},
  brandText:{flex:1,minWidth:0},
  brandName:{fontWeight:700,fontSize:14,color:"#0f172a",letterSpacing:"-.2px"},
  brandDomain:{fontSize:9,color:"#9ca3af",letterSpacing:"1.5px",textTransform:"uppercase"},
  profile:{padding:"14px 18px",borderBottom:"1px solid #f1f5f9",flexShrink:0,display:"flex",alignItems:"center",gap:10},
  avatar:{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#4c1d95)",
    display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12,flexShrink:0},
  profileText:{flex:1,minWidth:0},
  profileName:{fontWeight:700,fontSize:12,color:"#0f172a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"},
  nav:{flex:1,padding:"10px 10px",overflowY:"auto"},
  footer:{padding:"12px 10px",borderTop:"1px solid #f1f5f9",flexShrink:0},
};

const LVLBG = {A2:{background:"#dcfce7",color:"#15803d"},B1:{background:"#fef3c7",color:"#b45309"},
  B2:{background:"#f3e8ff",color:"#7c3aed"},C1:{background:"#dbeafe",color:"#1d4ed8"},
  FCE:{background:"#fef9c3",color:"#854d0e"},CAE:{background:"#e0e7ff",color:"#3730a3"}};

function SvgDash() {
  return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
  </svg>;
}
function SvgExam() {
  return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/>
  </svg>;
}
function SvgReg() {
  return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
    <circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
  </svg>;
}
function SvgLogout() {
  return <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
    <polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/>
  </svg>;
}
function SvgNews() {
  return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2V9"/>
    <line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/>
  </svg>;
}
function SvgSim() {
  return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polygon points="5 3 19 12 5 21 5 3"/>
  </svg>;
}

function NavLink({href, active, icon, label}) {
  const base = {display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:7,
    textDecoration:"none",fontSize:13.5,fontWeight:active?600:500,marginBottom:2,cursor:"pointer",
    transition:"background .12s,color .12s"};
  const style = active
    ? {...base,background:"#f5f3ff",color:"#7c3aed"}
    : {...base,background:"none",color:"#4a4a4a"};
  return (
    <a href={href} style={style}
      onMouseEnter={e=>{ if(!active){ e.currentTarget.style.background="#f5f5f7"; e.currentTarget.style.color="#1a1a2e"; }}}
      onMouseLeave={e=>{ if(!active){ e.currentTarget.style.background="none"; e.currentTarget.style.color="#4a4a4a"; }}}>
      <span style={{opacity: active ? 1 : 0.6, display:"flex"}}>{icon}</span>
      {label}
    </a>
  );
}

function Sidebar({participant, onLogout}) {
  const initials = participant ? participant.name.trim().split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase() : "E";
  return (
    <div style={SB.sidebar}>
      <div style={SB.brand}>
        <div style={SB.logoCircle}>E</div>
        <div style={SB.brandText}>
          <div style={SB.brandName}>ECHO</div>
          <div style={SB.brandDomain}>englishgrammarchallenge.ro</div>
        </div>
      </div>
      {participant && (
        <div style={SB.profile}>
          <div style={SB.avatar}>{initials}</div>
          <div style={SB.profileText}>
            <div style={SB.profileName}>{participant.name}</div>
            <span style={{display:"inline-block",padding:"1px 7px",borderRadius:4,fontSize:10,fontWeight:700,...(LVLBG[participant.level]||{})}}>{participant.level}</span>
          </div>
        </div>
      )}
      <nav style={SB.nav}>
        <NavLink href="dashboard.html" active icon={<SvgDash/>} label="Dashboard"/>
        <NavLink href="exam.html" icon={<SvgExam/>} label="Examen"/>
        <NavLink href="news.html" icon={<SvgNews/>} label="Noutăți"/>
        <NavLink href="register.html" icon={<SvgReg/>} label="Înregistrare"/>
      </nav>
      {onLogout && (
        <div style={SB.footer}>
          <button onClick={onLogout} style={{width:"100%",display:"flex",alignItems:"center",gap:10,
            padding:"9px 10px",borderRadius:7,border:"none",background:"none",cursor:"pointer",
            fontSize:13,color:"#64748b",fontFamily:"inherit",fontWeight:500}}
            onMouseEnter={e=>e.currentTarget.style.background="#f1f5f9"}
            onMouseLeave={e=>e.currentTarget.style.background="none"}>
            <SvgLogout/> Deconectare
          </button>
        </div>
      )}
    </div>
  );
}

const stageLabel = stg => stg === "finala" ? "Final" : stg === "calificare" ? "Qualifying" : (stg||"—");

function StatusBadge({status}) {
  if(status === "submitted")    return <span className="badge b-ok">Submitted</span>;
  if(status === "in_progress")  return <span className="badge b-mid">In progress</span>;
  return <span className="badge b-gray">Allocated</span>;
}

function SessionCard({s, exam, participant}) {
  const [showDetail, setShowDetail] = useState(false);
  const stageL = stageLabel(s.stage);
  const examTitle = exam?.title || s.examId || "—";
  const variantId = s.variantId;
  const variant = exam?.variants?.find(v => v.id === s.variantId);
  const hasWriting = !!variant?.writing;
  const link = `exam.html?sid=${encodeURIComponent(s.id)}`;
  const btnLabel = s.status === "submitted"
    ? "View results →"
    : s.status === "in_progress"
      ? "Continue exam →"
      : "Start exam →";
  const btnClass = s.status === "submitted" ? "btn btn-mid btn-sm" : "btn btn-primary btn-sm";
  const score = s.result?.total;
  const within24h = s.submittedAt && (Date.now() - s.submittedAt) < 86400000;
  const canDetail = s.status === "submitted" && within24h && variant?.parts?.length && s.result;

  const downloadCopy = () => {
    if (!variant || !s.result || !participant) return;
    const html = buildAnswerSheetHtml(s, participant, variant);
    const blob = new Blob([html], {type:"text/html;charset=utf-8"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    const safeName = (participant.name||"elev").replace(/\s+/g,"_");
    const dt = s.submittedAt ? new Date(s.submittedAt).toISOString().slice(0,10) : "data";
    a.download = `ECHO_raspunsuri_${safeName}_${dt}.html`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const GRADIENTS = {
    A2:"linear-gradient(135deg,#34d399,#059669)",
    B1:"linear-gradient(135deg,#fbbf24,#d97706)",
    B2:"linear-gradient(135deg,#a78bfa,#7c3aed)",
    C1:"linear-gradient(135deg,#60a5fa,#2563eb)",
    FCE:"linear-gradient(135deg,#f472b6,#db2777)",
    CAE:"linear-gradient(135deg,#818cf8,#4338ca)"
  };
  const isPending = s.status !== "submitted";
  const grad = GRADIENTS[s.level] || GRADIENTS.B2;

  return (
    <div style={{borderRadius:12,marginBottom:10,overflow:"hidden",
      border:"1px solid #e8e8ec",background:"#fff"}}>
      {/* Gradient top strip */}
      {isPending && <div style={{height:4,background:grad}}/>}
      <div style={{padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:180}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              {isPending && <div style={{width:8,height:8,borderRadius:"50%",background:grad,flexShrink:0}}/>}
              <div style={{fontWeight:700,color:C.dark,fontSize:14}}>{examTitle}</div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{...LVLBG[s.level],borderRadius:4,padding:"1px 7px",fontSize:11,fontWeight:700}}>{s.level}</span>
              <span style={{fontSize:12,color:"#64748b"}}>{stageL}</span>
              <span style={{fontSize:11,color:"#94a3b8",fontFamily:"monospace"}}>var. {variantId}</span>
              <StatusBadge status={s.status}/>
            </div>
            {s.status === "submitted" && typeof score === "number" && (
              <div style={{marginTop:8,fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <span style={{color:score>=75?"#15803d":score>=50?"#d97706":"#dc2626"}}>
                  {score}/100
                </span>
                <span style={{fontSize:11,color:"#94a3b8",fontWeight:400}}>
                  nota: {(score/10).toFixed(2)}
                </span>
                {s.submittedAt && <span style={{color:"#94a3b8",fontWeight:400,fontSize:11}}>
                  · {new Date(s.submittedAt).toLocaleString("ro-RO",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})}
                </span>}
              </div>
            )}
            {s.status === "submitted" && hasWriting && (
              <div style={{marginTop:6,display:"flex",alignItems:"center",gap:6}}>
                {s.writingGrade != null ? (
                  <span style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:5,
                    padding:"2px 8px",fontSize:11,fontWeight:700,color:"#15803d"}}>
                    ✓ Writing: {s.writingGrade}/{variant.writing.pts||20} pts
                    {s.writingFeedback && <span style={{fontWeight:400,marginLeft:4}}>— {s.writingFeedback.slice(0,60)}{s.writingFeedback.length>60?"…":""}</span>}
                  </span>
                ) : (
                  <span style={{background:"#fef9c3",border:"1px solid #fde047",borderRadius:5,
                    padding:"2px 8px",fontSize:11,fontWeight:700,color:"#854d0e"}}>
                    ⏳ Writing — în așteptarea corectării
                  </span>
                )}
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"flex-start"}}>
            {canDetail && (
              <>
                <button style={{padding:"6px 12px",borderRadius:7,border:"1px solid #e8e8ec",
                  background:"#fff",cursor:"pointer",fontSize:12,fontWeight:600,color:"#64748b",fontFamily:"inherit"}}
                  onClick={()=>setShowDetail(d=>!d)}>
                  {showDetail ? "Ascunde ▲" : "Detalii ▼"}
                </button>
                <button style={{padding:"6px 12px",borderRadius:7,border:"1px solid #e8e8ec",
                  background:"#fff",cursor:"pointer",fontSize:12,fontWeight:600,color:"#64748b",fontFamily:"inherit"}}
                  onClick={downloadCopy}>⬇ Copie</button>
              </>
            )}
            {s.status === "submitted" && !within24h && (
              <span style={{fontSize:11,color:"#94a3b8",alignSelf:"center"}}>Copie expirată</span>
            )}
            <a href={link} style={{
              display:"inline-flex",alignItems:"center",padding:"7px 14px",borderRadius:8,
              background:isPending?grad:"#7c3aed",color:"#fff",fontWeight:700,fontSize:13,
              textDecoration:"none",whiteSpace:"nowrap",
              boxShadow:isPending?"0 2px 8px rgba(0,0,0,.15)":"0 2px 8px rgba(124,58,237,.25)"}}>
              {btnLabel}
            </a>
          </div>
        </div>
        {showDetail && canDetail && (
          <ResultDetail parts={variant.parts} answers={s.answers} result={s.result}/>
        )}
      </div>
    </div>
  );
}

function StatCard({gradient, label, value, sub, icon}) {
  return (
    <div style={{borderRadius:16,padding:20,background:gradient,boxShadow:"0 2px 8px rgba(0,0,0,.10)",
      display:"flex",flexDirection:"column",gap:8,minWidth:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{width:38,height:38,borderRadius:10,border:"1.5px solid rgba(255,255,255,.4)",
          display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:17}}>{icon}</div>
      </div>
      <div style={{color:"rgba(255,255,255,.75)",fontSize:11,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>{label}</div>
      <div style={{color:"#fff",fontSize:28,fontWeight:700,lineHeight:1,letterSpacing:"-.5px"}}>{value}</div>
      {sub && <div style={{color:"rgba(255,255,255,.65)",fontSize:12}}>{sub}</div>}
    </div>
  );
}

function StageProgress({qualified, sessions}) {
  const hasSubmitted = sessions.some(s=>s.status==="submitted");
  const steps = [
    {label:"Înregistrat", done:true},
    {label:"Calificare", done:hasSubmitted},
    {label:"Finală", done:qualified}
  ];
  const currentStep = qualified ? 2 : hasSubmitted ? 1 : 0;
  return (
    <div style={{background:"#fff",borderRadius:12,border:"1px solid #e8e8ec",padding:"16px 24px",marginBottom:20,
      display:"flex",alignItems:"center",gap:0}}>
      {steps.map((step, i) => (
        <React.Fragment key={i}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,flex:i===1?"1":"none"}}>
            <div style={{width:28,height:28,borderRadius:"50%",
              background:step.done?"linear-gradient(135deg,#7c3aed,#4c1d95)":"#f1f5f9",
              border:i===currentStep?"2px solid #7c3aed":"2px solid transparent",
              display:"flex",alignItems:"center",justifyContent:"center",
              color:step.done?"#fff":"#94a3b8",fontSize:12,fontWeight:700}}>
              {step.done ? "✓" : i+1}
            </div>
            <div style={{fontSize:11,fontWeight:i===currentStep?700:500,
              color:i===currentStep?"#7c3aed":step.done?"#0f172a":"#94a3b8",whiteSpace:"nowrap"}}>{step.label}</div>
          </div>
          {i < steps.length-1 && (
            <div style={{flex:1,height:2,background:steps[i+1].done?"#7c3aed":"#e8e8ec",margin:"0 8px",marginTop:-18}}/>
          )}
        </React.Fragment>
      ))}
    </div>
  );
}

function NewsWidget({news}) {
  if(!news.length) return null;
  return (
    <div style={{background:"#fff",borderRadius:12,border:"1px solid #e8e8ec",padding:"16px 18px",marginTop:16}}>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",color:"#94a3b8",marginBottom:12}}>Ultimele noutăți</div>
      {news.map((post,i) => (
        <div key={post.id||i} style={{borderTop:i>0?"1px solid #f1f5f9":"none",paddingTop:i>0?10:0,marginTop:i>0?10:0}}>
          <div style={{fontWeight:700,fontSize:13,color:"#0f172a",marginBottom:3,lineHeight:1.3}}>{post.title}</div>
          <div style={{fontSize:12,color:"#64748b",lineHeight:1.6,
            overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>
            {post.content}
          </div>
        </div>
      ))}
      <a href="news.html" style={{display:"inline-block",marginTop:12,fontSize:12,fontWeight:600,color:"#7c3aed",textDecoration:"none"}}>
        Toate noutățile →
      </a>
    </div>
  );
}

function DashboardView({participant, onLogout}) {
  const [refreshKey, setRefreshKey] = useState(0);
  const sessions = CPEEN.getSessionsByParticipant(participant.id);
  const exams    = CPEEN.getExams();
  const examMap  = {};
  exams.forEach(e => { examMap[e.id] = e; });

  const order = {in_progress: 0, pending: 1, submitted: 2};
  const sorted = [...sessions].sort((a,b) => (order[a.status]??9) - (order[b.status]??9));
  const qualified = CPEEN.isQualified(participant);

  const submitted = sessions.filter(s=>s.status==="submitted");
  const bestScore = submitted.length ? Math.max(...submitted.map(s=>s.result?.total||0)) : null;
  const avgScore  = submitted.length ? Math.round(submitted.reduce((a,s)=>a+(s.result?.total||0),0)/submitted.length) : null;
  const active    = sessions.filter(s=>s.status==="in_progress").length;

  // Active simulation detection
  const groupSessions = CPEEN.getGroupSessions();
  const activeSimSess = sessions.find(s => {
    if(!s.groupId || s.status === "submitted") return false;
    const grp = groupSessions.find(g => g.id === s.groupId);
    return grp?.status === "active";
  });
  const activeSimGroup = activeSimSess ? groupSessions.find(g => g.id === activeSimSess.groupId) : null;

  // News
  const news = CPEEN.getNews().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,3);

  const hour = new Date().getHours();
  const greeting = hour < 12 ? "Bună dimineața" : hour < 18 ? "Bună ziua" : "Bună seara";

  return (
    <div style={{marginLeft:240,minHeight:"100vh",background:"#f5f5f7",display:"flex",flexDirection:"column"}}>
      {/* Top header */}
      <div style={{position:"sticky",top:0,zIndex:100,background:"#fff",borderBottom:"1px solid #e8e8ec",
        height:60,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 32px",flexShrink:0}}>
        <div>
          <span style={{fontSize:15,fontWeight:600,color:"#0f172a"}}>{greeting}, {participant.name.split(" ")[0]} 👋</span>
          <span style={{fontSize:12,color:"#94a3b8",marginLeft:10}}>
            {participant.school} · {participant.county}
          </span>
        </div>
        <button onClick={()=>setRefreshKey(k=>k+1)} style={{
          display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:8,
          border:"1px solid #e8e8ec",background:"#fff",cursor:"pointer",
          fontSize:13,fontWeight:600,color:"#64748b",fontFamily:"inherit"}}
          onMouseEnter={e=>e.currentTarget.style.background="#f5f5f7"}
          onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
          ↻ Refresh
        </button>
      </div>

      <div style={{flex:1,padding:"32px 32px 48px",maxWidth:1000,width:"100%",margin:"0 auto",boxSizing:"border-box"}}>

        {/* Active simulation banner */}
        {activeSimSess && (
          <div style={{background:"linear-gradient(135deg,#7c3aed,#4c1d95)",borderRadius:12,padding:"18px 22px",
            marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,
            boxShadow:"0 4px 16px rgba(124,58,237,.35)"}}>
            <div>
              <div style={{color:"rgba(196,181,253,.8)",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>
                ⚡ Simulare activă acum
              </div>
              <div style={{color:"#fff",fontWeight:700,fontSize:15}}>{activeSimGroup?.name || "Simulare de concurs"}</div>
              <div style={{color:"rgba(196,181,253,.75)",fontSize:12,marginTop:3}}>Sesiunea ta este deschisă — intră și participă!</div>
            </div>
            <a href={`exam.html?sid=${encodeURIComponent(activeSimSess.id)}`} style={{
              display:"inline-flex",alignItems:"center",gap:8,padding:"10px 20px",borderRadius:9,
              background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",
              color:"#fff",fontWeight:700,fontSize:14,textDecoration:"none",whiteSpace:"nowrap",
              backdropFilter:"blur(4px)"}}>
              Participă →
            </a>
          </div>
        )}

        {/* Stage progress */}
        <StageProgress qualified={qualified} sessions={sessions}/>

        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:20}}>
          <StatCard gradient="linear-gradient(135deg,#a78bfa,#7c3aed)" label="Sesiuni totale" value={sessions.length}
            sub={active > 0 ? active+" în desfășurare" : "nicio sesiune activă"} icon="📋"/>
          <StatCard gradient="linear-gradient(135deg,#60a5fa,#2563eb)" label="Finalizate" value={submitted.length}
            sub={sessions.length>0?(submitted.length===sessions.length?"toate completate":"din "+sessions.length):"—"} icon="✅"/>
          <StatCard gradient="linear-gradient(135deg,#34d399,#059669)" label="Cel mai bun scor"
            value={bestScore!==null?bestScore+"/100":"—"}
            sub={avgScore!==null?"medie: "+avgScore+"/100":"niciun scor încă"} icon="🏆"/>
          <StatCard
            gradient={qualified?"linear-gradient(135deg,#34d399,#059669)":"linear-gradient(135deg,#fbbf24,#d97706)"}
            label="Status concurs" value={qualified?"Calificat":"Calificare"}
            sub={qualified?"Acces la Etapa Finală":"Etapa I · calificare online"} icon={qualified?"🎯":"⏳"}/>
        </div>

        {/* Profile + sessions */}
        <div style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:20,alignItems:"start"}}>

          {/* Left: profile card */}
          <div style={{background:"#fff",borderRadius:16,border:"1px solid #e8e8ec",overflow:"hidden"}}>
            <div style={{height:70,background:"linear-gradient(135deg,#4c1d95,#7c3aed)"}}/>
            <div style={{padding:"0 20px 20px",marginTop:-28}}>
              <div style={{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#a78bfa)",
                border:"3px solid #fff",display:"flex",alignItems:"center",justifyContent:"center",
                color:"#fff",fontWeight:700,fontSize:18,marginBottom:10}}>
                {participant.name.trim().split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase()}
              </div>
              <div style={{fontWeight:700,fontSize:15,color:"#0f172a",marginBottom:2}}>{participant.name}</div>
              <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>
                {participant.school}<br/>{participant.county}{participant.grade && ` · Clasa ${participant.grade}`}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                <span style={{...LVLBG[participant.level],borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700}}>{participant.level}</span>
              </div>
              {participant.teacher && (
                <div style={{fontSize:12,color:"#64748b",borderTop:"1px solid #f1f5f9",paddingTop:10,marginTop:4}}>
                  <span style={{color:"#94a3b8",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.8}}>Profesor</span>
                  <div style={{fontWeight:600,color:"#374151",marginTop:2}}>{participant.teacher}</div>
                </div>
              )}
              {participant.username && (
                <div style={{fontSize:12,color:"#64748b",borderTop:"1px solid #f1f5f9",paddingTop:10,marginTop:8}}>
                  <span style={{color:"#94a3b8",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.8}}>Username</span>
                  <div style={{fontWeight:700,color:"#7c3aed",fontFamily:"monospace",fontSize:13,marginTop:2}}>@{participant.username}</div>
                </div>
              )}
              {participant.email && (
                <div style={{fontSize:12,color:"#64748b",borderTop:"1px solid #f1f5f9",paddingTop:10,marginTop:8}}>
                  <span style={{color:"#94a3b8",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.8}}>Email</span>
                  <div style={{fontWeight:500,color:"#374151",fontSize:12,marginTop:2,wordBreak:"break-word"}}>{participant.email}</div>
                </div>
              )}
            </div>
          </div>
          <NewsWidget news={news}/>

          {/* Right: sessions */}
          <div style={{background:"#fff",borderRadius:16,border:"1px solid #e8e8ec",padding:22}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>Sesiunile mele</div>
              <span style={{fontSize:12,color:"#94a3b8",background:"#f5f5f7",borderRadius:20,padding:"2px 10px"}}>{sessions.length}</span>
            </div>
            {sessions.length === 0 ? (
              <div style={{padding:"32px 0",textAlign:"center"}}>
                <div style={{fontSize:32,marginBottom:10}}>📭</div>
                <div style={{fontWeight:600,color:"#374151",marginBottom:4}}>Nicio sesiune alocată</div>
                <div style={{fontSize:12,color:"#94a3b8"}}>Profesorul tău îți va aloca o sesiune în curând.</div>
              </div>
            ) : sorted.map(s => (
              <SessionCard key={s.id} s={s} exam={examMap[s.examId]} participant={participant}/>
            ))}
          </div>
        </div>

        <div style={{textAlign:"center",marginTop:28,fontSize:11,color:"#94a3b8"}}>ECHO · englishgrammarchallenge.ro</div>
      </div>
    </div>
  );
}

function LoginEntry({onLogin}) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [err,  setErr]  = useState("");
  const [busy, setBusy] = useState(false);

  const submit = () => {
    setErr("");
    if(!username.trim() || !password) { setErr("Introduceți username-ul și parola."); return; }
    setBusy(true);
    CPEEN.loginParticipant(username, password).then(p => {
      setBusy(false);
      if(!p) { setErr("Username sau parolă incorectă."); return; }
      onLogin(p);
    });
  };

  const inpStyle = (hasErr) => ({
    width:"100%",border:`1px solid ${hasErr?"#fca5a5":"#e2e8f0"}`,borderRadius:8,padding:"11px 14px",
    fontSize:14,outline:"none",background:"#fff",color:"#0f172a",fontFamily:"inherit",
    transition:"border-color .15s,box-shadow .15s"
  });
  const [uFocus,setUFocus]=useState(false);
  const [pFocus,setPFocus]=useState(false);

  return (
    <div style={{minHeight:"100vh",display:"flex",background:"#f5f5f7"}}>
      {/* Left panel – branding */}
      <div style={{flex:"0 0 45%",background:"linear-gradient(150deg,#0f0524 0%,#2d1068 60%,#1e1b4b 100%)",
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        padding:"60px 48px",position:"relative",overflow:"hidden"}}>
        {/* decorative circles */}
        <div style={{position:"absolute",top:-80,right:-80,width:300,height:300,borderRadius:"50%",
          background:"rgba(124,58,237,.18)",pointerEvents:"none"}}/>
        <div style={{position:"absolute",bottom:-60,left:-60,width:220,height:220,borderRadius:"50%",
          background:"rgba(167,139,250,.12)",pointerEvents:"none"}}/>
        <div style={{position:"relative",zIndex:1,textAlign:"center",maxWidth:320}}>
          <div style={{width:64,height:64,borderRadius:20,background:"linear-gradient(135deg,#a78bfa,#7c3aed)",
            display:"inline-flex",alignItems:"center",justifyContent:"center",
            color:"#fff",fontWeight:800,fontSize:26,marginBottom:28,
            boxShadow:"0 8px 32px rgba(124,58,237,.45)"}}>E</div>
          <div style={{fontSize:11,color:"rgba(196,181,253,.6)",letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>englishgrammarchallenge.ro</div>
          <div style={{fontSize:32,fontWeight:800,color:"#fff",lineHeight:1.2,marginBottom:16,letterSpacing:"-.5px"}}>
            English Challenge<br/>Hub Online
          </div>
          <p style={{fontSize:14,color:"rgba(196,181,253,.75)",lineHeight:1.8,marginBottom:32}}>
            Concurs de performanță în limba engleză, desfășurat online, pe niveluri Cambridge.
          </p>
          <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
            {["A2","B1","B2","C1","FCE","CAE"].map(l=>(
              <span key={l} style={{...LVLBG[l],borderRadius:5,padding:"3px 10px",fontSize:11,fontWeight:700}}>{l}</span>
            ))}
          </div>
        </div>
      </div>

      {/* Right panel – form */}
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 32px"}}>
        <div style={{width:"100%",maxWidth:380}}>
          <div style={{marginBottom:32}}>
            <div style={{fontSize:26,fontWeight:800,color:"#0f172a",letterSpacing:"-.4px",marginBottom:6}}>Bun venit</div>
            <div style={{fontSize:14,color:"#64748b"}}>Autentifică-te în contul tău ECHO.</div>
          </div>

          {err && (
            <div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,
              padding:"11px 14px",marginBottom:16,fontSize:13,color:"#991b1b"}}>
              {err}
            </div>
          )}

          <div style={{marginBottom:16}}>
            <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:6}}>
              Username
            </label>
            <input value={username} style={{...inpStyle(false),boxShadow:uFocus?"0 0 0 3px rgba(124,58,237,.12)":"none",
              borderColor:uFocus?"#7c3aed":"#e2e8f0"}}
              onFocus={()=>setUFocus(true)} onBlur={()=>setUFocus(false)}
              onChange={e=>{ setUsername(e.target.value); setErr(""); }}
              onKeyDown={e=>e.key==="Enter"&&submit()}
              placeholder="username-ul tău" autoComplete="username"/>
          </div>
          <div style={{marginBottom:24}}>
            <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:6}}>
              Parolă
            </label>
            <input type="password" value={password} style={{...inpStyle(false),boxShadow:pFocus?"0 0 0 3px rgba(124,58,237,.12)":"none",
              borderColor:pFocus?"#7c3aed":"#e2e8f0"}}
              onFocus={()=>setPFocus(true)} onBlur={()=>setPFocus(false)}
              onChange={e=>{ setPassword(e.target.value); setErr(""); }}
              onKeyDown={e=>e.key==="Enter"&&submit()}
              placeholder="parola ta" autoComplete="current-password"/>
          </div>
          <button onClick={submit} disabled={busy} style={{
            width:"100%",padding:"13px",borderRadius:9,border:"none",
            background:busy?"#a78bfa":"#7c3aed",color:"#fff",fontSize:15,fontWeight:700,
            cursor:busy?"not-allowed":"pointer",fontFamily:"inherit",
            boxShadow:"0 4px 14px rgba(124,58,237,.35)",transition:"background .12s,transform .1s"}}
            onMouseEnter={e=>{ if(!busy) e.currentTarget.style.background="#6d28d9"; }}
            onMouseLeave={e=>{ if(!busy) e.currentTarget.style.background="#7c3aed"; }}>
            {busy ? "Se verifică…" : "Autentificare →"}
          </button>
          <div style={{textAlign:"center",marginTop:20,fontSize:13,color:"#64748b"}}>
            Nu ai cont?{" "}
            <a href="register.html" style={{color:"#7c3aed",fontWeight:600,textDecoration:"none"}}>Înregistrează-te →</a>
          </div>
          <div style={{textAlign:"center",marginTop:12}}>
            <a href="index.html" style={{fontSize:12,color:"#94a3b8",textDecoration:"none"}}>← Pagina principală</a>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  CPEEN.seedInitialData();
  const [participant, setParticipant] = useState(null);

  useEffect(() => {
    const storedId = sessionStorage.getItem(STORE_KEY);
    if(storedId) {
      const p = CPEEN.getParticipants().find(x => x.id === storedId);
      if(p) setParticipant(p);
    }
  }, []);

  const onLogin = (p) => {
    sessionStorage.setItem(STORE_KEY, p.id);
    setParticipant(p);
  };

  const onLogout = () => {
    sessionStorage.removeItem(STORE_KEY);
    setParticipant(null);
  };

  if(participant) return (
    <>
      <Sidebar participant={participant} onLogout={onLogout}/>
      <DashboardView participant={participant} onLogout={onLogout}/>
    </>
  );
  return <LoginEntry onLogin={onLogin}/>;
}

Promise.race([CPEEN.init(),new Promise(r=>setTimeout(r,6000))]).then(()=>ReactDOM.createRoot(document.getElementById("root")).render(<App/>));
</script>
</body>
</html>

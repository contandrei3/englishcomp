<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Elev – ECHO</title>
<link rel="stylesheet" href="css/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;
const C = {dark:"#0f172a",mid:"#2563eb",light:"#e2e8f0",green:"#15803d",amber:"#b45309"};
const STORE_KEY = "cpeen_student_code";
const LETTERS = ['A','B','C','D','E','F'];

function getCorrectDisplay(part, i) {
  if (!part) return '—';
  if (part.type==='p1'||part.type==='p5'||part.type==='mc') return LETTERS[part.items?.[i]?.answer] ?? '—';
  if (part.type==='p8') return part.items?.[i]?.answer ?? '—';
  if (part.type==='p2'||part.type==='p6') {
    const a = part.key?.[i]; return Array.isArray(a) ? a[0] : (a ?? '—');
  }
  if (part.type==='p3'||part.type==='p4') {
    const a = part.items?.[i]?.key; return Array.isArray(a) ? a[0] : (a ?? '—');
  }
  if (part.type==='p7') return part.items?.[i]?.answer ?? '—';
  if (part.type==='ec'||part.type==='e1'||part.type==='e2') return part.key?.[i] ?? '—';
  return '—';
}
function getStudentDisplay(part, raw) {
  if ((part.type==='p1'||part.type==='p5'||part.type==='mc') && raw!=='' && raw!==undefined)
    return LETTERS[parseInt(raw)] ?? raw;
  return raw || '—';
}
function getItemLabel(part, i) {
  if (part.type==='p2'||part.type==='p6') return `(${i+1})`;
  if (part.type==='ec'||part.type==='e1'||part.type==='e2') {
    const line = part.lines?.[i] || '';
    return line.length > 60 ? line.slice(0,60)+'…' : line;
  }
  if (part.type==='p3') return `${part.items?.[i]?.before||''} ___ ${part.items?.[i]?.after||''} [${part.items?.[i]?.kw||''}]`.slice(0,70);
  const q = part.items?.[i]?.question || part.items?.[i]?.s1 || '';
  return q.length > 70 ? q.slice(0,70)+'…' : q;
}
const PART_LABELS_DASH = {p1:"MC Cloze",p2:"Open Cloze",p3:"Word Formation",p4:"KWT",
  p5:"Multiple Choice",p6:"Gapped Text",p7:"Multiple Matching",p8:"Cross-text",
  ec:"Error Correction",mc:"Multiple Choice",e1:"Error Correction I",e2:"Error Correction II"};

function ResultDetail({parts, answers, result}) {
  return (
    <div style={{marginTop:12,borderTop:"1px solid #e2e8f0",paddingTop:12}}>
      {(parts||[]).map((part, pi) => {
        const det = result?.details?.[pi] || [];
        const correct = det.filter(Boolean).length;
        const label = part.type==='e1'?'E1':part.type==='e2'?'E2':`Part ${pi+1}`;
        return (
          <div key={pi} style={{marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:11,color:C.dark,marginBottom:5,display:"flex",justifyContent:"space-between"}}>
              <span>{label} · {PART_LABELS_DASH[part.type]||part.type}</span>
              <span style={{color:correct===det.length?C.green:C.mid}}>{correct}/{det.length}</span>
            </div>
            {det.map((ok, i) => {
              const raw = answers?.parts?.[pi]?.[i];
              const std = getStudentDisplay(part, raw);
              const cor = getCorrectDisplay(part, i);
              const lbl = getItemLabel(part, i);
              return (
                <div key={i} style={{
                  display:"flex",gap:6,alignItems:"flex-start",padding:"3px 7px",borderRadius:4,marginBottom:2,
                  background:ok?"#f0fdf4":"#fef2f2"
                }}>
                  <span style={{color:ok?C.green:"#dc2626",fontWeight:700,fontSize:12,minWidth:14,flexShrink:0}}>{ok?"✓":"✗"}</span>
                  <span style={{flex:1,fontSize:11,color:"#555",lineHeight:1.4}}>{lbl}</span>
                  <span style={{fontSize:11,fontFamily:"monospace",fontWeight:700,color:ok?C.green:"#dc2626",flexShrink:0}}>{std}</span>
                  {!ok && <span style={{fontSize:11,fontFamily:"monospace",fontWeight:700,color:C.green,flexShrink:0}}>→ {cor}</span>}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

function Navbar() {
  return (
    <nav className="nav">
      <a href="index.html" className="nav-brand">
        <span className="nav-domain">englishgrammarchallenge.ro</span>
        <span className="nav-title">ECHO</span>
      </a>
      <div className="nav-links">
        <a href="register.html" className="nav-link">Înregistrare</a>
        <a href="dashboard.html" className="nav-link active">Dashboard Elev</a>
        <a href="admin/index.html" className="nav-link">Admin</a>
      </div>
    </nav>
  );
}

const stageLabel = stg => stg === "finala" ? "Finală" : stg === "calificare" ? "Calificare" : (stg||"—");

function StatusBadge({status}) {
  if(status === "submitted")    return <span className="badge b-ok">Trimis</span>;
  if(status === "in_progress")  return <span className="badge b-mid">În desfășurare</span>;
  return <span className="badge b-gray">Alocat</span>;
}

function SessionCard({s, exam}) {
  const [showDetail, setShowDetail] = useState(false);
  const stageL = stageLabel(s.stage);
  const examTitle = exam?.title || s.examId || "—";
  const variantId = s.variantId;
  const link = `exam.html?sid=${encodeURIComponent(s.id)}`;
  const btnLabel = s.status === "submitted"
    ? "View results →"
    : s.status === "in_progress"
      ? "Continue exam →"
      : "Start exam →";
  const btnClass = s.status === "submitted" ? "btn btn-mid btn-sm" : "btn btn-primary btn-sm";
  const score = s.result?.total;
  const within24h = s.submittedAt && (Date.now() - s.submittedAt) < 86400000;
  const variant = exam?.variants?.find(v => v.id === s.variantId);
  const canDetail = s.status === "submitted" && within24h && variant?.parts?.length && s.result;

  return (
    <div style={{border:"1px solid #e2e8f0",borderRadius:8,padding:14,marginBottom:8,background:"#fff"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontWeight:700,color:C.dark,fontSize:14,marginBottom:5}}>{examTitle}</div>
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            <span className={`badge b-${s.level}`}>{s.level}</span>
            <span style={{fontSize:12,color:"#64748b"}}>{stageL}</span>
            <span style={{fontSize:11,color:"#94a3b8",fontFamily:"monospace"}}>· var. {variantId}</span>
            <StatusBadge status={s.status}/>
          </div>
          {s.status === "submitted" && typeof score === "number" && (
            <div style={{marginTop:8,fontSize:13,color:C.green,fontWeight:700}}>
              Score: {score}/100{s.submittedAt && <span style={{color:"#94a3b8",fontWeight:400,marginLeft:8,fontSize:12}}>· {new Date(s.submittedAt).toLocaleString("en-GB")}</span>}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"flex-start"}}>
          {canDetail && (
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowDetail(d=>!d)}>
              {showDetail ? "Hide details ▲" : "View details ▼"}
            </button>
          )}
          <a href={link} className={btnClass} style={{whiteSpace:"nowrap"}}>{btnLabel}</a>
        </div>
      </div>
      {showDetail && canDetail && (
        <ResultDetail parts={variant.parts} answers={s.answers} result={s.result}/>
      )}
    </div>
  );
}

function DashboardView({participant, onLogout}) {
  const [refreshKey, setRefreshKey] = useState(0);
  const sessions = CPEEN.getSessionsByParticipant(participant.id);
  const exams    = CPEEN.getExams();
  const examMap  = {};
  exams.forEach(e => { examMap[e.id] = e; });

  // Sort: in_progress > pending > submitted
  const order = {in_progress: 0, pending: 1, submitted: 2};
  const sorted = [...sessions].sort((a,b) => (order[a.status]??9) - (order[b.status]??9));

  const qualified = CPEEN.isQualified(participant);

  return (
    <>
      <Navbar/>
      <div className="page">
        <div className="container" style={{maxWidth:780}}>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:8}}>
            <h2 style={{color:C.dark,fontSize:19,fontWeight:700}}>Dashboard-ul tău</h2>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-mid btn-sm" onClick={()=>setRefreshKey(k=>k+1)}>↻ Actualizează</button>
              <button className="btn btn-ghost btn-sm" onClick={onLogout}>Logout</button>
            </div>
          </div>

          {/* Profil */}
          <div style={{background:"#fff",borderRadius:10,padding:20,border:"1px solid #e2e8f0",marginBottom:14}}>
            <div style={{fontSize:10,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1.5,marginBottom:10,fontWeight:700}}>Profil</div>
            <div style={{fontSize:17,fontWeight:700,color:C.dark,marginBottom:4}}>{participant.name}</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:10}}>
              {participant.school} · {participant.county}
              {participant.grade && <> · clasa {participant.grade}</>}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",fontSize:12,color:"#64748b"}}>
              <span className={`badge b-${participant.level}`}>{participant.level}</span>
              {participant.teacher && <span>Prof. {participant.teacher}</span>}
              <span>· Cod: <span style={{fontFamily:"monospace",background:"#f8fafc",padding:"2px 7px",borderRadius:4,letterSpacing:2,border:"1px solid #e2e8f0"}}>{participant.accessCode}</span></span>
            </div>
          </div>

          {/* Calificare */}
          <div style={{
            background: qualified ? "#f0fdf4" : "#fffbeb",
            border: `1px solid ${qualified ? "#86efac" : "#fde68a"}`,
            borderRadius:10, padding:18, marginBottom:14
          }}>
            <div style={{fontSize:10,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1.5,marginBottom:6,fontWeight:700}}>Status calificare</div>
            <div style={{fontSize:16,fontWeight:700,color: qualified ? C.green : C.amber}}>
              {qualified ? "Calificat pentru Finală" : "În etapa de Calificare"}
            </div>
            <div style={{fontSize:12,color:"#64748b",marginTop:4}}>
              {qualified
                ? "Felicitări! Administratorul te-a calificat pentru etapa de finală."
                : "Pentru a accesa etapa de finală, trebuie să fii calificat de către un administrator."}
            </div>
          </div>

          {/* Sesiuni */}
          <div style={{background:"#fff",borderRadius:10,padding:20,border:"1px solid #e2e8f0",marginBottom:16}}>
            <div style={{fontSize:10,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1.5,marginBottom:12,fontWeight:700}}>
              Sesiunile mele ({sessions.length})
            </div>
            {sessions.length === 0 ? (
              <div style={{padding:"20px 0",textAlign:"center",color:"#999",fontSize:13}}>
                Nicio sesiune alocată momentan.<br/>
                Așteaptă confirmarea administratorului.
              </div>
            ) : sorted.map(s => (
              <SessionCard key={s.id} s={s} exam={examMap[s.examId]}/>
            ))}
          </div>

          <div className="text-center text-muted" style={{marginTop:14}}>ECHO · englishgrammarchallenge.ro</div>
        </div>
      </div>
    </>
  );
}

function CodeEntry({onLogin, presetCode, presetErr}) {
  const [code, setCode] = useState(presetCode || "");
  const [err,  setErr]  = useState(presetErr  || "");

  const submit = () => {
    setErr("");
    const c = (code||"").toUpperCase().trim();
    if(c.length < 4) { setErr("Cod de acces invalid."); return; }
    const p = CPEEN.findParticipantByCode(c);
    if(!p) { setErr("Cod de acces invalid. Verificați și reîncercați."); return; }
    onLogin(p);
  };

  return (
    <>
      <Navbar/>
      <div className="page-center">
        <div className="wrap-sm">
          <div className="card">
            <div className="card-head" style={{textAlign:"center"}}>
              <h2>Dashboard Elev</h2>
              <p>ECHO · Introduceți codul de acces</p>
            </div>
            <div className="card-body">
              <div className="fg">
                <label>Cod de acces<span className="req">*</span></label>
                <input className={`inp${err?" err":""}`}
                  value={code} onChange={e=>setCode(e.target.value.toUpperCase())}
                  onKeyDown={e=>e.key==="Enter"&&submit()}
                  placeholder="ex: ABC12345" maxLength={8}
                  style={{letterSpacing:4,fontSize:20,fontFamily:"monospace",textAlign:"center"}}/>
                {err && <div className="ferr">{err}</div>}
              </div>
              <button className="btn btn-primary btn-lg btn-block" onClick={submit}>
                Accesează dashboard-ul →
              </button>
              <div style={{textAlign:"center",marginTop:14}}>
                <a href="register.html" style={{fontSize:13}}>Nu ai un cod? Înregistrează-te →</a>
              </div>
            </div>
          </div>
          <div className="text-center text-muted" style={{marginTop:14}}>ECHO · englishgrammarchallenge.ro</div>
        </div>
      </div>
    </>
  );
}

function App() {
  CPEEN.seedInitialData();
  const [participant, setParticipant] = useState(null);
  const [autoErr, setAutoErr] = useState("");
  const [autoCode, setAutoCode] = useState("");

  // Auto-login: ?code=XXX in URL, or saved sessionStorage
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const urlCode = (params.get("code") || "").toUpperCase().trim();
    const stored  = sessionStorage.getItem(STORE_KEY) || "";
    const tryCode = urlCode || stored;
    if(tryCode) {
      const p = CPEEN.findParticipantByCode(tryCode);
      if(p) {
        sessionStorage.setItem(STORE_KEY, tryCode);
        setParticipant(p);
      } else if(urlCode) {
        setAutoCode(urlCode);
        setAutoErr("Cod de acces invalid. Verificați și reîncercați.");
      }
    }
  }, []);

  const onLogin = (p) => {
    sessionStorage.setItem(STORE_KEY, p.accessCode);
    setParticipant(p);
  };

  const onLogout = () => {
    sessionStorage.removeItem(STORE_KEY);
    setParticipant(null);
    setAutoCode("");
    setAutoErr("");
  };

  if(participant) return <DashboardView participant={participant} onLogout={onLogout}/>;
  return <CodeEntry onLogin={onLogin} presetCode={autoCode} presetErr={autoErr}/>;
}

document.getElementById("root").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,system-ui,sans-serif;color:#2563eb;font-size:14px;">Se încarcă…</div>';
CPEEN.init().then(()=>ReactDOM.createRoot(document.getElementById("root")).render(<App/>));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pagină negăsită – ECHO</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
.err-wrap {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(150deg, #0f0524 0%, #2d1068 60%, #1e1b4b 100%);
  padding: 40px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.err-bubble1 {
  position: absolute; top: -100px; right: -100px;
  width: 400px; height: 400px; border-radius: 50%;
  background: rgba(124,58,237,.15); pointer-events: none;
}
.err-bubble2 {
  position: absolute; bottom: -80px; left: -80px;
  width: 300px; height: 300px; border-radius: 50%;
  background: rgba(167,139,250,.1); pointer-events: none;
}
.err-code {
  font-size: clamp(80px, 18vw, 140px);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -4px;
  background: linear-gradient(135deg, #a78bfa, #7c3aed);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
}
.err-title {
  font-size: clamp(18px, 3vw, 26px);
  font-weight: 700;
  color: #fff;
  margin-bottom: 12px;
  letter-spacing: -.3px;
}
.err-sub {
  color: rgba(196,181,253,.75);
  font-size: 14px;
  line-height: 1.75;
  max-width: 420px;
  margin: 0 auto 36px;
}
.err-actions {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}
.err-btn-primary {
  background: #7c3aed;
  color: #fff;
  border: none;
  border-radius: 9px;
  padding: 13px 28px;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  display: inline-block;
  transition: background .15s;
  font-family: inherit;
}
.err-btn-primary:hover { background: #6d28d9; }
.err-btn-outline {
  background: transparent;
  color: rgba(196,181,253,.9);
  border: 1px solid rgba(167,139,250,.4);
  border-radius: 9px;
  padding: 13px 28px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  display: inline-block;
  transition: border-color .15s;
  font-family: inherit;
}
.err-btn-outline:hover { border-color: rgba(167,139,250,.8); }
.err-logo {
  position: relative;
  z-index: 1;
  margin-bottom: 40px;
}
.err-logo-circle {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, #a78bfa, #7c3aed);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 800;
  font-size: 22px;
  box-shadow: 0 8px 32px rgba(124,58,237,.45);
}
</style>
</head>
<body>
<div class="err-wrap">
  <div class="err-bubble1"></div>
  <div class="err-bubble2"></div>

  <div class="err-logo">
    <div class="err-logo-circle">E</div>
    <div style="font-size:10px;color:rgba(196,181,253,.5);letter-spacing:2.5px;text-transform:uppercase;margin-top:8px;">englishgrammarchallenge.ro</div>
  </div>

  <div class="err-code" style="position:relative;z-index:1;">404</div>
  <div class="err-title" style="position:relative;z-index:1;">Pagina nu a fost găsită</div>
  <p class="err-sub" style="position:relative;z-index:1;">
    Adresa pe care ai accesat-o nu există sau a fost mutată.
    Verifică URL-ul sau întoarce-te la pagina principală.
  </p>
  <div class="err-actions" style="position:relative;z-index:1;">
    <a href="index.html" class="err-btn-primary">← Pagina principală</a>
    <a href="dashboard.html" class="err-btn-outline">Dashboard</a>
  </div>
</div>
</body>
</html>

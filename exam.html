<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Examen – ECHO</title>
<link rel="stylesheet" href="css/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const LVL_C = {A2:"#16a34a",B1:"#d97706",B2:"#7c3aed",C1:"#2563eb"};
const C = {dark:"#0f172a",mid:"#2563eb",light:"#e2e8f0",accent:"#eff6ff",red:"#dc2626",green:"#15803d"};

function Navbar({participant}) {
  return (
    <nav className="nav">
      <a href="index.html" className="nav-brand">
        <span className="nav-domain">englishgrammarchallenge.ro</span>
        <span className="nav-title">ECHO</span>
      </a>
      <div className="nav-links">
        <a href="register.html" className="nav-link">Register</a>
        <a href="dashboard.html" className="nav-link">My Dashboard</a>
        <a href="admin/index.html" className="nav-link">Admin</a>
      </div>
    </nav>
  );
}

// ── New parts rendering ───────────────────────────────────────────────────
const PART_LABELS = {p1:"Multiple Choice Cloze",p2:"Open Cloze",p3:"Word Formation",
  p4:"Key Word Transformations",p5:"Multiple Choice Reading",p6:"Gapped Text",
  p7:"Multiple Matching",p8:"Cross-text Multiple Matching",
  ec:"Error Correction",mc:"Multiple Choice",
  e1:"Error Correction I",e2:"Error Correction II"};
const PART_INSTRS = {
  p1:"Read the text and decide which answer (A, B, C or D) best fits each gap.",
  p2:"Read the text and think of ONE word which best fits each gap.",
  p3:"Use the word in CAPITALS to form a word that fits the gap.",
  p4:"Complete the second sentence using the word given. Do NOT change the word given. Use between THREE and SIX words including the word given.",
  p5:"Read the text and choose the answer (A, B, C or D) which you think fits best.",
  p6:"Read the text. Six paragraphs have been removed. Choose from paragraphs A–G the one which fits each gap.",
  p7:"Read the text. For each question choose from the sections (A–F). The sections may be chosen more than once.",
  p8:"Read the four texts. For each question, choose from the texts (A–D).",
  ec:"Some of the lines contain ONE extra word which does not belong. Write the extra word. Write ✓ if the line is correct.",
  mc:"Read the question and choose the best answer (A, B, C or D).",
  e1:"Some of the lines contain ONE extra word which does not belong. Write the extra word. Write ✓ if the line is correct.",
  e2:"Some of the lines contain ONE incorrect word. Write the correct word. Write ✓ if the line is correct."
};

function gapNums(text) {
  return ((text||'').match(/\[(\d+)\]/g)||[]).map(m=>parseInt(m.slice(1,-1)));
}

function getPartCount(part) {
  if (part.type === 'p2' || part.type === 'p6') return (part.key||[]).length;
  if (part.type === 'ec' || part.type === 'e1' || part.type === 'e2') return (part.lines||[]).length;
  return (part.items||[]).length;
}

// Inline clickable gap. `display` is what's shown when filled (string), `num` is gap number.
function Gap({num, display, onClick, kind}) {
  const filled = display !== undefined && display !== null && String(display).length > 0;
  const showVal = kind === 'mc' && filled
    ? ['A','B','C','D','E','F'][parseInt(display)] || display
    : display;
  return (
    <button type="button" className={`gap-btn${filled?' filled':''}`} onClick={onClick}>
      <span className="gap-num">({num})</span>
      {filled
        ? <span className="gap-val">{showVal}</span>
        : <span className="gap-empty">______</span>}
    </button>
  );
}

// Renders text with [N] gap markers replaced by clickable <Gap> buttons.
// `gapToItem` maps gap N (1-based as it appears in the text) to the item index in `ans`.
function GapText({text, ans, onGapClick, kind}) {
  const order = gapNums(text);
  const indexOfN = {};
  order.forEach((n, idx) => { indexOfN[n] = idx; });
  return <span>{text.split(/(\[\d+\])/).map((p,i)=>{
    const m = p.match(/^\[(\d+)\]$/);
    if (!m) return <span key={i}>{p}</span>;
    const n = parseInt(m[1]);
    const itemIdx = indexOfN[n];
    if (!onGapClick) {
      return <span key={i} style={{background:C.dark,color:"#fff",borderRadius:4,fontSize:11,fontWeight:700,padding:"1px 6px",margin:"0 2px"}}>({n})</span>;
    }
    return <Gap key={i} num={n} display={ans?.[itemIdx]} kind={kind} onClick={()=>onGapClick(itemIdx, n)}/>;
  })}</span>;
}

// ── Click-to-answer popup ──────────────────────────────────────────────────
function GapPopup({open, number, prompt, partLabel, variant, options, keyword, current, onSubmit, onClose}) {
  const [val, setVal] = useState(current || '');
  const inputRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    setVal(current || '');
    const t = setTimeout(() => inputRef.current?.focus(), 30);
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => { clearTimeout(t); window.removeEventListener('keydown', onKey); };
  }, [open, current]);

  if (!open) return null;

  const submit = (v) => { onSubmit(v); onClose(); };
  const onKeyDown = (e) => { if (e.key === 'Enter') submit(val); };

  return (
    <div className="modal-overlay" onClick={onClose} style={{alignItems:"center"}}>
      <div className="modal-box modal-box-xs" onClick={e=>e.stopPropagation()}>
        <div style={{padding:"18px 22px 8px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div>
            <div style={{fontSize:11,color:"#94a3b8",letterSpacing:1.5,textTransform:"uppercase",fontWeight:700}}>
              {partLabel} · Question {number}
            </div>
            {prompt && <div style={{fontSize:13,color:C.dark,marginTop:4,fontWeight:600}}>{prompt}</div>}
          </div>
          <button type="button" onClick={onClose} aria-label="Închide" style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:20,lineHeight:1,padding:"2px 6px"}}>×</button>
        </div>
        <div style={{padding:"10px 22px 20px"}}>
          {keyword && (
            <div style={{marginBottom:12}}>
              <span className="chip" style={{fontSize:11,letterSpacing:1.5}}>{keyword}</span>
            </div>
          )}

          {variant === 'input' && (
            <div style={{display:"flex",gap:8}}>
              <input ref={inputRef} className="inp" value={val}
                onChange={e=>setVal(e.target.value)} onKeyDown={onKeyDown}
                placeholder="Type your answer…" style={{flex:1}}/>
              <button className="btn btn-primary" onClick={()=>submit(val)}>OK</button>
            </div>
          )}

          {variant === 'mc' && (
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {(options||[]).map((opt, oi) => {
                const isSel = String(current) === String(opt.value);
                return (
                  <button key={oi} type="button"
                    className={`mc-pill${isSel?' selected':''}`}
                    onClick={()=>submit(String(opt.value))}>
                    <span className="ltr">{opt.letter || String.fromCharCode(65+oi)}</span>
                    <span style={{flex:1}}>{opt.label}</span>
                  </button>
                );
              })}
            </div>
          )}

          {variant === 'paragraphs' && (
            <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:340,overflowY:"auto"}}>
              {(options||[]).map((opt, oi) => {
                const isSel = String(current) === String(opt.value);
                return (
                  <button key={oi} type="button"
                    className={`para-chip${isSel?' selected':''}`}
                    onClick={()=>submit(String(opt.value))}>
                    <span className="p-label">{opt.value}</span>
                    {opt.label}
                  </button>
                );
              })}
            </div>
          )}

          {variant === 'input' && (
            <div style={{fontSize:11,color:"#94a3b8",marginTop:8}}>Press <strong>Enter</strong> to confirm · <strong>Esc</strong> to close.</div>
          )}
        </div>
      </div>
    </div>
  );
}

function PartSection({part, pi, ans, setAns, startNum=0, requestPopup=()=>{}}) {
  const secStyle = {background:"#fff",borderRadius:12,padding:22,marginBottom:22,border:"1px solid #e2e8f0"};
  const partLabel = `Part ${pi+1}`;
  const ansInp = (i,val,ph,w) => (
    <input className="ans-inp" value={val||""} onChange={e=>setAns(pi,i,e.target.value)}
      placeholder={ph} style={{width:w||160}}/>
  );
  const totalPts =
    (part.type==='p2'||part.type==='p7') ? (part.key||[]).length * part.pts :
    part.type==='ec' ? (part.lines||[]).length * part.pts :
    (part.items||[]).length * part.pts;

  const isExtra = part.type === 'e1' || part.type === 'e2';
  return (
    <div id={`part${pi}`} style={secStyle}>
      <div className="sec-badge">
        <span>{isExtra ? part.type.toUpperCase() : `PART ${pi+1}`} — {(PART_LABELS[part.type]||"").toUpperCase()}</span>
        <span>{totalPts} pts</span>
      </div>
      <div className="instr">{PART_INSTRS[part.type]}</div>

      {/* P1 — Multiple Choice Cloze */}
      {part.type==='p1' && <>
        {part.title && <strong className="title" style={{display:"block",marginBottom:10,color:C.dark,fontSize:15}}>{part.title}</strong>}
        {part.text && (
          <div className="passage" style={{marginBottom:8}}>
            <GapText text={part.text} ans={ans} kind="mc"
              onGapClick={(itemIdx, n) => requestPopup({
                pi, i:itemIdx, number:n, partLabel,
                prompt:"Choose the correct option for this gap.",
                variant:"mc",
                options:(part.items[itemIdx]?.options||[]).map((opt, oi) => ({
                  value: String(oi),
                  letter: ['A','B','C','D'][oi],
                  label: opt
                }))
              })}/>
          </div>
        )}
      </>}

      {/* P2 — Open Cloze */}
      {part.type==='p2' && <>
        {part.title && <strong className="title" style={{display:"block",marginBottom:10,color:C.dark,fontSize:15}}>{part.title}</strong>}
        {part.text && (
          <div className="passage">
            <GapText text={part.text} ans={ans} kind="input"
              onGapClick={(itemIdx, n) => requestPopup({
                pi, i:itemIdx, number:n, partLabel,
                prompt:"Write ONE word that best fits this gap.",
                variant:"input"
              })}/>
          </div>
        )}
      </>}

      {/* P3 — Word Formation — continuous text with inline gaps */}
{part.type === 'p3' && (() => {
  const hasText = part.text && part.text.trim().length > 0;

  /* ── Mode A: passage with [N] markers → continuous flowing text ── */
  if (hasText) {
    const chunks = (part.text || "").split(/(\[\d+\])/g);
    return (
      <div style={{
        background: "#fff", padding: "20px 24px", borderRadius: 10,
        fontSize: "15.5px", lineHeight: "2.2", color: "#2d2d2d",
        fontFamily: "Georgia, 'Times New Roman', serif"
      }}>
        {part.title && (
          <strong style={{ display: "block", marginBottom: 12, color: C.dark, fontSize: 15, fontFamily: "inherit" }}>
            {part.title}
          </strong>
        )}
        <span>
          {chunks.map((chunk, index) => {
            const match = chunk.match(/^\[(\d+)\]$/);
            if (!match) return <span key={index}>{chunk}</span>;
            const gapNumber = parseInt(match[1]);
            const gapIdx = gapNumber - startNum - 1;
            const item = (part.items || [])[gapIdx];
            const kw = item?.base || item?.kw || '';
            const filled = ans[gapIdx] !== undefined && String(ans[gapIdx]).length > 0;
            const displayVal = filled ? String(ans[gapIdx]) : null;
            return (
              <span key={index} style={{ display: "inline", whiteSpace: "nowrap" }}>
                {/* Clickable gap */}
                <button
                  type="button"
                  onClick={() => requestPopup({
                    pi, i: gapIdx, number: gapNumber, partLabel,
                    prompt: `Form a word from: ${kw}`,
                    variant: "input"
                  })}
                  style={{
                    display: "inline",
                    background: "none",
                    border: "none",
                    borderBottom: `1.5px solid ${filled ? "#2563eb" : "#94a3b8"}`,
                    cursor: "pointer",
                    padding: "0 4px",
                    margin: "0 2px",
                    minWidth: 100,
                    textAlign: "center",
                    fontFamily: "'DM Sans', sans-serif",
                    fontSize: 13,
                    fontWeight: filled ? 700 : 400,
                    color: filled ? "#2563eb" : "#94a3b8",
                    letterSpacing: filled ? 0 : "2px",
                    verticalAlign: "baseline",
                  }}>
                  <span style={{ fontSize: 11, opacity: 0.7, marginRight: 2 }}>({gapNumber})</span>
                  {displayVal || "............"}
                </button>
                {/* Inline keyword badge */}
                {kw && (
                  <span style={{
                    fontFamily: "'DM Sans', sans-serif",
                    fontWeight: 700,
                    fontSize: 12,
                    color: "#1a1a2e",
                    letterSpacing: "0.5px",
                    marginLeft: 3,
                    marginRight: 1,
                  }}>({kw})</span>
                )}
              </span>
            );
          })}
        </span>
      </div>
    );
  }

  /* ── Mode B: items-only (no passage) → continuous text from before/after ── */
  return (
    <div style={{
      background: "#fff", padding: "20px 24px", borderRadius: 10,
      fontSize: "15.5px", lineHeight: "2.4", color: "#2d2d2d",
      fontFamily: "Georgia, 'Times New Roman', serif"
    }}>
      {part.title && (
        <strong style={{ display: "block", marginBottom: 12, color: C.dark, fontSize: 15 }}>
          {part.title}
        </strong>
      )}
      <span>
        {(part.items || []).map((item, i) => {
          const filled = ans[i] !== undefined && String(ans[i]).length > 0;
          const itemNum = startNum + i + 1;
          const kw = item.base || item.kw || '';
          return (
            <span key={i}>
              {/* sentence number */}
              <span style={{ fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 13, color: C.dark, marginRight: 4 }}>
                {itemNum}.
              </span>
              {item.before && <span>{item.before} </span>}
              {/* gap button */}
              <button
                type="button"
                onClick={() => requestPopup({
                  pi, i, number: itemNum, partLabel,
                  prompt: `Form a word from: ${kw}`,
                  variant: "input"
                })}
                style={{
                  display: "inline",
                  background: "none",
                  border: "none",
                  borderBottom: `1.5px solid ${filled ? "#2563eb" : "#94a3b8"}`,
                  cursor: "pointer",
                  padding: "0 4px",
                  margin: "0 2px",
                  minWidth: 100,
                  textAlign: "center",
                  fontFamily: "'DM Sans', sans-serif",
                  fontSize: 13,
                  fontWeight: filled ? 700 : 400,
                  color: filled ? "#2563eb" : "#94a3b8",
                  letterSpacing: filled ? 0 : "2px",
                  verticalAlign: "baseline",
                }}>
                <span style={{ fontSize: 11, opacity: 0.7, marginRight: 2 }}>({itemNum})</span>
                {filled ? String(ans[i]) : "............"}
              </button>
              {/* keyword badge */}
              {kw && (
                <span style={{
                  fontFamily: "'DM Sans', sans-serif",
                  fontWeight: 700, fontSize: 12,
                  color: "#1a1a2e", letterSpacing: "0.5px",
                  marginLeft: 3, marginRight: 4,
                }}>({kw})</span>
              )}
              {item.after && <span>{item.after}</span>}
              {i < (part.items.length - 1) && <span>{"  "}</span>}
            </span>
          );
        })}
      </span>
    </div>
  );
})()}

      {/* P4 — KWT (text mode): Format original cu design fluid */}
{/* P4 — Key Word Transformation (text mode) */}
{part.type === 'p4' && (
  <div style={{ background: "#fff", borderRadius: 12, padding: "15px" }}>
    {(part.items || []).map((item, i) => {
      const filled = ans[i] !== undefined && String(ans[i]).length > 0;
      const itemNum = startNum + i + 1;

      return (
        <div key={i} style={{
          marginBottom: "30px",
          paddingBottom: "15px",
          borderBottom: i < (part.items.length - 1) ? "1px solid #f1f5f9" : "none"
        }}>
          {/* Propoziția originală sus */}
          <div style={{ fontSize: "16px", color: "#475569", marginBottom: "12px", lineHeight: "1.5" }}>
            {item.s1}
          </div>

          {/* Rândul de transformare: Text + Gap + Keyword la dreapta */}
          <div style={{
            display: "grid",
            gridTemplateColumns: "1fr auto",
            gap: "25px",
            alignItems: "baseline"
          }}>
            <div style={{ fontSize: "17px", color: "#000", lineHeight: "1.6" }}>
              <strong style={{ marginRight: "10px", color: "#64748b" }}>{itemNum}.</strong>
              
              {item.before && <span>{item.before} </span>}
              
              <button type="button"
                className={`gap-btn ${filled ? 'filled' : ''}`}
                style={{
                  all: "unset",
                  cursor: "pointer",
                  display: "inline-block",
                  minWidth: "140px",
                  borderBottom: "1px solid #000",
                  textAlign: "center",
                  padding: "0 8px",
                  margin: "0 5px",
                  color: filled ? "#2563eb" : "#94a3b8",
                  fontWeight: "600"
                }}
                onClick={() => requestPopup({
                  pi, i, number: itemNum, partLabel,
                  prompt: item.s1,
                  keyword: item.kw,
                  variant: "input"
                })}>
                <span style={{ fontSize: "11px", opacity: 0.6, marginRight: "4px" }}>({itemNum})</span>
                {filled ? ans[i] : "........................."}
              </button>

              {item.after && <span> {item.after}</span>}
            </div>

            {/* Keyword-ul aliniat la dreapta */}
            <div style={{
              fontWeight: "700",
              textTransform: "uppercase",
              fontSize: "15px",
              letterSpacing: "1.5px",
              minWidth: "110px",
              textAlign: "right",
              color: "#1e293b"
            }}>
              {item.kw}
            </div>
          </div>
        </div>
      );
    })}
  </div>
)}
      {/* P5 — Multiple Choice Reading */}
      {part.type==='p5' && <>
        {part.title && <strong className="title" style={{display:"block",marginBottom:10,color:C.dark,fontSize:15}}>{part.title}</strong>}
        {part.text && <div className="passage" style={{whiteSpace:"pre-wrap",marginBottom:16}}>{part.text}</div>}
        <div>
          {(part.items||[]).map((item,i)=>{
            const filled = ans[i] !== undefined && ans[i] !== '';
            return (
              <div key={i} className={`q-row${filled?' answered':''}`}
                onClick={()=>requestPopup({
                  pi, i, number:startNum+i+1, partLabel,
                  prompt: item.question,
                  variant:"mc",
                  options:(item.options||[]).map((opt, oi) => ({
                    value: String(oi), letter: ['A','B','C','D'][oi], label: opt
                  }))
                })}>
                <span className="q-num">{startNum+i+1}.</span>
                <span className="q-text">{item.question}</span>
                <span className="q-ans">{filled ? ['A','B','C','D'][parseInt(ans[i])] : <span className="q-ans-empty">—</span>}</span>
              </div>
            );
          })}
        </div>
      </>}

      {/* P6 — Gapped Text */}
      {part.type==='p6' && <>
        {part.title && <strong className="title" style={{display:"block",marginBottom:10,color:C.dark,fontSize:15}}>{part.title}</strong>}
        {part.text && (
          <div className="passage" style={{marginBottom:16}}>
            <GapText text={part.text} ans={ans} kind="select"
              onGapClick={(itemIdx, n) => requestPopup({
                pi, i:itemIdx, number:n, partLabel,
                prompt:"Choose the paragraph that fits this gap.",
                variant:"paragraphs",
                options:(part.paragraphs||[]).map(p => ({ value: p.label, label: p.content }))
              })}/>
          </div>
        )}
        <div>
          <div style={{fontWeight:700,color:"#94a3b8",fontSize:10,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Available paragraphs</div>
          <div className="para-grid">
            {(part.paragraphs||[]).map((p,i)=>(
              <div key={i} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 12px",fontSize:12,lineHeight:1.65}}>
                <strong style={{color:C.mid,marginRight:6}}>{p.label}.</strong>{p.content}
              </div>
            ))}
          </div>
        </div>
      </>}

      {/* P7 — Multiple Matching */}
      {part.type==='p7' && <>
        <div style={{marginBottom:16}}>
          {(part.texts||[]).map((t,i)=>(
            <div key={i} className="passage" style={{padding:"12px 14px",marginBottom:8,fontSize:13,lineHeight:1.7}}>
              <strong className="title" style={{marginBottom:6}}>{t.label}. {t.title}</strong>
              {t.content}
            </div>
          ))}
        </div>
        <div>
          {(part.items||[]).map((item,i)=>{
            const filled = ans[i] !== undefined && ans[i] !== '';
            return (
              <div key={i} className={`q-row${filled?' answered':''}`}
                onClick={()=>requestPopup({
                  pi, i, number:startNum+i+1, partLabel,
                  prompt: item.question,
                  variant:"mc",
                  options:(part.texts||[]).map(t => ({
                    value: t.label, letter: t.label, label: t.title || `Section ${t.label}`
                  }))
                })}>
                <span className="q-num">{startNum+i+1}.</span>
                <span className="q-text">{item.question}</span>
                <span className="q-ans">{filled ? ans[i] : <span className="q-ans-empty">—</span>}</span>
              </div>
            );
          })}
        </div>
      </>}

      {/* P8 — Cross-text Multiple Matching */}
      {part.type==='p8' && <>
        <div className="para-grid" style={{marginBottom:16}}>
          {(part.texts||[]).map((t,i)=>(
            <div key={i} className="passage" style={{padding:"12px 14px",fontSize:13,lineHeight:1.7}}>
              <strong className="title" style={{marginBottom:6}}>{t.label}. {t.title}</strong>
              {t.content}
            </div>
          ))}
        </div>
        <div>
          {(part.items||[]).map((item,i)=>{
            const filled = ans[i] !== undefined && ans[i] !== '';
            return (
              <div key={i} className={`q-row${filled?' answered':''}`}
                onClick={()=>requestPopup({
                  pi, i, number:startNum+i+1, partLabel,
                  prompt: item.question,
                  variant:"mc",
                  options:(part.texts||[]).map(t => ({
                    value: t.label, letter: t.label, label: t.title || `Text ${t.label}`
                  }))
                })}>
                <span className="q-num">{startNum+i+1}.</span>
                <span className="q-text">{item.question}</span>
                <span className="q-ans">{filled ? ans[i] : <span className="q-ans-empty">—</span>}</span>
              </div>
            );
          })}
        </div>
      </>}

      {/* EC — Error Correction */}
      {part.type==='ec' && <>
        {part.title && <strong style={{color:C.dark,display:"block",marginBottom:8}}>{part.title}</strong>}
        {part.intro && <div style={{fontSize:12,color:"#666",marginBottom:10,fontStyle:"italic"}}>{part.intro}</div>}
        <div className="line-list">
          {(part.lines||[]).map((line,i)=>{
            const filled = ans[i] !== undefined && String(ans[i]).length > 0;
            return (
              <div key={i} className={`line-row${filled?' answered':''}`}
                onClick={()=>requestPopup({
                  pi, i, number:startNum+i+1, partLabel,
                  prompt:"Write the extra word, or ✓ if the line is correct.",
                  variant:"input"
                })}>
                <span className="ln-num">{startNum+i+1}.</span>
                <span className="ln-text" style={{fontFamily:"'Courier New',monospace",fontSize:13}}>{line}</span>
                <span className="ln-ans">
                  {filled
                    ? <span style={{fontWeight:700,color:C.mid,fontFamily:"monospace"}}>{ans[i]}</span>
                    : <span style={{color:"#cbd5e1"}}>—</span>}
                </span>
              </div>
            );
          })}
        </div>
      </>}

      {/* MC — Simple Multiple Choice (popup) */}
      {part.type==='mc' && <>
        {part.title && <strong style={{color:C.dark,display:"block",marginBottom:8}}>{part.title}</strong>}
        {part.text && <div className="passage" style={{marginBottom:16,whiteSpace:"pre-wrap"}}>{part.text}</div>}
        <div>
          {(part.items||[]).map((item,i)=>{
            const filled = ans[i] !== undefined && ans[i] !== '';
            return (
              <div key={i} className={`q-row${filled?' answered':''}`}
                onClick={()=>requestPopup({
                  pi, i, number:startNum+i+1, partLabel,
                  prompt: item.question,
                  variant:"mc",
                  options:(item.options||[]).map((opt, oi) => ({
                    value: String(oi), letter: ['A','B','C','D','E','F'][oi], label: opt
                  }))
                })}>
                <span className="q-num">{startNum+i+1}.</span>
                <span className="q-text">{item.question}</span>
                <span className="q-ans">{filled ? ['A','B','C','D','E','F'][parseInt(ans[i])] : <span className="q-ans-empty">—</span>}</span>
              </div>
            );
          })}
        </div>
      </>}

      {/* E1 — Error Correction I (extra word) */}
      {part.type==='e1' && <>
        {part.title && <strong style={{color:C.dark,display:"block",marginBottom:8}}>{part.title}</strong>}
        {part.intro && <div style={{fontSize:12,color:"#666",marginBottom:10,fontStyle:"italic"}}>{part.intro}</div>}
        <div className="line-list">
          {(part.lines||[]).map((line,i)=>{
            const filled = ans[i] !== undefined && String(ans[i]).length > 0;
            return (
              <div key={i} className={`line-row${filled?' answered':''}`}
                onClick={()=>requestPopup({
                  pi, i, number:startNum+i+1, partLabel:"E1",
                  prompt:"Write the extra word, or ✓ if the line is correct.",
                  variant:"input"
                })}>
                <span className="ln-num">{startNum+i+1}.</span>
                <span className="ln-text" style={{fontFamily:"'Courier New',monospace",fontSize:13}}>{line}</span>
                <span className="ln-ans">
                  {filled
                    ? <span style={{fontWeight:700,color:C.mid,fontFamily:"monospace"}}>{ans[i]}</span>
                    : <span style={{color:"#cbd5e1"}}>—</span>}
                </span>
              </div>
            );
          })}
        </div>
      </>}

      {/* E2 — Error Correction II (wrong word → correction) */}
      {part.type==='e2' && <>
        {part.title && <strong style={{color:C.dark,display:"block",marginBottom:8}}>{part.title}</strong>}
        {part.intro && <div style={{fontSize:12,color:"#666",marginBottom:10,fontStyle:"italic"}}>{part.intro}</div>}
        <div className="line-list">
          {(part.lines||[]).map((line,i)=>{
            const filled = ans[i] !== undefined && String(ans[i]).length > 0;
            return (
              <div key={i} className={`line-row${filled?' answered':''}`}
                onClick={()=>requestPopup({
                  pi, i, number:startNum+i+1, partLabel:"E2",
                  prompt:"Write the correct word that replaces the error, or ✓ if the line is correct.",
                  variant:"input"
                })}>
                <span className="ln-num">{startNum+i+1}.</span>
                <span className="ln-text" style={{fontFamily:"'Courier New',monospace",fontSize:13}}>{line}</span>
                <span className="ln-ans">
                  {filled
                    ? <span style={{fontWeight:700,color:C.mid,fontFamily:"monospace"}}>{ans[i]}</span>
                    : <span style={{color:"#cbd5e1"}}>—</span>}
                </span>
              </div>
            );
          })}
        </div>
      </>}
    </div>
  );
}

function S3Text({segments}) {
  return <span>{segments.map((seg,i) =>
    typeof seg === "string"
      ? <span key={i}>{seg}</span>
      : <span key={i} style={{background:C.dark,color:"#fff",borderRadius:4,fontSize:11,fontWeight:700,padding:"1px 6px",margin:"0 2px"}}>({seg.g})</span>
  )}</span>;
}

function ExamApp() {
  CPEEN.seedInitialData();

  const initialView = (()=>{
    const sid = new URLSearchParams(window.location.search).get("sid");
    return sid ? "loading" : "code";
  })();

  const [view,    setView]    = useState(initialView);
  const [code,    setCode]    = useState("");
  const [codeErr, setCodeErr] = useState("");
  const [ptcp,    setPtcp]    = useState(null);
  const [sess,    setSess]    = useState(null);
  const [exam,    setExam]    = useState(null);
  const [variant, setVariant] = useState(null);
  const [answers, setAnswers] = useState({s1:[],s2:[],s3:[],s4:[],writing:""});
  const [timeLeft, setTimeLeft] = useState(0);
  const [result,  setResult]  = useState(null);
  const [bootErr, setBootErr] = useState("");
  const [popup,   setPopup]   = useState(null); // null or {pi,i,number,variant,prompt,partLabel,options,keyword}
  const [noExamReason, setNoExamReason] = useState(""); // "group_pending" | "group_finished" | ""
  const [checking, setChecking] = useState(false);
  const timerRef      = useRef(null);
  const subRef        = useRef(false);
  const sessIdRef     = useRef(null);
  const answersRef    = useRef({s1:[],s2:[],s3:[],s4:[],writing:""});
  const sessRef       = useRef(null);
  const examRef       = useRef(null);
  const variantRef    = useRef(null);
  const noExamSessRef = useRef(null);
  const noExamPtcpRef = useRef(null);

  const setAns = (sec, i, v) => {
    setAnswers(prev => {
      let next;
      if (typeof sec === 'number') {
        // new parts[] format: sec = partIndex, i = itemIndex
        const parts = (prev.parts||[]).map((p,pi)=>pi===sec?p.map((x,j)=>j===i?v:x):p);
        next = {...prev, parts};
      } else if (sec === 'writing') {
        next = {...prev, writing: v};
      } else {
        // old s1/s2/s3/s4 format
        next = {...prev,[sec]:typeof i==="number"?prev[sec].map((x,j)=>j===i?v:x):v};
      }
      answersRef.current = next;
      if(sessIdRef.current) CPEEN.updateSession(sessIdRef.current, {answers: next});
      return next;
    });
  };

  const doSubmit = useCallback((curAnswers, curSess, curExam, curVariant) => {
    if(subRef.current) return;
    subRef.current = true;
    clearInterval(timerRef.current);
    const res = CPEEN.gradeSession({...curSess, answers: curAnswers}, curExam);
    const updated = CPEEN.updateSession(curSess.id, {
      answers: curAnswers, result: res, status: "submitted",
      submittedAt: Date.now(), locked: true
    });
    setResult(res);
    setSess(updated);
    setVariant(curVariant);
    setView("result");
  }, []);

  // Loads a session into the view: "result" if submitted, else "exam" (timer started).
  const loadSession = (p, s) => {
    // Submitted → result view
    if(s.status === "submitted") {
      const ex = CPEEN.getExams().find(e => e.id === s.examId) ||
                 CPEEN.getExamForParticipant(s.level, s.stage);
      const v  = ex?.variants?.find(v => v.id === s.variantId);
      setPtcp(p); setSess(s); setExam(ex); setVariant(v); setResult(s.result);
      setView("result");
      return;
    }

    // Pending → check group activation for group sessions only.
    // Standalone sessions (no groupId) are always joinable once allocated.
    if(s.status === "pending" && s.groupId) {
      const grp = CPEEN.getGroupSessions().find(g => g.id === s.groupId);
      if (!grp || grp.status !== "active") {
        noExamSessRef.current = s;
        noExamPtcpRef.current = p;
        setPtcp(p);
        setNoExamReason(grp?.status === "finished" ? "group_finished" : "group_pending");
        setView("noExam");
        return;
      }
    }

    const ex = CPEEN.getExams().find(e => e.id === s.examId) ||
               CPEEN.getExamForParticipant(s.level, s.stage);
    if(!ex) { setPtcp(p); setView("noExam"); return; }

    if(s.status === "pending") {
      s = CPEEN.updateSession(s.id, {status:"in_progress", startedAt: Date.now()});
    }

    const v = ex.variants.find(v => v.id === s.variantId);
    const grp = s.groupId ? CPEEN.getGroupSessions().find(g => g.id === s.groupId) : null;
    const remaining = grp?.endsAt
      ? Math.max(0, Math.floor((grp.endsAt - Date.now()) / 1000))
      : Math.max(0, ex.duration * 60 - Math.floor((Date.now() - s.startedAt) / 1000));

    if(remaining === 0) {
      doSubmit(s.answers, s, ex, v);
      return;
    }

    subRef.current = false;
    sessIdRef.current = s.id;
    examRef.current = ex;
    variantRef.current = v;
    sessRef.current = s;
    answersRef.current = s.answers;
    setPtcp(p); setSess(s); setExam(ex); setVariant(v);
    setAnswers(s.answers);
    setTimeLeft(remaining);
    setView("exam");
  };

  // Bootstrap from ?sid= URL param (called from dashboard)
  useEffect(() => {
    const sid = new URLSearchParams(window.location.search).get("sid");
    if(!sid) return;
    const s = CPEEN.getSessions().find(x => x.id === sid);
    if(!s) {
      setBootErr("Session not found. Return to your dashboard and try again.");
      setView("bootErr");
      return;
    }
    const p = CPEEN.getParticipants().find(x => x.id === s.participantId);
    if(!p) {
      setBootErr("Participantul asociat sesiunii nu a fost găsit.");
      setView("bootErr");
      return;
    }
    loadSession(p, s);
  }, []);

  const enterCode = () => {
    setCodeErr("");
    const p = CPEEN.findParticipantByCode(code);
    if(!p) { setCodeErr("Invalid access code. Please check and try again."); return; }

    const allSess = CPEEN.getSessionsByParticipant(p.id);
    const groups  = CPEEN.getGroupSessions();

    // 1. Already started — always resume
    let s = allSess.find(x => x.status === "in_progress");

    // 2. Pending session whose group is active right now
    if (!s) {
      s = allSess.find(x => {
        if (x.status !== "pending") return false;
        if (x.groupId) {
          const grp = groups.find(g => g.id === x.groupId);
          return grp?.status === "active";
        }
        const cfg = CPEEN.getConfig();
        return !!(cfg.activeExams?.[x.level]?.[x.stage]);
      });
    }

    // 3. Latest submitted — show result
    if (!s) {
      const submitted = allSess.filter(x => x.status === "submitted")
        .sort((a,b) => (b.submittedAt||0) - (a.submittedAt||0));
      s = submitted[0] || null;
    }

    if(s) { loadSession(p, s); return; }

    // 4. Allocated to a group session but group hasn't started (or is finished)
    const pendingGroupSess = allSess.find(x => x.status === "pending" && x.groupId);
    if (pendingGroupSess) {
      const grp = groups.find(g => g.id === pendingGroupSess.groupId);
      noExamSessRef.current = pendingGroupSess;
      noExamPtcpRef.current = p;
      setPtcp(p);
      setNoExamReason(grp?.status === "finished" ? "group_finished" : "group_pending");
      setView("noExam");
      return;
    }

    // 5. Legacy no-group fallback
    const stage = CPEEN.isQualified(p) ? "finala" : "calificare";
    const cfg = CPEEN.getConfig();
    if(!cfg.activeExams?.[p.level]?.[stage]) {
      setNoExamReason(""); setPtcp(p); setView("noExam"); return;
    }
    const ex = CPEEN.getExamForParticipant(p.level, stage);
    if(!ex) { setNoExamReason(""); setPtcp(p); setView("noExam"); return; }
    const vIdx = Math.floor(Math.random() * ex.variants.length);
    s = CPEEN.createSession(p.id, ex, ex.variants[vIdx].id);
    loadSession(p, s);
  };

  // Auto-check: when waiting for a group session to start, poll Firestore every 5s
  const retryGroupCheck = useCallback(() => {
    const s = noExamSessRef.current;
    const p = noExamPtcpRef.current;
    if (!s || !p) return;
    setChecking(true);
    CPEEN.init().then(() => {
      setChecking(false);
      const grp = CPEEN.getGroupSessions().find(g => g.id === s.groupId);
      if (grp?.status === "active") {
        setNoExamReason("");
        loadSession(p, s);
      }
    });
  }, []);

  useEffect(() => {
    if (view !== "noExam" || noExamReason !== "group_pending") return;
    const id = setInterval(retryGroupCheck, 5000);
    return () => clearInterval(id);
  }, [view, noExamReason]);

  // Timer — uses refs so auto-submit always sees current values
  useEffect(() => {
    if(view !== "exam") return;
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if(t <= 1) {
          clearInterval(timerRef.current);
          setTimeout(() => doSubmit(answersRef.current, sessRef.current, examRef.current, variantRef.current), 0);
          return 0;
        }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [view]);

  // ── Loading view (while bootstrapping from ?sid=) ───────────────────────
  if(view === "loading") return (
    <>
      <Navbar/>
      <div className="page-center"><div className="wrap-sm">
        <div className="card"><div className="card-body" style={{textAlign:"center",padding:40}}>
          <div style={{fontSize:14,color:C.mid}}>Loading session…</div>
        </div></div>
      </div></div>
    </>
  );

  // ── Boot error (sid invalid) ─────────────────────────────────────────────
  if(view === "bootErr") return (
    <>
      <Navbar/>
      <div className="page-center"><div className="wrap-sm">
        <div className="card">
          <div className="card-head" style={{textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:8}}>⚠️</div>
            <h2>Session unavailable</h2>
          </div>
          <div className="card-body" style={{textAlign:"center"}}>
            <p style={{marginBottom:16,color:"#666"}}>{bootErr}</p>
            <a href="dashboard.html" className="btn btn-primary btn-lg btn-block">← Back to dashboard</a>
          </div>
        </div>
      </div></div>
    </>
  );

  // ── Code entry view ─────────────────────────────────────────────────────
  if(view === "code") return (
    <>
      <Navbar/>
      <div className="page-center">
        <div className="wrap-sm">
          <div className="card">
            <div className="card-head" style={{textAlign:"center"}}>
              <h2>Exam Access</h2>
              <p>ECHO · Enter your access code</p>
            </div>
            <div className="card-body">
              <div className="fg">
                <label>Access code<span className="req">*</span></label>
                <input className={`inp${codeErr?" err":""}`}
                  value={code} onChange={e=>setCode(e.target.value.toUpperCase())}
                  onKeyDown={e=>e.key==="Enter"&&enterCode()}
                  placeholder="e.g. ABC12345" maxLength={8}
                  style={{letterSpacing:4,fontSize:20,fontFamily:"monospace",textAlign:"center"}}/>
                {codeErr && <div className="ferr">{codeErr}</div>}
              </div>
              <button className="btn btn-primary btn-lg btn-block" onClick={enterCode}>
                Enter exam →
              </button>
              <div style={{textAlign:"center",marginTop:14}}>
                <a href="register.html" style={{fontSize:13}}>No code? Register →</a>
              </div>
            </div>
          </div>
          <div className="text-center text-muted" style={{marginTop:14}}>ECHO · englishgrammarchallenge.ro</div>
        </div>
      </div>
    </>
  );

  // ── No exam available ───────────────────────────────────────────────────
  if(view === "noExam") {
    const isGroupPending  = noExamReason === "group_pending";
    const isGroupFinished = noExamReason === "group_finished";
    return (
      <>
        <Navbar/>
        <div className="page-center">
          <div className="wrap-sm">
            <div className="card">
              <div className="card-head" style={{textAlign:"center"}}>
                <div style={{fontSize:36,marginBottom:8}}>{isGroupFinished ? "🏁" : "⏳"}</div>
                <h2>{isGroupFinished ? "Session ended" : "Waiting for session to start"}</h2>
                <p>Welcome, {ptcp?.name}</p>
              </div>
              <div className="card-body" style={{textAlign:"center"}}>
                {isGroupPending && <>
                  <p style={{fontSize:14,color:"#333",marginBottom:8,fontWeight:600}}>
                    You have been allocated to this exam session.
                  </p>
                  <p style={{fontSize:13,color:"#666",marginBottom:20}}>
                    Wait for the teacher/administrator to start the session.
                    This page refreshes automatically every 5 seconds.
                  </p>
                  <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
                    <button className="btn btn-mid" onClick={retryGroupCheck} disabled={checking}>
                      {checking ? "Checking…" : "↺ Check now"}
                    </button>
                    <a href="dashboard.html" className="btn btn-outline">← Dashboard</a>
                  </div>
                  <div style={{marginTop:16,fontSize:11,color:"#aaa"}}>
                    {checking ? "Syncing with server…" : "Auto-refresh active…"}
                  </div>
                </>}
                {isGroupFinished && <>
                  <p style={{fontSize:13,color:"#666",marginBottom:20}}>
                    The session you were allocated to has ended. Contact your administrator for more details.
                  </p>
                  <a href="dashboard.html" className="btn btn-primary">← Dashboard</a>
                </>}
                {!isGroupPending && !isGroupFinished && <>
                  <p style={{fontSize:14,color:"#555",marginBottom:8}}>Welcome, <strong>{ptcp?.name}</strong>.</p>
                  <p style={{fontSize:13,color:"#777",marginBottom:20}}>
                    No exam has been activated yet. Please check back later.
                  </p>
                  <a href="index.html" className="btn btn-primary">← Home</a>
                </>}
              </div>
            </div>
          </div>
        </div>
      </>
    );
  }

  // ── Result view ─────────────────────────────────────────────────────────
  if(view === "result" && result && variant) {
    const cfg = CPEEN.getConfig();
    if(!cfg.showResultsImmediately) return (
      <>
        <Navbar/>
        <div className="page-center">
          <div className="wrap-sm">
            <div className="card">
              <div className="card-head" style={{textAlign:"center"}}>
                <div style={{fontSize:36,marginBottom:8}}>✅</div>
                <h2>Lucrare trimisă!</h2>
                <p>Răspunsurile tale au fost salvate.</p>
              </div>
              <div className="card-body" style={{textAlign:"center"}}>
                <p style={{fontSize:14,color:"#555",marginBottom:20}}>Results will be released by your administrator.</p>
                <a href="index.html" className="btn btn-primary">← Home</a>
              </div>
            </div>
          </div>
        </div>
      </>
    );

    const isNew = !!(variant.parts && variant.parts.length);
    const secs = isNew
      ? variant.parts.map((part,pi) => {
          const count = getPartCount(part);
          const correct = (result.details?.[pi]||[]).filter(Boolean).length;
          return { lbl:`Part ${pi+1} — ${PART_LABELS[part.type]||part.type}`, score:correct*part.pts, max:count*part.pts };
        })
      : [
          {k:"s1",lbl:"KWT",       max:variant.s1.key.length*variant.s1.pts},
          {k:"s2",lbl:"Error Corr",max:variant.s2.key.length*variant.s2.pts},
          {k:"s3",lbl:"Open Cloze",max:variant.s3.key.length*variant.s3.pts},
          {k:"s4",lbl:"Word Form", max:variant.s4.key.length*variant.s4.pts},
        ];
    return (
      <>
        <Navbar/>
        <div className="page-center" style={{alignItems:"flex-start",paddingTop:32}}>
          <div className="wrap-sm">
            <div className="card">
              <div className="card-head" style={{textAlign:"center",padding:"28px",background:"#1e3a5f",borderBottom:"none"}}>
                <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:8,textTransform:"uppercase"}}>
                  ECHO · {ptcp?.level} · {ptcp?.stage==="finala"?"Final":"Qualifying"} · {variant.id}
                </div>
                <div style={{color:"#fff",fontSize:44,fontWeight:700,lineHeight:1}}>{result.total}</div>
                <div style={{color:"#94a3b8",fontSize:13,marginTop:6}}>points out of 100 · Grade: <strong style={{fontSize:17,color:"#e2e8f0"}}>{(result.total/10).toFixed(2)}</strong></div>
              </div>
              <div className="card-body">
                <div style={{fontWeight:700,color:C.dark,fontSize:15}}>{ptcp?.name}</div>
                <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>{ptcp?.school} · Grade {ptcp?.grade} · {ptcp?.county}</div>
                {secs.map((sec,idx)=>{
                  const sc = isNew ? sec.score : result.details[sec.k].filter(Boolean).length*(sec.max/Math.max(1,result.details[sec.k].length));
                  return (
                    <div key={idx} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
                        <span style={{color:C.dark,fontWeight:600}}>{sec.lbl}</span>
                        <span style={{fontWeight:700,color:C.mid}}>{Math.round(sc)}/{sec.max}p</span>
                      </div>
                      <div style={{background:"#eee",borderRadius:4,height:7}}>
                        <div style={{background:C.mid,width:`${sec.max?(sc/sec.max*100):0}%`,height:7,borderRadius:4}}/>
                      </div>
                    </div>
                  );
                })}
                <div className="alert alert-warn" style={{marginTop:12}}>
                  The KWT section may be manually reviewed by your teacher.
                </div>
                {sess?.answers?.writing && (
                  <div className="alert alert-info" style={{marginTop:8}}>
                    Your writing response has been saved and will be graded manually.
                    {sess.writingGrade !== null && <> · <strong>Writing grade: {sess.writingGrade}/20</strong></>}
                  </div>
                )}
                <div style={{textAlign:"center",marginTop:14,color:"#888",fontSize:11}}>
                  Your answers have been saved.<br/>
                  <span style={{color:C.mid}}>englishgrammarchallenge.ro · ECHO</span>
                </div>
                <a href="dashboard.html" className="btn btn-primary btn-block mt16" style={{display:"flex"}}>← Back to dashboard</a>
              </div>
            </div>
          </div>
        </div>
      </>
    );
  }

  // ── Exam view ───────────────────────────────────────────────────────────
  if(view === "exam" && variant) {
    const urgent = timeLeft < 300;
    const hasWriting = !!variant.writing;
    const isNewFormat = !!(variant.parts && variant.parts.length);
    return (
      <div style={{minHeight:"100vh",background:"#f0f4f8"}}>
        {/* Sticky header */}
        <div style={{position:"sticky",top:0,zIndex:100,background:C.dark,padding:"9px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid rgba(255,255,255,.08)"}}>
          <div style={{color:"#94a3b8",fontSize:11,fontWeight:600,letterSpacing:1}}>
            <span style={{background:LVL_C[ptcp?.level],color:"#fff",borderRadius:6,padding:"1px 7px",marginRight:8,fontWeight:700}}>{ptcp?.level}</span>
            {ptcp?.stage==="finala"?"Final":"Qualifying"} · {variant.id} · {ptcp?.name}
          </div>
          <div className={`timer${urgent?" urgent":""}`}>⏱ {fmt(timeLeft)}</div>
          <div style={{display:"flex",gap:5}}>
            {isNewFormat
              ? (variant.parts||[]).map((p,pi)=>{
                  const lbl = p.type==='e1'?'E1':p.type==='e2'?'E2':`P${pi+1}`;
                  return (
                    <button key={pi} onClick={()=>document.getElementById(`part${pi}`)?.scrollIntoView({behavior:"smooth"})}
                      style={{background:"rgba(255,255,255,.15)",color:"#fff",border:"none",borderRadius:6,padding:"3px 9px",cursor:"pointer",fontSize:12,fontWeight:600}}>{lbl}</button>
                  );
                })
              : [1,2,3,4].map(n=>(
                  <button key={n} onClick={()=>document.getElementById(`sec${n}`)?.scrollIntoView({behavior:"smooth"})}
                    style={{background:"rgba(255,255,255,.15)",color:"#fff",border:"none",borderRadius:6,padding:"3px 9px",cursor:"pointer",fontSize:12,fontWeight:600}}>S{n}</button>
                ))
            }
            {hasWriting && (
              <button onClick={()=>document.getElementById("sec5")?.scrollIntoView({behavior:"smooth"})}
                style={{background:"rgba(255,255,255,.15)",color:"#fff",border:"none",borderRadius:6,padding:"3px 9px",cursor:"pointer",fontSize:12,fontWeight:600}}>W</button>
            )}
          </div>
        </div>

        <div className="exam-wrap" style={{maxWidth:750,margin:"0 auto",padding:"22px 16px 80px"}}>

          {/* New parts[] format */}
          {isNewFormat && (variant.parts||[]).map((part,pi)=>{
            const startNum = variant.parts.slice(0,pi).reduce((acc,p)=>acc+getPartCount(p),0);
            return (
              <PartSection key={pi} part={part} pi={pi}
                ans={(answers.parts||[])[pi]||[]}
                setAns={setAns}
                startNum={startNum}
                requestPopup={cfg=>setPopup(cfg)}/>
            );
          })}

          {/* Legacy S1–S4 format */}
          {!isNewFormat && <>
            {/* S1 – KWT */}
            <div id="sec1" style={{background:"#fff",borderRadius:12,padding:22,marginBottom:22,border:"1px solid #e2e8f0"}}>
              <div className="sec-badge">
                <span>SECTION 1 — KEY WORD TRANSFORMATIONS</span>
                <span>{variant.s1.items.length} × {variant.s1.pts} = {variant.s1.items.length*variant.s1.pts} pts</span>
              </div>
              <div className="instr">Complete the second sentence using the word given. Do NOT change the word given. Use between THREE and SIX words including the word given.</div>
              {variant.s1.items.map((item,i)=>(
                <div key={i} style={{borderBottom:"1px solid #eee",paddingBottom:14,marginBottom:14}}>
                  <div style={{fontSize:13,color:"#333",marginBottom:5}}><strong style={{color:C.dark,marginRight:5}}>{i+1}.</strong>{item.s1}</div>
                  <div style={{display:"inline-block",background:C.dark,color:"#fff",fontWeight:700,fontSize:10,letterSpacing:2,padding:"2px 9px",borderRadius:4,marginBottom:7}}>{item.kw}</div>
                  <div style={{fontSize:13,color:"#333",display:"flex",alignItems:"center",flexWrap:"wrap",gap:4}}>
                    {item.before&&<span>{item.before}</span>}
                    <input className="ans-inp" value={answers.s1[i]||""} onChange={e=>setAns("s1",i,e.target.value)}
                      placeholder="3–6 words..." style={{width:210}}/>
                    {item.after&&<span>{item.after}</span>}
                  </div>
                </div>
              ))}
            </div>

            {/* S2 – Error Correction */}
            <div id="sec2" style={{background:"#fff",borderRadius:12,padding:22,marginBottom:22,border:"1px solid #e2e8f0"}}>
              <div className="sec-badge">
                <span>SECTION 2 — ERROR CORRECTION</span>
                <span>{variant.s2.key.length} × {variant.s2.pts} = {variant.s2.key.length*variant.s2.pts} pts</span>
              </div>
              <div className="instr">Each numbered line contains ONE error. Write the correct word. Write DELETE if a word should be removed.</div>
              <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:12,marginBottom:14,fontFamily:"'Courier New',monospace",fontSize:12,lineHeight:2}}>
                <div style={{color:"#999",marginBottom:4}}>{variant.s2.intro}</div>
                <strong style={{color:C.dark,display:"block",marginBottom:6}}>{variant.s2.text}</strong>
                {variant.s2.lines.map((line,i)=>(
                  <div key={i} style={{display:"flex",gap:6,alignItems:"baseline"}}>
                    <span style={{color:C.dark,fontWeight:700,minWidth:18}}>{i+1}.</span>
                    <span>{line}</span>
                  </div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                {variant.s2.key.map((_,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontWeight:700,color:C.dark,minWidth:24,fontSize:12}}>{i+1}.</span>
                    <input className="ans-inp" value={answers.s2[i]||""} onChange={e=>setAns("s2",i,e.target.value)}
                      placeholder="correct word / DELETE" style={{flex:1}}/>
                  </div>
                ))}
              </div>
            </div>

            {/* S3 – Open Cloze */}
            <div id="sec3" style={{background:"#fff",borderRadius:12,padding:22,marginBottom:22,border:"1px solid #e2e8f0"}}>
              <div className="sec-badge">
                <span>SECTION 3 — OPEN CLOZE</span>
                <span>{variant.s3.key.length} × {variant.s3.pts} = {variant.s3.key.length*variant.s3.pts} pts</span>
              </div>
              <div className="instr">Read the text and think of ONE word which best fits each gap.</div>
              <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:14,marginBottom:14,fontSize:13,lineHeight:1.9}}>
                <strong style={{color:C.dark,display:"block",marginBottom:8}}>{variant.s3.title}</strong>
                <S3Text segments={variant.s3.segments}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                {variant.s3.key.map((_,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontWeight:700,color:C.dark,minWidth:28,fontSize:12}}>({i+1})</span>
                    <input className="ans-inp" value={answers.s3[i]||""} onChange={e=>setAns("s3",i,e.target.value)}
                      placeholder="one word" style={{flex:1}}/>
                  </div>
                ))}
              </div>
            </div>

            {/* S4 – Word Formation */}
            <div id="sec4" style={{background:"#fff",borderRadius:12,padding:22,marginBottom:22,border:"1px solid #e2e8f0"}}>
              <div className="sec-badge">
                <span>SECTION 4 — WORD FORMATION</span>
                <span>{variant.s4.items.length} × {variant.s4.pts} = {variant.s4.items.length*variant.s4.pts} pts</span>
              </div>
              <div className="instr">Use the word in CAPITALS to form a word that fits the gap.</div>
              {variant.s4.items.map((item,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:9,flexWrap:"wrap"}}>
                  <span style={{fontWeight:700,color:C.dark,minWidth:22,fontSize:12}}>{i+1}.</span>
                  <span style={{fontSize:13}}>{item.before}</span>
                  <input className="ans-inp" value={answers.s4[i]||""} onChange={e=>setAns("s4",i,e.target.value)}
                    placeholder="..." style={{width:160}}/>
                  <span style={{fontSize:13}}>{item.after}</span>
                  <span style={{background:"#e2e8f0",color:C.dark,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,letterSpacing:1}}>{item.kw}</span>
                </div>
              ))}
            </div>
          </>}

          {/* Writing (optional) — both formats */}
          {hasWriting && (
            <div id="sec5" style={{background:"#fff",borderRadius:12,padding:22,marginBottom:22,border:"1px solid #e2e8f0"}}>
              <div className="sec-badge">
                <span>WRITING</span>
                <span>manually graded</span>
              </div>
              <div className="instr">{variant.writing.prompt}</div>
              {variant.writing.minWords && (
                <div style={{fontSize:11,color:"#888",marginBottom:8}}>{variant.writing.minWords}–{variant.writing.maxWords} words</div>
              )}
              <textarea className="inp" value={answers.writing||""} onChange={e=>setAns("writing",null,e.target.value)}
                rows={10} style={{resize:"vertical",lineHeight:1.6}} placeholder="Write your answer here..."/>
              <div style={{fontSize:11,color:"#888",marginTop:4}}>
                Words: {(answers.writing||"").trim().split(/\s+/).filter(Boolean).length}
              </div>
            </div>
          )}

          {/* Submit */}
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:12,color:"#888",marginBottom:8}}>Check all answers before submitting.</div>
            <button onClick={()=>doSubmit(answersRef.current,sessRef.current,examRef.current,variantRef.current)}
              style={{background:C.mid,color:"#fff",border:"none",borderRadius:8,padding:"13px 44px",fontSize:15,fontWeight:700,cursor:"pointer",letterSpacing:.5,transition:"background .12s"}}
              onMouseEnter={e=>e.target.style.background="#1d4ed8"}
              onMouseLeave={e=>e.target.style.background=C.mid}>
              Submit exam →
            </button>
          </div>
        </div>

        {popup && (
          <GapPopup
            open
            number={popup.number}
            partLabel={popup.partLabel}
            prompt={popup.prompt}
            variant={popup.variant}
            options={popup.options}
            keyword={popup.keyword}
            current={(answers.parts||[])[popup.pi]?.[popup.i] ?? ''}
            onSubmit={v => setAns(popup.pi, popup.i, v)}
            onClose={() => setPopup(null)}
          />
        )}
      </div>
    );
  }

  return null;
}

document.getElementById("root").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,system-ui,sans-serif;color:#2563eb;font-size:14px;">Loading…</div>';
CPEEN.init().then(()=>ReactDOM.createRoot(document.getElementById("root")).render(<ExamApp/>));
</script>
</body>
</html>

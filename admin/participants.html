<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Participanți – Admin ECHO</title>
<link rel="stylesheet" href="../css/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="../js/config.js"></script>
<script src="../js/db.js"></script>
<script src="../js/admin.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;
const C = {dark:"#0f172a",mid:"#2563eb",red:"#dc2626",green:"#15803d"};
const LVL = ["A2","B1","B2","C1"];

function ParticipantsPage() {
  if(!ADMIN.isAuthed()) { window.location.replace("index.html"); return null; }
  CPEEN.seedInitialData();

  const [all,    setAll]    = useState(() => CPEEN.getParticipants());
  const [search, setSearch] = useState("");
  const [fLvl,   setFLvl]   = useState("all");
  const [fQual,  setFQual]  = useState("all");
  const [fCounty,setFCounty]= useState("all");
  const [copied, setCopied] = useState(null);
  const [toConfirm, setToConfirm] = useState(null);
  const [toDequal, setToDequal] = useState(null);
  const [proctorFlags, setPFlags] = useState({});

  const sessions      = CPEEN.getSessions();
  const groupSessions = CPEEN.getGroupSessions();
  const counties  = useMemo(()=>[...new Set(all.map(p=>p.county).filter(Boolean))].sort(),[all]);

  // Încarcă flagurile de proctoring de la Firestore la pornire
  useEffect(() => {
    CPEEN.loadProctorFlags().then(flags => setPFlags({...flags}));
  }, []);

  const reload = () => {
    setAll(CPEEN.getParticipants());
    CPEEN.loadProctorFlags().then(flags => setPFlags({...flags}));
  };

  const filtered = useMemo(()=>{
    const q = search.toLowerCase();
    return all.filter(p => {
      const qual = CPEEN.isQualified(p);
      return (fLvl==="all"   || p.level===fLvl) &&
        (fQual==="all" || (fQual==="yes" ? qual : !qual)) &&
        (fCounty==="all"|| p.county===fCounty) &&
        (!q || p.name.toLowerCase().includes(q) || p.school.toLowerCase().includes(q) || (p.email||"").toLowerCase().includes(q));
    });
  },[all,search,fLvl,fQual,fCounty]);

  const copyCode = (p) => {
    navigator.clipboard.writeText(p.accessCode).catch(()=>{});
    setCopied(p.id);
    setTimeout(()=>setCopied(null),1800);
  };

  const doDelete = (id) => {
    CPEEN.deleteParticipant(id);
    setToConfirm(null);
    reload();
  };

  const toggleQualified = (p) => {
    const cur = CPEEN.isQualified(p);
    if(cur) {
      setToDequal(p.id);
      return;
    }
    CPEEN.updateParticipant(p.id, {qualified: true});
    reload();
  };

  const doDequal = (id) => {
    CPEEN.updateParticipant(id, {qualified: false, stage: ""});
    setToDequal(null);
    reload();
  };

  const doManualDisq = (p) => {
    if(!window.confirm(`Marchezi ${p.name} ca DESCALIFICAT(Ă)? Această acțiune este vizibilă în log-urile de proctoring.`)) return;
    CPEEN.disqualifyParticipant(p.accessCode, "Descalificat manual de admin");
    setPFlags(f => ({...f, [p.accessCode.toUpperCase()]: {disqualified:true, reason:"Manual"}}));
  };

  const doClearDisq = (p) => {
    CPEEN.clearDisqualification(p.accessCode);
    setPFlags(f => { const n={...f}; delete n[p.accessCode.toUpperCase()]; return n; });
  };

  const exportCSV = () => {
    const header = ["Nume","Scoala","Judet","Clasa","Profesor","Email","Nivel","Calificat","Descalificat","Comutari suspecte","Cod acces","Inregistrat","Status"];
    const rows = filtered.map(p => {
      const flag = proctorFlags[p.accessCode?.toUpperCase()] || {};
      return [
        p.name, p.school, p.county, p.grade||"", p.teacher, p.email||"",
        p.level, CPEEN.isQualified(p)?"Da":"Nu",
        flag.disqualified?"Da":"Nu", flag.suspiciousCount||0,
        p.accessCode, new Date(p.registeredAt).toLocaleString("ro-RO"), p.status
      ];
    });
    ADMIN.csv(header, rows, "cpeen_participanti.csv");
  };

  const groupMap = useMemo(()=>{
    const m = {};
    groupSessions.forEach(g=>{ m[g.id]=g; });
    return m;
  },[groupSessions]);

  const sessMap = useMemo(()=>{
    // Priority: in_progress(4) > pending-in-active-group(3) > submitted(2) > pending(1)
    const pri = (s) => {
      if (s.status === 'in_progress') return 4;
      if (s.status === 'pending') {
        if (s.groupId && groupMap[s.groupId]?.status === 'active') return 3;
        return 1;
      }
      if (s.status === 'submitted') return 2;
      return 0;
    };
    const m = {};
    sessions.forEach(s => {
      const prev = m[s.participantId];
      if (!prev) { m[s.participantId] = s; return; }
      const pNew = pri(s), pPrev = pri(prev);
      if (pNew > pPrev) { m[s.participantId] = s; return; }
      // tie-break submitted: pick most recent
      if (pNew === pPrev && s.status === 'submitted' && (s.submittedAt||0) > (prev.submittedAt||0)) {
        m[s.participantId] = s;
      }
    });
    return m;
  },[sessions, groupMap]);

  const statusBadge = (p) => {
    const s = sessMap[p.id];
    if (!s) return <span className="badge b-gray">Fără test</span>;
    if (s.status === "submitted") return <span className="badge b-ok">Trimis</span>;
    if (s.status === "in_progress") return <span className="badge b-mid">Activ</span>;
    if (s.status === "pending") {
      const grp = s.groupId ? groupMap[s.groupId] : null;
      if (grp?.status === "active") return <span className="badge b-mid" style={{background:"#27AE60"}}>Alocat ●</span>;
      return <span className="badge b-gray">Alocat</span>;
    }
    return <span className="badge b-gray">—</span>;
  };

  return (
    <div style={{minHeight:"100vh",background:"#f8fafc"}}>
      <ADMIN.Nav active="participants"/>
      <div className="page">
        <div className="container">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
            <div>
              <h2 style={{color:C.dark,fontSize:18}}>Participanți</h2>
              <div style={{fontSize:12,color:"#888"}}>{filtered.length} din {all.length} înregistrați</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-mid btn-sm" onClick={reload}>↻ Actualizează</button>
              <button className="btn btn-success btn-sm" onClick={exportCSV} disabled={!filtered.length}>⬇ Export CSV</button>
            </div>
          </div>

          {/* Filters */}
          <div style={{background:"#fff",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:10,flexWrap:"wrap",border:"1px solid #e2e8f0"}}>
            <input className="inp inp-sm" style={{flex:1,minWidth:180}} placeholder="Caută după nume, școală, email…"
              value={search} onChange={e=>setSearch(e.target.value)}/>
            <select className="inp inp-sm" style={{width:120}} value={fLvl} onChange={e=>setFLvl(e.target.value)}>
              <option value="all">Toate nivelurile</option>
              {LVL.map(l=><option key={l} value={l}>{l}</option>)}
            </select>
            <select className="inp inp-sm" style={{width:140}} value={fQual} onChange={e=>setFQual(e.target.value)}>
              <option value="all">Toți (calificat?)</option>
              <option value="yes">Doar calificați</option>
              <option value="no">Doar ne-calificați</option>
            </select>
            <select className="inp inp-sm" style={{width:150}} value={fCounty} onChange={e=>setFCounty(e.target.value)}>
              <option value="all">Toate județele</option>
              {counties.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>

          {/* Confirm delete dialog */}
          {toConfirm && (()=>{
            const p = all.find(x=>x.id===toConfirm);
            return (
              <div style={{background:"#fce4e4",border:"1px solid #ef9a9a",borderRadius:8,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                <span style={{fontSize:13,color:C.red}}>Sigur vrei să ștergi <strong>{p?.name}</strong>? Sesiunea de examen va fi ștearsă și ea.</span>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btn-danger btn-sm" onClick={()=>doDelete(toConfirm)}>Șterge</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setToConfirm(null)}>Anulează</button>
                </div>
              </div>
            );
          })()}

          {/* Confirm decalificare dialog */}
          {toDequal && (()=>{
            const p = all.find(x=>x.id===toDequal);
            return (
              <div style={{background:"#fff3e0",border:"1px solid #ffb74d",borderRadius:8,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                <span style={{fontSize:13,color:"#7a4f00"}}>Sigur vrei să decalifici <strong>{p?.name}</strong>? Va pierde accesul la finală.</span>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btn-mid btn-sm" onClick={()=>doDequal(toDequal)}>Decalifică</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setToDequal(null)}>Anulează</button>
                </div>
              </div>
            );
          })()}

          {/* Table */}
          <div style={{background:"#fff",borderRadius:10,border:"1px solid #e2e8f0"}}>
            {filtered.length === 0
              ? <div style={{padding:40,textAlign:"center",color:"#aaa"}}>Niciun participant găsit.</div>
              : (
                <div className="tbl-wrap">
                  <table className="tbl">
                    <thead>
                      <tr>
                        <th>#</th>
                        <th>Nume</th>
                        <th>Școală</th>
                        <th>Județ</th>
                        <th>Cls</th>
                        <th>Nivel</th>
                        <th>Calificat</th>
                        <th>Proctor</th>
                        <th>Cod acces</th>
                        <th>Status</th>
                        <th>Înregistrat</th>
                        <th>Acțiuni</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map((p,i)=>(
                        <tr key={p.id}>
                          <td style={{color:"#aaa",fontSize:11}}>{i+1}</td>
                          <td>
                            <div style={{fontWeight:700,color:C.dark,fontSize:13}}>{p.name}</div>
                            <div style={{fontSize:11,color:"#999"}}>{p.email}</div>
                          </td>
                          <td style={{fontSize:12,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.school}</td>
                          <td style={{fontSize:12}}>{p.county}</td>
                          <td style={{fontSize:12}}>{p.grade||"—"}</td>
                          <td><span className={`badge b-${p.level}`}>{p.level}</span></td>
                          <td style={{fontSize:12}}>
                            {CPEEN.isQualified(p)
                              ? <span className="badge b-ok" style={{fontWeight:700}}>✓ Calificat</span>
                              : <span style={{color:"#aaa"}}>—</span>}
                          </td>
                          <td style={{fontSize:12}}>
                            {(()=>{
                              const flag = proctorFlags[(p.accessCode||"").toUpperCase()];
                              if(!flag) return <span style={{color:"#ccc"}}>—</span>;
                              if(flag.disqualified) return <span className="badge b-err" style={{fontWeight:700,background:"#dc2626",color:"#fff"}}>✕ Descalificat</span>;
                              const sc = flag.suspiciousCount || 0;
                              return <span style={{color: sc>2?"#dc2626":"#888"}}>⚠ {sc} susp.</span>;
                            })()}
                          </td>
                          <td>
                            <span style={{fontFamily:"monospace",fontSize:12,letterSpacing:2,background:"#f8fafc",padding:"2px 6px",borderRadius:4}}>{p.accessCode}</span>
                          </td>
                          <td>{statusBadge(p)}</td>
                          <td style={{fontSize:11,color:"#999",whiteSpace:"nowrap"}}>{new Date(p.registeredAt).toLocaleDateString("ro-RO")}</td>
                          <td>
                            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                              <button className={`btn btn-sm ${CPEEN.isQualified(p)?"btn-ghost":"btn-success"}`}
                                title={CPEEN.isQualified(p)?"Decalifică":"Califică pentru finală"}
                                onClick={()=>toggleQualified(p)}
                                style={{padding:"3px 8px",fontSize:11}}>
                                {CPEEN.isQualified(p)?"✕ Decal.":"✓ Cal."}
                              </button>
                              {(()=>{
                                const flag = proctorFlags[(p.accessCode||"").toUpperCase()];
                                if(flag?.disqualified) return (
                                  <button className="btn btn-sm btn-mid" title="Reabiliteaza proctoring"
                                    onClick={()=>doClearDisq(p)} style={{padding:"3px 8px",fontSize:11}}>
                                    ↩ Reabilit.
                                  </button>
                                );
                                return (
                                  <button className="btn btn-sm btn-danger" title="Descalifică (proctoring)"
                                    onClick={()=>doManualDisq(p)} style={{padding:"3px 8px",fontSize:11}}>
                                    ⛔ Descal.
                                  </button>
                                );
                              })()}
                              <button className="btn btn-sm btn-outline" title="Copiază codul"
                                onClick={()=>copyCode(p)}
                                style={{padding:"3px 8px",fontSize:11}}>
                                {copied===p.id?"✓":"⎘"}
                              </button>
                              <button className="btn btn-sm btn-danger" title="Șterge"
                                onClick={()=>setToConfirm(p.id)}
                                style={{padding:"3px 8px",fontSize:11}}>✕</button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )
            }
          </div>
        </div>
      </div>
    </div>
  );
}

document.getElementById("root").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,system-ui,sans-serif;color:#2563eb;font-size:14px;">Se încarcă…</div>';
CPEEN.init().then(()=>ReactDOM.createRoot(document.getElementById("root")).render(<ParticipantsPage/>));
</script>
</body>
</html>

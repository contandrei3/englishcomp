<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Editor subiect – Admin CPEEN 2026</title>
<link rel="stylesheet" href="../css/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="../js/config.js"></script>
<script src="../js/db.js"></script>
<script src="../js/admin.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const C = {dark:"#1F3864",mid:"#2E75B6",red:"#C0392B",green:"#1D6027",bg:"#f0f4f8"};

const PARTS_META = [
  { id:'p1', num:1, label:'Multiple Choice Cloze',        hint:'Text cu goluri; alegi A/B/C/D pentru fiecare', defPts:1 },
  { id:'p2', num:2, label:'Open Cloze',                   hint:'Text cu goluri; scrii UN cuvânt per gol',      defPts:1 },
  { id:'p3', num:3, label:'Word Formation',               hint:'Transformi un cuvânt cheie',                   defPts:1 },
  { id:'p4', num:4, label:'Key Word Transformations',     hint:'Rescrii propoziția folosind cuvântul cheie',  defPts:2 },
  { id:'p5', num:5, label:'Multiple Choice (Reading)',    hint:'Text cu întrebări; alegi A/B/C/D',             defPts:2 },
  { id:'p6', num:6, label:'Cross-text Multiple Matching', hint:'4 texte; potrivești întrebări la scriitori',  defPts:2 },
  { id:'p7', num:7, label:'Gapped Text',                  hint:'Plasezi paragrafele înapoi în text',           defPts:2 },
  { id:'p8', num:8, label:'Multiple Matching',            hint:'Potrivești întrebări la secțiuni A–F',         defPts:1 },
];

const IMPLEMENTED = { p1:true, p2:true, p3:true };

function initPart(id, defPts) {
  const pts = String(defPts);
  if (id==='p1') return { title:'', text:'', pts, items:[] };
  if (id==='p2') return { title:'', text:'', pts, answers:[] };
  if (id==='p3') return { pts, items:[] };
  return { pts };
}

function toDBVariant(meta, enabled, partData) {
  const parts = [];
  PARTS_META.forEach(({id}) => {
    if (!enabled[id]) return;
    const d = partData[id];
    const pts = parseInt(d.pts) || 1;
    if (id==='p1') {
      parts.push({ type:'p1', title:d.title, text:d.text, pts,
        items: d.items.map(it => ({
          options:[it.a||'', it.b||'', it.c||'', it.d||''],
          answer:['a','b','c','d'].indexOf(it.correct||'a')
        }))
      });
    } else if (id==='p2') {
      const n = (d.text.match(/\[\d+\]/g)||[]).length;
      parts.push({ type:'p2', title:d.title, text:d.text, pts,
        key: Array.from({length:n}, (_,i) =>
          (d.answers[i]||'').split(';').map(x=>x.trim()).filter(Boolean))
      });
    } else if (id==='p3') {
      parts.push({ type:'p3', pts,
        items: d.items.map(it => ({
          before:it.before||'', kw:it.kw||'', after:it.after||'',
          key:(it.answers||'').split(';').map(x=>x.trim()).filter(Boolean)
        }))
      });
    }
  });
  return {
    title: meta.title.trim(), level: meta.level, stage: meta.stage,
    duration: parseInt(meta.duration)||75,
    variants:[{ id: meta.variantId.trim()||'V1', parts }]
  };
}

function fromDB(exam) {
  const v = exam.variants?.[0] || {};
  const enabled = {};
  PARTS_META.forEach(p => { enabled[p.id]=false; });
  const partData = {};
  PARTS_META.forEach(p => { partData[p.id]=initPart(p.id, p.defPts); });
  (v.parts||[]).forEach(part => {
    const id = part.type;
    if (!partData[id]) return;
    enabled[id] = true;
    if (id==='p1') {
      partData.p1 = {
        title: part.title||'', text: part.text||'', pts: String(part.pts||1),
        items: (part.items||[]).map(it => ({
          a: it.options?.[0]||'', b: it.options?.[1]||'', c: it.options?.[2]||'', d: it.options?.[3]||'',
          correct: ['a','b','c','d'][it.answer]||'a'
        }))
      };
    } else if (id==='p2') {
      partData.p2 = {
        title: part.title||'', text: part.text||'', pts: String(part.pts||1),
        answers: (part.key||[]).map(a => a.join('; '))
      };
    } else if (id==='p3') {
      partData.p3 = {
        pts: String(part.pts||1),
        items: (part.items||[]).map(it => ({
          before:it.before||'', kw:it.kw||'', after:it.after||'',
          answers:(it.key||[]).join('; ')
        }))
      };
    }
  });
  return {
    meta: { title:exam.title||'', level:exam.level||'B1', stage:exam.stage||'calificare',
            duration:String(exam.duration||75), variantId:v.id||'V1' },
    enabled, partData
  };
}

// ── UI primitives ─────────────────────────────────────────────────────────
const IS = { border:"1px solid #d0d8e8",borderRadius:6,padding:"7px 10px",fontSize:13,
  width:"100%",boxSizing:"border-box",fontFamily:"inherit",outline:"none" };

function Inp({value,onChange,placeholder,style,type}) {
  return <input type={type||"text"} value={value} onChange={onChange} placeholder={placeholder} style={{...IS,...style}}/>;
}
function Ta({value,onChange,placeholder,rows,style}) {
  return <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows||4} style={{...IS,resize:"vertical",...style}}/>;
}
function Fld({label,hint,children,style}) {
  return (
    <div style={{marginBottom:10,...style}}>
      <div style={{marginBottom:4}}>
        <span style={{fontSize:12,fontWeight:600,color:"#444"}}>{label}</span>
        {hint && <span style={{fontSize:11,color:"#999",marginLeft:6}}>{hint}</span>}
      </div>
      {children}
    </div>
  );
}
function AddBtn({onClick,label}) {
  return <button onClick={onClick} style={{background:"transparent",border:"2px dashed #b0c4d8",
    color:C.mid,borderRadius:8,padding:"8px 16px",fontSize:12,cursor:"pointer",
    fontWeight:600,marginTop:8,width:"100%"}}>+ {label}</button>;
}
function ItemCard({num,onDelete,children}) {
  return (
    <div style={{border:"1px solid #e0e8f0",borderRadius:8,padding:14,marginBottom:10,background:"#f8fbff"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontWeight:700,color:C.dark,fontSize:13}}>#{num}</span>
        <button onClick={onDelete} style={{background:C.red,color:"#fff",border:"none",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:11}}>✕</button>
      </div>
      {children}
    </div>
  );
}
function MCOpts({item,onChange,nameKey}) {
  return (
    <>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        {['a','b','c','d'].map(l=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontWeight:700,color:C.mid,minWidth:18,fontSize:13}}>{l.toUpperCase()}</span>
            <Inp value={item[l]||''} onChange={e=>onChange(l,e.target.value)} placeholder={`Option ${l.toUpperCase()}`}/>
          </div>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginTop:4}}>
        <span style={{fontSize:12,color:"#555",fontWeight:600}}>Răspuns corect:</span>
        {['a','b','c','d'].map(l=>(
          <label key={l} style={{display:"flex",alignItems:"center",gap:3,cursor:"pointer",fontSize:13,
            fontWeight:item.correct===l?700:400,color:item.correct===l?C.mid:"#555"}}>
            <input type="radio" name={nameKey} checked={item.correct===l} onChange={()=>onChange('correct',l)}/>
            {l.toUpperCase()}
          </label>
        ))}
      </div>
    </>
  );
}
function PartCard({num,label,pts,onPtsChange,onRemove,children}) {
  const [open,setOpen] = useState(true);
  return (
    <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px rgba(0,0,0,.07)",marginBottom:16,overflow:"hidden"}}>
      <div style={{background:C.dark,padding:"10px 16px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{background:"rgba(255,255,255,.18)",borderRadius:6,padding:"2px 10px",fontSize:11,fontWeight:700,color:"#fff"}}>Part {num}</div>
        <div style={{flex:1,fontWeight:600,color:"#fff",fontSize:14}}>{label}</div>
        <span style={{color:"rgba(255,255,255,.7)",fontSize:12}}>pts/item:</span>
        <input type="number" min="1" max="10" value={pts} onChange={onPtsChange}
          style={{width:50,padding:"3px 6px",borderRadius:4,border:"1px solid rgba(255,255,255,.3)",background:"rgba(255,255,255,.15)",color:"#fff",fontSize:12,textAlign:"center"}}/>
        <button onClick={()=>setOpen(o=>!o)} style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",borderRadius:4,padding:"4px 8px",cursor:"pointer",fontSize:12}}>{open?"▲":"▼"}</button>
        <button onClick={onRemove} style={{background:"rgba(192,57,43,.8)",border:"none",color:"#fff",borderRadius:4,padding:"4px 9px",cursor:"pointer",fontSize:12}}>✕ Elimină</button>
      </div>
      {open && <div style={{padding:18}}>{children}</div>}
    </div>
  );
}

// ── Part 1 — Multiple Choice Cloze ────────────────────────────────────────
function P1Edit({data,onChange}) {
  const upd  = (k,v) => onChange({...data,[k]:v});
  const updIt= (i,f,v) => onChange({...data, items:data.items.map((it,j)=>j===i?{...it,[f]:v}:it)});
  const addIt= () => onChange({...data, items:[...data.items, {a:'',b:'',c:'',d:'',correct:'a'}]});
  const delIt= i => onChange({...data, items:data.items.filter((_,j)=>j!==i)});
  return (
    <>
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10,marginBottom:14}}>
        <Fld label="Titlu text"><Inp value={data.title} onChange={e=>upd('title',e.target.value)} placeholder="THE DIGITAL AGE"/></Fld>
        <Fld label="Text (cu [1] [2]... unde sunt golurile)">
          <Ta value={data.text} onChange={e=>upd('text',e.target.value)} rows={4}
            placeholder="In today's world, technology has [1] the way we [2] information..."/>
        </Fld>
      </div>
      {data.items.map((it,i)=>(
        <ItemCard key={i} num={i+1} onDelete={()=>delIt(i)}>
          <MCOpts item={it} onChange={(f,v)=>updIt(i,f,v)} nameKey={`p1-${i}`}/>
        </ItemCard>
      ))}
      <AddBtn onClick={addIt} label="Adaugă gol (item)"/>
    </>
  );
}

// ── Part 2 — Open Cloze ───────────────────────────────────────────────────
function P2Edit({data,onChange}) {
  const upd = (k,v) => onChange({...data,[k]:v});
  const gapN = (data.text.match(/\[\d+\]/g)||[]).length;
  const setGap = (i,v) => {
    const a = [...(data.answers||[])];
    while (a.length <= i) a.push('');
    a[i] = v;
    onChange({...data, answers:a});
  };
  const onTextChange = t => {
    const n = (t.match(/\[\d+\]/g)||[]).length;
    const ans = [...(data.answers||[])];
    while (ans.length < n) ans.push('');
    onChange({...data, text:t, answers:ans.slice(0, Math.max(n, ans.length))});
  };
  return (
    <>
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10,marginBottom:14}}>
        <Fld label="Titlu text">
          <Inp value={data.title} onChange={e=>upd('title',e.target.value)} placeholder="SOCIAL MEDIA"/>
        </Fld>
        <Fld label={`Text cu goluri [1] [2]... (${gapN} detectate)`}>
          <Ta value={data.text} onChange={e=>onTextChange(e.target.value)} rows={6}
            placeholder="Social media has [1] the way we [2] information. Many people now [3] their news online rather than from traditional sources..."/>
        </Fld>
      </div>
      {gapN > 0 && (
        <>
          <div style={{fontSize:12,fontWeight:600,color:"#444",marginBottom:6}}>
            Răspunsuri acceptate per gol
            <span style={{color:"#999",fontWeight:400,marginLeft:6}}>variante separate prin ;</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:6}}>
            {Array.from({length:gapN},(_,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontWeight:700,color:C.dark,minWidth:28,fontSize:12}}>({i+1})</span>
                <Inp value={data.answers?.[i]||''} onChange={e=>setGap(i,e.target.value)} placeholder="answer; alternative"/>
              </div>
            ))}
          </div>
        </>
      )}
    </>
  );
}

// ── Part 3 — Word Formation ───────────────────────────────────────────────
function P3Edit({data,onChange}) {
  const updIt = (i,f,v) => onChange({...data, items:data.items.map((it,j)=>j===i?{...it,[f]:f==='kw'?v.toUpperCase():v}:it)});
  const addIt = () => onChange({...data, items:[...data.items, {before:'',kw:'',after:'',answers:''}]});
  const delIt = i => onChange({...data, items:data.items.filter((_,j)=>j!==i)});
  return (
    <>
      <div style={{fontSize:12,color:"#888",marginBottom:12}}>
        Completați contextul și cuvântul cheie. Elevul trebuie să transforme cuvântul cheie pentru a completa golul.
      </div>
      {data.items.map((it,i)=>(
        <ItemCard key={i} num={i+1} onDelete={()=>delIt(i)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"end",marginBottom:8}}>
            <Fld label="Text înainte">
              <Inp value={it.before} onChange={e=>updIt(i,'before',e.target.value)} placeholder="The"/>
            </Fld>
            <Fld label="CUVÂNT CHEIE">
              <input value={it.kw} onChange={e=>updIt(i,'kw',e.target.value)} placeholder="HAPPY"
                style={{...IS,width:110,textAlign:"center",fontWeight:700,textTransform:"uppercase"}}/>
            </Fld>
            <Fld label="Text după">
              <Inp value={it.after} onChange={e=>updIt(i,'after',e.target.value)} placeholder="of the people around him was obvious."/>
            </Fld>
          </div>
          <Fld label="Forme acceptate" hint="separate prin ;">
            <Inp value={it.answers} onChange={e=>updIt(i,'answers',e.target.value)} placeholder="happiness; Happiness"/>
          </Fld>
        </ItemCard>
      ))}
      <AddBtn onClick={addIt} label="Adaugă item"/>
    </>
  );
}

const EDITORS = { p1: P1Edit, p2: P2Edit, p3: P3Edit };

// ── Main ──────────────────────────────────────────────────────────────────
function ExamBuilder() {
  if(!ADMIN.isAuthed()) { window.location.replace("index.html"); return null; }
  const params = new URLSearchParams(window.location.search);
  const editId = params.get("id");

  const [meta, setMeta] = useState({title:'',level:'B1',stage:'calificare',duration:'75',variantId:'V1'});
  const [enabled, setEnabled] = useState({p1:false,p2:false,p3:false,p4:false,p5:false,p6:false,p7:false,p8:false});
  const [partData, setPartData] = useState(()=>{
    const d = {};
    PARTS_META.forEach(p => { d[p.id] = initPart(p.id, p.defPts); });
    return d;
  });
  const [msg, setMsg] = useState({type:'',text:''});

  useEffect(() => {
    if (!editId) return;
    const exam = CPEEN.getExams().find(e=>e.id===editId);
    if (!exam) return;
    const loaded = fromDB(exam);
    setMeta(loaded.meta); setEnabled(loaded.enabled); setPartData(loaded.partData);
  }, []);

  const toggle  = id => {
    if (!IMPLEMENTED[id]) {
      setMsg({type:'err', text:`${PARTS_META.find(p=>p.id===id).label} — editorul va fi adăugat în pașii următori.`});
      return;
    }
    setEnabled(p => ({...p, [id]: !p[id]}));
  };
  const updPts  = (id,v) => setPartData(p => ({...p, [id]: {...p[id], pts:v}}));
  const updPart = (id,d) => setPartData(p => ({...p, [id]: d}));

  const save = () => {
    setMsg({type:'',text:''});
    if (!meta.title.trim()) { setMsg({type:'err',text:'Titlul este obligatoriu.'}); return; }
    if (!PARTS_META.some(p => enabled[p.id])) { setMsg({type:'err',text:'Selectați cel puțin o secțiune.'}); return; }
    const data = toDBVariant(meta, enabled, partData);
    editId ? CPEEN.updateExam(editId, data) : CPEEN.addExam(data);
    setMsg({type:'ok', text:'Subiect salvat!'});
    setTimeout(()=>window.location.replace('exams.html'), 1100);
  };

  const btnStyle = {background:C.dark,color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontSize:14,fontWeight:700,cursor:"pointer"};

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <ADMIN.Nav active="exams"/>
      <div style={{maxWidth:920,margin:"0 auto",padding:"24px 16px"}}>

        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
          <a href="exams.html" style={{color:C.mid,textDecoration:"none",fontSize:13}}>← Înapoi</a>
          <h2 style={{color:C.dark,fontSize:20,margin:0,flex:1}}>{editId?"Editare subiect":"Subiect nou"}</h2>
          <button onClick={save} style={btnStyle}>{editId?"Actualizează":"Salvează"}</button>
        </div>

        {/* Metadata */}
        <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px rgba(0,0,0,.07)",padding:20,marginBottom:20}}>
          <div style={{fontWeight:700,color:C.dark,fontSize:14,marginBottom:14}}>Informații generale</div>
          <Fld label="Titlu subiect"><Inp value={meta.title} onChange={e=>setMeta(p=>({...p,title:e.target.value}))} placeholder="ex: B1 Calificare 2026"/></Fld>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
            <Fld label="Nivel">
              <select value={meta.level} onChange={e=>setMeta(p=>({...p,level:e.target.value}))} style={IS}>
                {['A2','B1','B2','C1'].map(l=><option key={l}>{l}</option>)}
              </select>
            </Fld>
            <Fld label="Etapă">
              <select value={meta.stage} onChange={e=>setMeta(p=>({...p,stage:e.target.value}))} style={IS}>
                <option value="calificare">Calificare</option>
                <option value="finala">Finală</option>
              </select>
            </Fld>
            <Fld label="Durată (min)">
              <input type="number" value={meta.duration} min="10" max="180" onChange={e=>setMeta(p=>({...p,duration:e.target.value}))} style={IS}/>
            </Fld>
            <Fld label="ID Variantă"><Inp value={meta.variantId} onChange={e=>setMeta(p=>({...p,variantId:e.target.value}))} placeholder="V1"/></Fld>
          </div>
        </div>

        {/* Part selector */}
        <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px rgba(0,0,0,.07)",padding:20,marginBottom:20}}>
          <div style={{fontWeight:700,color:C.dark,fontSize:14,marginBottom:14}}>Secțiuni — click pentru a activa</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
            {PARTS_META.map(p => {
              const ready = !!IMPLEMENTED[p.id];
              const on = enabled[p.id];
              return (
                <div key={p.id} onClick={()=>toggle(p.id)} style={{
                  border:`2px solid ${on?C.mid:(ready?"#d0d8e8":"#e8e8e8")}`,borderRadius:10,padding:"12px 14px",
                  cursor:"pointer",background:on?"#e8f4fd":(ready?"#fafafa":"#f3f3f3"),transition:"all .15s",
                  opacity:ready?1:0.6
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontWeight:700,fontSize:12,color:on?C.mid:"#888"}}>Part {p.num}</span>
                    {ready ? (
                      <div style={{width:16,height:16,borderRadius:3,border:`2px solid ${on?C.mid:"#bbb"}`,
                        background:on?C.mid:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {on && <span style={{color:"#fff",fontSize:10}}>✓</span>}
                      </div>
                    ) : (
                      <span style={{fontSize:9,fontWeight:700,color:"#999",background:"#e0e0e0",padding:"1px 5px",borderRadius:3}}>SOON</span>
                    )}
                  </div>
                  <div style={{fontSize:11,fontWeight:600,color:C.dark,marginBottom:3}}>{p.label}</div>
                  <div style={{fontSize:10,color:"#888",lineHeight:1.4}}>{p.hint}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Enabled part cards */}
        {PARTS_META.filter(p => enabled[p.id]).map(p => {
          const Ed = EDITORS[p.id];
          return (
            <PartCard key={p.id} num={p.num} label={p.label}
              pts={partData[p.id]?.pts || String(p.defPts)}
              onPtsChange={e=>updPts(p.id, e.target.value)}
              onRemove={()=>toggle(p.id)}>
              {Ed ? <Ed data={partData[p.id]} onChange={d=>updPart(p.id,d)}/> : null}
            </PartCard>
          );
        })}

        {msg.text && <div style={{padding:"12px 16px",borderRadius:8,marginBottom:16,fontWeight:600,
          background:msg.type==='ok'?"#e8f5e9":"#fdecea",color:msg.type==='ok'?"#1D6027":C.red}}>{msg.text}</div>}

        <div style={{display:"flex",gap:10,justifyContent:"flex-end",paddingBottom:40}}>
          <a href="exams.html" style={{display:"inline-block",padding:"10px 20px",border:"2px solid #d0d8e8",borderRadius:8,color:"#666",textDecoration:"none",fontWeight:600,fontSize:14}}>Anulează</a>
          <button onClick={save} style={btnStyle}>{editId?"Actualizează":"Salvează subiectul"}</button>
        </div>
      </div>
    </div>
  );
}

<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Editor subiect – Admin ECHO</title>
<link rel="stylesheet" href="../css/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="../js/config.js"></script>
<script src="../js/db.js"></script>
<script src="../js/admin.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const C = {dark:"#0f172a",mid:"#2563eb",red:"#dc2626",green:"#15803d",bg:"#f8fafc"};

const PARTS_META = [
  { id:'p1', num:1, label:'Multiple Choice Cloze',        hint:'Text cu goluri; alegi A/B/C/D pentru fiecare', defPts:1 },
  { id:'p2', num:2, label:'Open Cloze',                   hint:'Text cu goluri; scrii UN cuvânt per gol',      defPts:1 },
  { id:'p3', num:3, label:'Word Formation',               hint:'Transformi un cuvânt cheie',                   defPts:1 },
  { id:'p4', num:4, label:'Key Word Transformations',     hint:'Rescrii propoziția folosind cuvântul cheie',   defPts:2 },
  { id:'p5', num:5, label:'Multiple Choice (Reading)',    hint:'Text cu întrebări; alegi A/B/C/D',             defPts:2 },
  { id:'p6', num:6, label:'Cross-text Multiple Matching', hint:'4 texte; potrivești întrebări la scriitori',   defPts:2 },
  { id:'p7', num:7, label:'Gapped Text',                  hint:'Plasezi paragrafele înapoi în text',           defPts:2 },
  { id:'p8', num:8, label:'Multiple Matching',            hint:'Potrivești întrebări la secțiuni A–F',         defPts:1 },
];

const IMPLEMENTED = { p1:true, p2:true, p3:true, p4:true, p5:true, p6:true, p7:true, p8:true };

function initPart(id, defPts) {
  const pts = String(defPts);
  if (id==='p1') return { title:'', text:'', pts, items:[] };
  if (id==='p2') return { title:'', text:'', pts, answers:[] };
  if (id==='p3') return { text:'', pts, items:[] };
  if (id==='p4') return { pts, items:[] };
  if (id==='p5') return { title:'', text:'', pts, items:[] };
  if (id==='p6') return { pts, texts:['A','B','C','D'].map(l=>({label:l,title:'',content:''})), items:[] };
  if (id==='p7') return { title:'', text:'', pts, paragraphs:[], key:[] };
  if (id==='p8') return { pts, texts:[], items:[] };
  return { pts };
}

function toDBVariant(meta, enabled, partData) {
  const parts = [];
  PARTS_META.forEach(({id}) => {
    if (!enabled[id]) return;
    const d = partData[id];
    const pts = parseInt(d.pts) || 1;
    if (id==='p1') {
      parts.push({ type:'p1', title:d.title, text:d.text, pts,
        items: d.items.map(it => ({
          options:[it.a||'', it.b||'', it.c||'', it.d||''],
          answer:['a','b','c','d'].indexOf(it.correct||'a')
        }))
      });
    } else if (id==='p2') {
      const n = (d.text.match(/\[\d+\]/g)||[]).length;
      parts.push({ type:'p2', title:d.title, text:d.text, pts,
        key: Array.from({length:n}, (_,i) =>
          (d.answers[i]||'').split(';').map(x=>x.trim()).filter(Boolean))
      });
    } else if (id==='p3') {
      parts.push({ type:'p3', pts, text:d.text||'',
        items: d.items.map(it => ({
          before:it.before||'', kw:it.kw||'', after:it.after||'',
          key:(it.answers||'').split(';').map(x=>x.trim()).filter(Boolean)
        }))
      });
    } else if (id==='p4') {
      parts.push({ type:'p4', pts,
        items: d.items.map(it => ({
          s1:it.s1||'', kw:it.kw||'', before:it.before||'', after:it.after||'',
          key:(it.answers||'').split(';').map(x=>x.trim()).filter(Boolean)
        }))
      });
    } else if (id==='p5') {
      parts.push({ type:'p5', title:d.title, text:d.text, pts,
        items: d.items.map(it => ({
          question:it.question||'',
          options:[it.a||'',it.b||'',it.c||'',it.d||''],
          answer:['a','b','c','d'].indexOf(it.correct||'a')
        }))
      });
    } else if (id==='p6') {
      parts.push({ type:'p6', pts,
        texts: d.texts.map(t=>({label:t.label, title:t.title||'', content:t.content||''})),
        items: d.items.map(it=>({question:it.question||'', answer:it.answer||'A'}))
      });
    } else if (id==='p7') {
      const gapN = (d.text.match(/\[\d+\]/g)||[]).length;
      parts.push({ type:'p7', title:d.title, text:d.text, pts,
        paragraphs:(d.paragraphs||[]).map(p=>({label:p.label, content:p.content||''})),
        key:(d.key||[]).slice(0, gapN)
      });
    } else if (id==='p8') {
      parts.push({ type:'p8', pts,
        texts: d.texts.map(t=>({label:t.label, title:t.title||'', content:t.content||''})),
        items: d.items.map(it=>({question:it.question||'', answer:it.answer||'A'}))
      });
    }
  });
  return {
    title: meta.title.trim(),
    variants:[{ id: meta.variantId.trim()||'V1', parts }]
  };
}

function fromDB(exam) {
  const v = exam.variants?.[0] || {};
  const enabled = {};
  PARTS_META.forEach(p => { enabled[p.id]=false; });
  const partData = {};
  PARTS_META.forEach(p => { partData[p.id]=initPart(p.id, p.defPts); });
  (v.parts||[]).forEach(part => {
    const id = part.type;
    if (!partData[id]) return;
    enabled[id] = true;
    if (id==='p1') {
      partData.p1 = {
        title: part.title||'', text: part.text||'', pts: String(part.pts||1),
        items: (part.items||[]).map(it => ({
          a: it.options?.[0]||'', b: it.options?.[1]||'', c: it.options?.[2]||'', d: it.options?.[3]||'',
          correct: ['a','b','c','d'][it.answer]||'a'
        }))
      };
    } else if (id==='p2') {
      partData.p2 = {
        title: part.title||'', text: part.text||'', pts: String(part.pts||1),
        answers: (part.key||[]).map(a => a.join('; '))
      };
    } else if (id==='p3') {
      partData.p3 = {
        text: part.text||'',
        pts: String(part.pts||1),
        items: (part.items||[]).map(it => ({
          before:it.before||'', kw:it.kw||'', after:it.after||'',
          answers:(it.key||[]).join('; ')
        }))
      };
    } else if (id==='p4') {
      partData.p4 = {
        pts: String(part.pts||2),
        items: (part.items||[]).map(it => ({
          s1:it.s1||'', kw:it.kw||'', before:it.before||'', after:it.after||'',
          answers:(it.key||[]).join('; ')
        }))
      };
    } else if (id==='p5') {
      partData.p5 = {
        title:part.title||'', text:part.text||'', pts:String(part.pts||2),
        items:(part.items||[]).map(it=>({
          question:it.question||'',
          a:it.options?.[0]||'', b:it.options?.[1]||'', c:it.options?.[2]||'', d:it.options?.[3]||'',
          correct:['a','b','c','d'][it.answer]||'a'
        }))
      };
    } else if (id==='p6') {
      partData.p6 = {
        pts:String(part.pts||2),
        texts:(part.texts||[]).map(t=>({label:t.label||'A', title:t.title||'', content:t.content||''})),
        items:(part.items||[]).map(it=>({question:it.question||'', answer:it.answer||'A'}))
      };
    } else if (id==='p7') {
      partData.p7 = {
        title:part.title||'', text:part.text||'', pts:String(part.pts||2),
        paragraphs:(part.paragraphs||[]).map(p=>({label:p.label||'', content:p.content||''})),
        key:[...(part.key||[])]
      };
    } else if (id==='p8') {
      partData.p8 = {
        pts:String(part.pts||1),
        texts:(part.texts||[]).map(t=>({label:t.label||'A', title:t.title||'', content:t.content||''})),
        items:(part.items||[]).map(it=>({question:it.question||'', answer:it.answer||'A'}))
      };
    }
  });
  return {
    meta: { title:exam.title||'', variantId:v.id||'V1' },
    enabled, partData
  };
}

// ── UI primitives ─────────────────────────────────────────────────────────
const IS = { border:"1px solid #d0d8e8",borderRadius:6,padding:"7px 10px",fontSize:13,
  width:"100%",boxSizing:"border-box",fontFamily:"inherit",outline:"none" };

function Inp({value,onChange,placeholder,style,type}) {
  return <input type={type||"text"} value={value} onChange={onChange} placeholder={placeholder} style={{...IS,...style}}/>;
}
function Ta({value,onChange,placeholder,rows,style}) {
  return <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows||4} style={{...IS,resize:"vertical",...style}}/>;
}
function Fld({label,hint,children,style}) {
  return (
    <div style={{marginBottom:10,...style}}>
      <div style={{marginBottom:4}}>
        <span style={{fontSize:12,fontWeight:600,color:"#444"}}>{label}</span>
        {hint && <span style={{fontSize:11,color:"#999",marginLeft:6}}>{hint}</span>}
      </div>
      {children}
    </div>
  );
}
function AddBtn({onClick,label}) {
  return <button onClick={onClick} style={{background:"transparent",border:"2px dashed #b0c4d8",
    color:C.mid,borderRadius:8,padding:"8px 16px",fontSize:12,cursor:"pointer",
    fontWeight:600,marginTop:8,width:"100%"}}>+ {label}</button>;
}
function ItemCard({num,onDelete,children}) {
  return (
    <div style={{border:"1px solid #e0e8f0",borderRadius:8,padding:14,marginBottom:10,background:"#f8fbff"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontWeight:700,color:C.dark,fontSize:13}}>#{num}</span>
        <button onClick={onDelete} style={{background:C.red,color:"#fff",border:"none",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:11}}>✕</button>
      </div>
      {children}
    </div>
  );
}
function MCOpts({item,onChange,nameKey}) {
  return (
    <>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        {['a','b','c','d'].map(l=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontWeight:700,color:C.mid,minWidth:18,fontSize:13}}>{l.toUpperCase()}</span>
            <Inp value={item[l]||''} onChange={e=>onChange(l,e.target.value)} placeholder={`Option ${l.toUpperCase()}`}/>
          </div>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginTop:4}}>
        <span style={{fontSize:12,color:"#555",fontWeight:600}}>Răspuns corect:</span>
        {['a','b','c','d'].map(l=>(
          <label key={l} style={{display:"flex",alignItems:"center",gap:3,cursor:"pointer",fontSize:13,
            fontWeight:item.correct===l?700:400,color:item.correct===l?C.mid:"#555"}}>
            <input type="radio" name={nameKey} checked={item.correct===l} onChange={()=>onChange('correct',l)}/>
            {l.toUpperCase()}
          </label>
        ))}
      </div>
    </>
  );
}
function PartCard({num,label,pts,onPtsChange,onRemove,children}) {
  const [open,setOpen] = useState(true);
  return (
    <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px rgba(0,0,0,.07)",marginBottom:16,overflow:"hidden"}}>
      <div style={{background:C.dark,padding:"10px 16px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{background:"rgba(255,255,255,.18)",borderRadius:6,padding:"2px 10px",fontSize:11,fontWeight:700,color:"#fff"}}>Part {num}</div>
        <div style={{flex:1,fontWeight:600,color:"#fff",fontSize:14}}>{label}</div>
        <span style={{color:"rgba(255,255,255,.7)",fontSize:12}}>pts/item:</span>
        <input type="number" min="1" max="10" value={pts} onChange={onPtsChange}
          style={{width:50,padding:"3px 6px",borderRadius:4,border:"1px solid rgba(255,255,255,.3)",background:"rgba(255,255,255,.15)",color:"#fff",fontSize:12,textAlign:"center"}}/>
        <button onClick={()=>setOpen(o=>!o)} style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",borderRadius:4,padding:"4px 8px",cursor:"pointer",fontSize:12}}>{open?"▲":"▼"}</button>
        <button onClick={onRemove} style={{background:"rgba(192,57,43,.8)",border:"none",color:"#fff",borderRadius:4,padding:"4px 9px",cursor:"pointer",fontSize:12}}>✕ Elimină</button>
      </div>
      {open && <div style={{padding:18}}>{children}</div>}
    </div>
  );
}

// ── Part 1 — Multiple Choice Cloze ────────────────────────────────────────
function P1Edit({data,onChange}) {
  const upd  = (k,v) => onChange({...data,[k]:v});
  const updIt= (i,f,v) => onChange({...data, items:data.items.map((it,j)=>j===i?{...it,[f]:v}:it)});
  const addIt= () => onChange({...data, items:[...data.items, {a:'',b:'',c:'',d:'',correct:'a'}]});
  const delIt= i => onChange({...data, items:data.items.filter((_,j)=>j!==i)});
  return (
    <>
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10,marginBottom:14}}>
        <Fld label="Titlu text"><Inp value={data.title} onChange={e=>upd('title',e.target.value)} placeholder="THE DIGITAL AGE"/></Fld>
        <Fld label="Text (cu [1] [2]... unde sunt golurile)">
          <Ta value={data.text} onChange={e=>upd('text',e.target.value)} rows={4}
            placeholder="In today's world, technology has [1] the way we [2] information..."/>
        </Fld>
      </div>
      {data.items.map((it,i)=>(
        <ItemCard key={i} num={i+1} onDelete={()=>delIt(i)}>
          <MCOpts item={it} onChange={(f,v)=>updIt(i,f,v)} nameKey={`p1-${i}`}/>
        </ItemCard>
      ))}
      <AddBtn onClick={addIt} label="Adaugă gol (item)"/>
    </>
  );
}

// ── Part 2 — Open Cloze ───────────────────────────────────────────────────
function P2Edit({data,onChange}) {
  const upd = (k,v) => onChange({...data,[k]:v});
  const gapN = (data.text.match(/\[\d+\]/g)||[]).length;
  const setGap = (i,v) => {
    const a = [...(data.answers||[])];
    while (a.length <= i) a.push('');
    a[i] = v;
    onChange({...data, answers:a});
  };
  const onTextChange = t => {
    const n = (t.match(/\[\d+\]/g)||[]).length;
    const ans = [...(data.answers||[])];
    while (ans.length < n) ans.push('');
    onChange({...data, text:t, answers:ans.slice(0, Math.max(n, ans.length))});
  };
  return (
    <>
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10,marginBottom:14}}>
        <Fld label="Titlu text">
          <Inp value={data.title} onChange={e=>upd('title',e.target.value)} placeholder="SOCIAL MEDIA"/>
        </Fld>
        <Fld label={`Text cu goluri [1] [2]... (${gapN} detectate)`}>
          <Ta value={data.text} onChange={e=>onTextChange(e.target.value)} rows={6}
            placeholder="Social media has [1] the way we [2] information. Many people now [3] their news online rather than from traditional sources..."/>
        </Fld>
      </div>
      {gapN > 0 && (
        <>
          <div style={{fontSize:12,fontWeight:600,color:"#444",marginBottom:6}}>
            Răspunsuri acceptate per gol
            <span style={{color:"#999",fontWeight:400,marginLeft:6}}>variante separate prin ;</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:6}}>
            {Array.from({length:gapN},(_,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontWeight:700,color:C.dark,minWidth:28,fontSize:12}}>({i+1})</span>
                <Inp value={data.answers?.[i]||''} onChange={e=>setGap(i,e.target.value)} placeholder="answer; alternative"/>
              </div>
            ))}
          </div>
        </>
      )}
    </>
  );
}

// ── Part 3 — Word Formation ───────────────────────────────────────────────
function P3Edit({data, onChange}) {
  const addIt = () => onChange({
    ...data, 
    items: [...(data.items || []), { base: '', answers: '' }] 
  });
  
  const updIt = (i, f, v) => {
    const newItems = [...(data.items || [])];
    newItems[i] = { ...newItems[i], [f]: f === 'base' ? v.toUpperCase() : v };
    onChange({ ...data, items: newItems });
  };

  const delIt = (i) => onChange({
    ...data, 
    items: (data.items || []).filter((_, j) => j !== i)
  });

  return (
    <>
      <Fld label="Textul Exercițiului">
        <div style={{fontSize:11, color:"#666", marginBottom:4}}>
          Exemplu: Folosește <b>[17]</b>, <b>[18]</b> etc. (Ele vor accesa elementele 1, 2... din lista de jos).
        </div>
        <Ta 
          value={data.text || ''} 
          onChange={e => onChange({...data, text: e.target.value})} 
          rows={8}
          placeholder="The [17] of the building... It was [18]..."
        />
      </Fld>

      <div style={{ marginTop: 20 }}>
        <div style={{ display: "grid", gridTemplateColumns: "80px 1fr 2fr 40px", gap: 10, marginBottom: 8, fontSize: 11, fontWeight: 700 }}>
          <div>ID (Corelat)</div>
          <div>CUVÂNT BAZĂ</div>
          <div>RĂSPUNS CORECT</div>
          <div></div>
        </div>
        
        {(data.items || []).map((it, i) => (
          <div key={i} style={{ display: "grid", gridTemplateColumns: "80px 1fr 2fr 40px", gap: 10, alignItems: "center", marginBottom: 8 }}>
            {/* Afișăm automat ce marker ar trebui să folosești în text pentru acest rând */}
            <div style={{ fontWeight: 700, textAlign: "center", background: "#f0f4ff", borderRadius: 4, padding: "4px 0" }}>
              [{startNum + i + 1}]
            </div>
            <Inp 
              value={it.base} 
              onChange={e => updIt(i, 'base', e.target.value)} 
              placeholder="BASE"
              style={{ textTransform: "uppercase", fontWeight: 700 }}
            />
            <Inp 
              value={it.answers} 
              onChange={e => updIt(i, 'answers', e.target.value)} 
              placeholder="answer"
            />
            <button onClick={() => delIt(i)} style={{ border: "none", background: "none", cursor: "pointer", color: "#ef4444" }}>✕</button>
          </div>
        ))}
        <AddBtn onClick={addIt} label="Adaugă Gap" />
      </div>
    </>
  );
}

function P4Edit({data, onChange}) {
  const updIt = (i, f, v) => onChange({
    ...data, 
    items: data.items.map((it, j) => j === i ? { ...it, [f]: f === 'kw' ? v.toUpperCase() : v } : it)
  });

  const addIt = () => onChange({
    ...data, 
    items: [...(data.items || []), { s1: '', kw: '', before: '', after: '', answers: '' }]
  });

  const delIt = i => onChange({
    ...data, 
    items: data.items.filter((_, j) => j !== i)
  });

  return (
    <>
      <div style={{ fontSize: 12, color: "#888", marginBottom: 12 }}>
        Elevul rescrie propoziția folosind cuvântul cheie fără să îl modifice (3–6 cuvinte).
      </div>
      {(data.items || []).map((it, i) => (
        <ItemCard key={i} num={i + 1} onDelete={() => delIt(i)}>
          <Fld label="Propoziție originală">
            <Ta value={it.s1} onChange={e => updIt(i, 's1', e.target.value)} rows={2}
              placeholder="She had no idea how costly the renovation would turn out to be."/>
          </Fld>
          
          <div style={{ display: "grid", gridTemplateColumns: "1fr 150px 1fr", gap: 10, alignItems: "end", marginTop: 10 }}>
            <Fld label="Context înainte (fix)">
              <Inp value={it.before} onChange={e => updIt(i, 'before', e.target.value)} placeholder="It only"/>
            </Fld>
            <Fld label="CUVÂNT CHEIE">
              <input value={it.kw} onChange={e => updIt(i, 'kw', e.target.value)} placeholder="DAWNED"
                style={{ ...IS, width: "100%", textAlign: "center", fontWeight: 700, textTransform: "uppercase", color: "#2563eb" }}/>
            </Fld>
            <Fld label="Context după (fix)">
              <Inp value={it.after} onChange={e => updIt(i, 'after', e.target.value)} placeholder="costly the renovation would be."/>
            </Fld>
          </div>

          <Fld label="Răspunsuri acceptate (partea de completat)" hint="separate prin ;">
            <Inp value={it.answers} onChange={e => updIt(i, 'answers', e.target.value)}
              placeholder="dawned on her how; only dawned on her how"/>
          </Fld>
        </ItemCard>
      ))}
      <AddBtn onClick={addIt} label="Adaugă item" />
    </>
  );
}
// ── Part 5 — Multiple Choice Reading ─────────────────────────────────────
function P5Edit({data,onChange}) {
  const upd   = (k,v) => onChange({...data,[k]:v});
  const updIt = (i,f,v) => onChange({...data, items:data.items.map((it,j)=>j===i?{...it,[f]:v}:it)});
  const addIt = () => onChange({...data, items:[...data.items, {question:'',a:'',b:'',c:'',d:'',correct:'a'}]});
  const delIt = i => onChange({...data, items:data.items.filter((_,j)=>j!==i)});
  return (
    <>
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10,marginBottom:14}}>
        <Fld label="Titlu text">
          <Inp value={data.title} onChange={e=>upd('title',e.target.value)} placeholder="A PASSION FOR MAPS"/>
        </Fld>
        <Fld label="Text de citit (pasajul complet)">
          <Ta value={data.text} onChange={e=>upd('text',e.target.value)} rows={10}
            placeholder="Paste the full reading passage here..."/>
        </Fld>
      </div>
      {data.items.map((it,i)=>(
        <ItemCard key={i} num={i+1} onDelete={()=>delIt(i)}>
          <Fld label="Întrebare">
            <Ta value={it.question} onChange={e=>updIt(i,'question',e.target.value)} rows={2}
              placeholder="The writer suggests that the main reason people enjoy maps is..."/>
          </Fld>
          <MCOpts item={it} onChange={(f,v)=>updIt(i,f,v)} nameKey={`p5-${i}`}/>
        </ItemCard>
      ))}
      <AddBtn onClick={addIt} label="Adaugă întrebare"/>
    </>
  );
}

// ── Part 6 — Cross-text Multiple Matching ────────────────────────────────
function P6Edit({data,onChange}) {
  const updTxt = (i,f,v) => onChange({...data, texts:data.texts.map((t,j)=>j===i?{...t,[f]:v}:t)});
  const updIt  = (i,f,v) => onChange({...data, items:data.items.map((it,j)=>j===i?{...it,[f]:v}:it)});
  const addIt  = () => onChange({...data, items:[...data.items, {question:'', answer:data.texts[0]?.label||'A'}]});
  const delIt  = i => onChange({...data, items:data.items.filter((_,j)=>j!==i)});
  return (
    <>
      <div style={{fontSize:12,color:"#888",marginBottom:12}}>
        4 texte scurte (scriitori / recenzori). Elevul potrivește întrebările la textul corect.
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {(data.texts||[]).map((t,i)=>(
          <div key={i} style={{border:"1px solid #e0e8f0",borderRadius:8,padding:12,background:"#f8fbff"}}>
            <div style={{fontWeight:700,color:C.mid,marginBottom:8}}>Text {t.label}</div>
            <Fld label="Titlu / Autor">
              <Inp value={t.title} onChange={e=>updTxt(i,'title',e.target.value)} placeholder="Writer A — The Guardian"/>
            </Fld>
            <Fld label="Conținut">
              <Ta value={t.content} onChange={e=>updTxt(i,'content',e.target.value)} rows={5}
                placeholder="This writer argues that social media has fundamentally changed..."/>
            </Fld>
          </div>
        ))}
      </div>
      <div style={{fontSize:12,fontWeight:600,color:"#444",marginBottom:8}}>
        Întrebări de potrivire
        <span style={{color:"#999",fontWeight:400,marginLeft:6}}>(selectați textul corect din dropdown)</span>
      </div>
      {data.items.map((it,i)=>(
        <ItemCard key={i} num={i+1} onDelete={()=>delIt(i)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,alignItems:"end"}}>
            <Fld label="Enunț">
              <Ta value={it.question} onChange={e=>updIt(i,'question',e.target.value)} rows={2}
                placeholder="Which writer expresses doubt about the long-term benefits of social media?"/>
            </Fld>
            <Fld label="Răspuns">
              <select value={it.answer} onChange={e=>updIt(i,'answer',e.target.value)} style={{...IS,width:75}}>
                {(data.texts||[]).map(t=><option key={t.label} value={t.label}>{t.label}</option>)}
              </select>
            </Fld>
          </div>
        </ItemCard>
      ))}
      <AddBtn onClick={addIt} label="Adaugă întrebare"/>
    </>
  );
}

// ── Part 7 — Gapped Text ─────────────────────────────────────────────────
function P7Edit({data,onChange}) {
  const upd = (k,v) => onChange({...data,[k]:v});
  const LETTERS = 'ABCDEFGHIJKLMNOP';
  const gapN = (data.text.match(/\[\d+\]/g)||[]).length;
  const paraLabels = LETTERS.slice(0, gapN+1).split('');

  const syncText = t => {
    const n = (t.match(/\[\d+\]/g)||[]).length;
    const labels = LETTERS.slice(0, n+1).split('');
    const paras  = labels.map((l,i) => data.paragraphs?.[i] || {label:l, content:''});
    const key    = Array.from({length:n}, (_,i) => data.key?.[i] || '');
    onChange({...data, text:t, paragraphs:paras, key});
  };
  const updPara = (i,v) => onChange({...data, paragraphs:data.paragraphs.map((p,j)=>j===i?{...p,content:v}:p)});
  const setKey  = (i,v) => { const k=[...(data.key||[])]; k[i]=v.toUpperCase(); onChange({...data,key:k}); };

  return (
    <>
      <div style={{fontSize:12,color:"#888",marginBottom:12}}>
        Marcați cu [1] [2]... locurile din text unde lipsesc paragrafele. Sistemul detectează automat numărul de goluri și creează N+1 paragrafe (unul e distractor).
      </div>
      <Fld label="Titlu">
        <Inp value={data.title} onChange={e=>upd('title',e.target.value)} placeholder="THE HISTORY OF FLIGHT"/>
      </Fld>
      <Fld label={`Text principal — [1] [2]... pentru paragrafe lipsă (${gapN} detectate)`}>
        <Ta value={data.text} onChange={e=>syncText(e.target.value)} rows={8}
          placeholder="The history of aviation begins with the Wright Brothers. [1] Early experiments repeatedly failed before success was achieved. [2] By the 20th century, commercial flight had transformed the world."/>
      </Fld>
      {gapN > 0 && (
        <>
          <div style={{fontSize:12,fontWeight:600,color:"#444",marginBottom:8}}>
            Paragrafe ({paraLabels.join(', ')})
            <span style={{color:"#999",fontWeight:400,marginLeft:6}}>— ultimul este distractor (nu intră în cheie)</span>
          </div>
          {(data.paragraphs||[]).map((p,i)=>(
            <div key={i} style={{border:"1px solid #e0e8f0",borderRadius:8,padding:12,marginBottom:8,background:"#f8fbff"}}>
              <div style={{fontWeight:700,color:C.mid,marginBottom:6}}>Paragraful {p.label}</div>
              <Ta value={p.content} onChange={e=>updPara(i,e.target.value)} rows={3}
                placeholder={`Conținutul paragrafului ${p.label}...`}/>
            </div>
          ))}
          <div style={{fontSize:12,fontWeight:600,color:"#444",marginBottom:6}}>Cheie — ce paragraf merge în fiecare gol</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {Array.from({length:gapN},(_,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontWeight:700,color:C.dark,fontSize:12}}>({i+1})</span>
                <select value={data.key?.[i]||''} onChange={e=>setKey(i,e.target.value)} style={{...IS,width:65}}>
                  <option value="">—</option>
                  {paraLabels.map(l=><option key={l} value={l}>{l}</option>)}
                </select>
              </div>
            ))}
          </div>
        </>
      )}
    </>
  );
}

// ── Part 8 — Multiple Matching ────────────────────────────────────────────
function P8Edit({data,onChange}) {
  const LETTERS = 'ABCDEFGHIJKLMNOP';
  const addTxt = () => { const l=LETTERS[data.texts.length]||'X'; onChange({...data, texts:[...data.texts,{label:l,title:'',content:''}]}); };
  const delTxt = i => onChange({...data, texts:data.texts.filter((_,j)=>j!==i)});
  const updTxt = (i,f,v) => onChange({...data, texts:data.texts.map((t,j)=>j===i?{...t,[f]:v}:t)});
  const addIt  = () => onChange({...data, items:[...data.items, {question:'', answer:data.texts[0]?.label||'A'}]});
  const delIt  = i => onChange({...data, items:data.items.filter((_,j)=>j!==i)});
  const updIt  = (i,f,v) => onChange({...data, items:data.items.map((it,j)=>j===i?{...it,[f]:v}:it)});
  return (
    <>
      <div style={{fontSize:12,color:"#888",marginBottom:12}}>
        Mai multe texte scurte (secțiuni A, B, C...). Elevul citește întrebările și selectează secțiunea care se potrivește.
      </div>
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:12,fontWeight:600,color:"#444"}}>Texte / Secțiuni</div>
          <button onClick={addTxt} style={{background:C.mid,color:"#fff",border:"none",borderRadius:4,padding:"4px 10px",cursor:"pointer",fontSize:11}}>+ Adaugă text</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {data.texts.map((t,i)=>(
            <div key={i} style={{border:"1px solid #e0e8f0",borderRadius:8,padding:12,background:"#f8fbff"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <div style={{fontWeight:700,color:C.mid}}>Secțiunea {t.label}</div>
                <button onClick={()=>delTxt(i)} style={{background:C.red,color:"#fff",border:"none",borderRadius:4,padding:"2px 6px",cursor:"pointer",fontSize:10}}>✕</button>
              </div>
              <Fld label="Titlu"><Inp value={t.title} onChange={e=>updTxt(i,'title',e.target.value)} placeholder="Section A title"/></Fld>
              <Fld label="Conținut"><Ta value={t.content} onChange={e=>updTxt(i,'content',e.target.value)} rows={4}/></Fld>
            </div>
          ))}
        </div>
      </div>
      <div style={{fontSize:12,fontWeight:600,color:"#444",marginBottom:8}}>
        Întrebări
        <span style={{color:"#999",fontWeight:400,marginLeft:6}}>(selectați secțiunea cu răspunsul din dropdown)</span>
      </div>
      {data.items.map((it,i)=>(
        <ItemCard key={i} num={i+1} onDelete={()=>delIt(i)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,alignItems:"end"}}>
            <Fld label="Enunț">
              <Ta value={it.question} onChange={e=>updIt(i,'question',e.target.value)} rows={2}
                placeholder="Which section mentions a specific historical event?"/>
            </Fld>
            <Fld label="Secțiune">
              <select value={it.answer} onChange={e=>updIt(i,'answer',e.target.value)} style={{...IS,width:75}}>
                {(data.texts||[]).map(t=><option key={t.label} value={t.label}>{t.label}</option>)}
              </select>
            </Fld>
          </div>
        </ItemCard>
      ))}
      <AddBtn onClick={addIt} label="Adaugă întrebare"/>
    </>
  );
}

const EDITORS = { p1: P1Edit, p2: P2Edit, p3: P3Edit, p4: P4Edit, p5: P5Edit, p6: P6Edit, p7: P7Edit, p8: P8Edit };

// ── Main ──────────────────────────────────────────────────────────────────
function ExamBuilder() {
  if(!ADMIN.isAuthed()) { window.location.replace("index.html"); return null; }
  const params = new URLSearchParams(window.location.search);
  const editId = params.get("id");

  const [meta, setMeta] = useState({title:'',variantId:'V1'});
  const [enabled, setEnabled] = useState({p1:false,p2:false,p3:false,p4:false,p5:false,p6:false,p7:false,p8:false});
  const [partData, setPartData] = useState(()=>{
    const d = {};
    PARTS_META.forEach(p => { d[p.id] = initPart(p.id, p.defPts); });
    return d;
  });
  const [msg, setMsg] = useState({type:'',text:''});
  const [loading, setLoading] = useState(!!editId);
  const [showRaw, setShowRaw]   = useState(false);
  const [rawJson, setRawJson]   = useState('');
  const [rawErr,  setRawErr]    = useState('');
  const [editorKey, setEditorKey] = useState(0);

  const openRaw = () => {
    // Pre-fill with the current exam state so the user can edit live
    try {
      const current = toDBVariant(meta, enabled, partData);
      setRawJson(JSON.stringify(current, null, 2));
    } catch(e) {
      setRawJson('');
    }
    setRawErr('');
    setShowRaw(true);
  };

  const applyRaw = () => {
    setRawErr('');
    let parsed;
    try { parsed = JSON.parse(rawJson); } catch(e) { setRawErr('JSON invalid: ' + e.message); return; }
    if (!parsed.variants?.length) { setRawErr('JSON invalid: lipsesc variants[].'); return; }
    const loaded = fromDB(parsed);
    const hasParts = PARTS_META.some(p => loaded.enabled[p.id]);
    setMeta(loaded.meta); setEnabled(loaded.enabled); setPartData(loaded.partData);
    setEditorKey(k => k + 1);
    setShowRaw(false); setRawErr('');
    setMsg({type: hasParts ? 'ok' : 'err',
            text: hasParts ? 'JSON aplicat. Verificați câmpurile și salvați.'
                           : 'JSON aplicat, dar nu conține secțiuni (parts[]). Verificați formatul.'});
  };

  useEffect(() => {
    // init() e deja rezolvat când ajungem aici (apelat în CPEEN.init().then(...render))
    // dar păstrăm un guard explicit pentru siguranță
    if (!editId) return;
    const exam = CPEEN.getExams().find(e => e.id === editId);
    if (!exam) {
      setMsg({type:'err', text:`Subiectul cu ID "${editId}" nu a fost găsit.`});
      setLoading(false);
      return;
    }
    const loaded = fromDB(exam);
    setMeta(loaded.meta);
    setEnabled(loaded.enabled);
    setPartData(loaded.partData);
    setLoading(false);
  }, []);

  const toggle  = id => {
    if (!IMPLEMENTED[id]) {
      setMsg({type:'err', text:`${PARTS_META.find(p=>p.id===id).label} — editorul va fi adăugat în pașii următori.`});
      return;
    }
    setEnabled(p => ({...p, [id]: !p[id]}));
  };
  const updPts  = (id,v) => setPartData(p => ({...p, [id]: {...p[id], pts:v}}));
  const updPart = (id,d) => setPartData(p => ({...p, [id]: d}));

  const save = () => {
    setMsg({type:'',text:''});
    if (!meta.title.trim()) { setMsg({type:'err',text:'Titlul este obligatoriu.'}); return; }
    if (!PARTS_META.some(p => enabled[p.id])) { setMsg({type:'err',text:'Selectați cel puțin o secțiune.'}); return; }
    const data = toDBVariant(meta, enabled, partData);
    editId ? CPEEN.updateExam(editId, data) : CPEEN.addExam(data);
    setMsg({type:'ok', text:'Subiect salvat!'});
    setTimeout(()=>window.location.replace('exams.html'), 1100);
  };

  const btnStyle = {background:C.dark,color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontSize:14,fontWeight:700,cursor:"pointer"};

  if (loading) {
    return (
      <div style={{minHeight:"100vh",background:C.bg}}>
        <ADMIN.Nav active="exams"/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",color:C.mid,fontSize:15,fontFamily:"Inter,system-ui,sans-serif"}}>
          Se încarcă subiectul…
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <ADMIN.Nav active="exams"/>
      <div style={{maxWidth:920,margin:"0 auto",padding:"24px 16px"}}>

        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
          <a href="exams.html" style={{color:C.mid,textDecoration:"none",fontSize:13}}>← Înapoi</a>
          <h2 style={{color:C.dark,fontSize:20,margin:0,flex:1}}>{editId?"Editare subiect":"Subiect nou"}</h2>
          <button onClick={showRaw ? ()=>setShowRaw(false) : openRaw}
            style={{background: showRaw ? C.mid : "#fff", color: showRaw ? "#fff" : C.mid,
                    border:`2px solid ${C.mid}`,borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {showRaw ? "✕ Închide JSON" : "{ } JSON brut"}
          </button>
          <button onClick={save} style={btnStyle}>{editId?"Actualizează":"Salvează"}</button>
        </div>

        {/* Raw JSON editor panel */}
        {showRaw && (
          <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px rgba(0,0,0,.07)",padding:20,marginBottom:20,border:`2px solid ${C.mid}`}}>
            <div style={{fontWeight:700,color:C.dark,fontSize:14,marginBottom:6}}>JSON brut — editare directă</div>
            <p style={{fontSize:12,color:"#666",marginBottom:8}}>
              Editați JSON-ul direct sau lipiți unul nou. Clickul pe „Aplică" actualizează editorul vizual.
            </p>
            <textarea
              value={rawJson} onChange={e=>setRawJson(e.target.value)}
              spellCheck={false}
              style={{width:"100%",minHeight:280,fontFamily:"monospace",fontSize:12,padding:10,
                      borderRadius:6,border:"1px solid #ccd",boxSizing:"border-box",resize:"vertical",lineHeight:1.5}}
            />
            {rawErr && <div style={{color:C.red,fontSize:12,marginTop:6}}>{rawErr}</div>}
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button onClick={applyRaw}
                style={{background:C.mid,color:"#fff",border:"none",borderRadius:6,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                Aplică în editor
              </button>
              <button onClick={()=>{setShowRaw(false);setRawErr('');}}
                style={{background:"#eee",color:"#555",border:"none",borderRadius:6,padding:"8px 16px",fontSize:13,cursor:"pointer"}}>
                Anulează
              </button>
            </div>
          </div>
        )}

        {/* Metadata */}
        <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px rgba(0,0,0,.07)",padding:20,marginBottom:20}}>
          <div style={{fontWeight:700,color:C.dark,fontSize:14,marginBottom:14}}>Informații generale</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"end"}}>
            <Fld label="Titlu subiect"><Inp value={meta.title} onChange={e=>setMeta(p=>({...p,title:e.target.value}))} placeholder="ex: FCE Practice Paper 1"/></Fld>
            <Fld label="ID Variantă" hint="Identificator intern (V1, V2…)"><Inp value={meta.variantId} onChange={e=>setMeta(p=>({...p,variantId:e.target.value}))} placeholder="V1" style={{width:80}}/></Fld>
          </div>
        </div>

        {/* Part selector */}
        <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px rgba(0,0,0,.07)",padding:20,marginBottom:20}}>
          <div style={{fontWeight:700,color:C.dark,fontSize:14,marginBottom:14}}>Secțiuni — click pentru a activa</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
            {PARTS_META.map(p => {
              const ready = !!IMPLEMENTED[p.id];
              const on = enabled[p.id];
              return (
                <div key={p.id} onClick={()=>toggle(p.id)} style={{
                  border:`2px solid ${on?C.mid:(ready?"#d0d8e8":"#e8e8e8")}`,borderRadius:10,padding:"12px 14px",
                  cursor:"pointer",background:on?"#e8f4fd":(ready?"#fafafa":"#f3f3f3"),transition:"all .15s",
                  opacity:ready?1:0.6
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontWeight:700,fontSize:12,color:on?C.mid:"#888"}}>Part {p.num}</span>
                    {ready ? (
                      <div style={{width:16,height:16,borderRadius:3,border:`2px solid ${on?C.mid:"#bbb"}`,
                        background:on?C.mid:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {on && <span style={{color:"#fff",fontSize:10}}>✓</span>}
                      </div>
                    ) : (
                      <span style={{fontSize:9,fontWeight:700,color:"#999",background:"#e0e0e0",padding:"1px 5px",borderRadius:3}}>SOON</span>
                    )}
                  </div>
                  <div style={{fontSize:11,fontWeight:600,color:C.dark,marginBottom:3}}>{p.label}</div>
                  <div style={{fontSize:10,color:"#888",lineHeight:1.4}}>{p.hint}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Enabled part cards — key={editorKey} forțează remount complet după import JSON */}
        {PARTS_META.filter(p => enabled[p.id]).map(p => {
          const Ed = EDITORS[p.id];
          return (
            <PartCard key={`${p.id}_${editorKey}`} num={p.num} label={p.label}
              pts={partData[p.id]?.pts || String(p.defPts)}
              onPtsChange={e=>updPts(p.id, e.target.value)}
              onRemove={()=>toggle(p.id)}>
              {Ed ? <Ed data={partData[p.id]} onChange={d=>updPart(p.id,d)}/> : null}
            </PartCard>
          );
        })}

        {msg.text && <div style={{padding:"12px 16px",borderRadius:8,marginBottom:16,fontWeight:600,
          background:msg.type==='ok'?"#e8f5e9":"#fdecea",color:msg.type==='ok'?"#15803d":C.red}}>{msg.text}</div>}

        <div style={{display:"flex",gap:10,justifyContent:"flex-end",paddingBottom:40}}>
          <a href="exams.html" style={{display:"inline-block",padding:"10px 20px",border:"2px solid #d0d8e8",borderRadius:8,color:"#666",textDecoration:"none",fontWeight:600,fontSize:14}}>Anulează</a>
          <button onClick={save} style={btnStyle}>{editId?"Actualizează":"Salvează subiectul"}</button>
        </div>
      </div>
    </div>
  );
}

document.getElementById("root").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,system-ui,sans-serif;color:#2563eb;font-size:14px;">Se încarcă…</div>';
CPEEN.init().then(()=>ReactDOM.createRoot(document.getElementById("root")).render(<ExamBuilder/>));
</script>

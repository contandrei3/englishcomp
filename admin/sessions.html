<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sesiuni – Admin ECHO</title>
<link rel="stylesheet" href="../css/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="../js/config.js"></script>
<script src="../js/db.js"></script>
<script src="../js/admin.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const SESSION_TYPES = [
  {v:"A2-calificare",  l:"A2 Calificare",  cls:"b-A2"},
  {v:"A2-finala",      l:"A2 Finală",       cls:"b-A2"},
  {v:"B1-calificare",  l:"B1 Calificare",   cls:"b-B1"},
  {v:"B1-finala",      l:"B1 Finală",       cls:"b-B1"},
  {v:"B2-calificare",  l:"B2 Calificare",   cls:"b-B2"},
  {v:"B2-finala",      l:"B2 Finală",       cls:"b-B2"},
  {v:"C1-calificare",  l:"C1 Calificare",   cls:"b-C1"},
  {v:"C1-finala",      l:"C1 Finală",       cls:"b-C1"},
  {v:"FCE",            l:"FCE",             cls:"b-FCE"},
  {v:"CAE",            l:"CAE",             cls:"b-CAE"},
];

const FIXED_DUR = CPEEN.TYPE_DURATION; // {FCE:75, CAE:90}

function fmtTime(ms) {
  if (ms <= 0) return "00:00";
  const s = Math.floor(ms / 1000);
  return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
}

function fmtHM(ts) {
  if (!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleTimeString("ro-RO", {hour:"2-digit",minute:"2-digit"});
}

// ── Wizard ────────────────────────────────────────────────────────────────────
function Wizard({ exams, participants, onClose, onCreated }) {
  const [step,      setStep]      = useState(1);
  const [typeSel,   setTypeSel]   = useState("");
  const [examId,    setExamId]    = useState("");
  const [duration,  setDuration]  = useState("");
  const [selected,  setSelected]  = useState(new Set());
  const [err,       setErr]       = useState("");

  const fixedDur = typeSel ? FIXED_DUR[typeSel] : null;

  // Level quick-filters for step 3 participant selection
  const { level: selLevel } = typeSel ? CPEEN.splitType(typeSel) : { level: "" };
  const LEVELS = ["A2","B1","B2","C1","FCE","CAE"];

  const toggleAll = (lvl) => {
    const ids = participants.filter(p => p.level === lvl).map(p => p.id);
    if (ids.length === 0) return;
    const allOn = ids.every(id => selected.has(id));
    setSelected(prev => {
      const s = new Set(prev);
      ids.forEach(id => allOn ? s.delete(id) : s.add(id));
      return s;
    });
  };

  const toggleOne = (id) => {
    setSelected(prev => {
      const s = new Set(prev);
      s.has(id) ? s.delete(id) : s.add(id);
      return s;
    });
  };

  const selExam = exams.find(e => e.id === examId) || null;

  const create = () => {
    setErr("");
    if (!typeSel)    { setErr("Selectați tipul sesiunii.");       return; }
    if (!examId)     { setErr("Selectați un subiect.");           return; }
    if (!selExam?.variants?.length) { setErr("Subiectul nu are variante."); return; }
    const dur = fixedDur || parseInt(duration);
    if (!dur || dur < 1) { setErr("Introduceți o durată validă (minute)."); return; }
    if (!selected.size) { setErr("Selectați cel puțin un participant."); return; }

    const group = CPEEN.addGroupSession(typeSel, examId, dur, "random");
    CPEEN.addParticipantsToGroup(group.id, [...selected], selExam);
    onCreated();
    onClose();
  };

  return (
    <div className="modal-overlay">
      <div className="modal-box modal-box-sm">
        <div className="modal-head modal-head-mid">
          <div>
            <h3>Sesiune nouă</h3>
            <p>Pasul {step} din 3</p>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {err && <div className="alert alert-err" style={{marginBottom:12}}>{err}</div>}

          {/* Step 1 — type picker */}
          {step === 1 && (
            <>
              <div style={{fontSize:13,color:"#555",marginBottom:12,fontWeight:600}}>Pasul 1: Alege tipul sesiunii</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                {SESSION_TYPES.map(t => (
                  <div key={t.v}
                    onClick={() => setTypeSel(t.v)}
                    style={{
                      border:`2px solid ${typeSel===t.v?"#2563eb":"#ddd"}`,
                      background: typeSel===t.v ? "#e8f4fd" : "#fafafa",
                      borderRadius:10, padding:"10px 14px", cursor:"pointer",
                      display:"flex", alignItems:"center", gap:10
                    }}>
                    <span className={`badge ${t.cls}`}>{t.v.split("-")[0]}</span>
                    <span style={{fontSize:13,fontWeight:600,color:"#333"}}>{t.l}</span>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
                <button className="btn btn-ghost btn-sm" onClick={onClose}>Anulează</button>
                <button className="btn btn-primary btn-sm" disabled={!typeSel} onClick={()=>{setErr("");setStep(2);}}>
                  Continuă →
                </button>
              </div>
            </>
          )}

          {/* Step 2 — exam + duration */}
          {step === 2 && (
            <>
              <div style={{fontSize:13,color:"#555",marginBottom:12,fontWeight:600}}>Pasul 2: Subiect și durată</div>
              <div className="fg">
                <label>Subiect</label>
                <select className="inp" value={examId} onChange={e => setExamId(e.target.value)}>
                  <option value="">— Selectează subiectul —</option>
                  {exams.filter(e => e.variants?.length).map(e => (
                    <option key={e.id} value={e.id}>{e.title || e.id} ({e.variants.length} var.)</option>
                  ))}
                </select>
              </div>
              <div className="fg">
                <label>Durată (minute){fixedDur ? " — fixă" : ""}</label>
                <input className="inp" type="number" min="1" max="300"
                  value={fixedDur ? String(fixedDur) : duration}
                  disabled={!!fixedDur}
                  onChange={e => setDuration(e.target.value)}
                  placeholder="ex: 60"/>
                {fixedDur && <div className="fhint">Durata pentru {typeSel} este fixată la {fixedDur} minute.</div>}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setErr("");setStep(1);}}>← Înapoi</button>
                <button className="btn btn-primary btn-sm"
                  disabled={!examId || (!fixedDur && !duration)}
                  onClick={()=>{setErr("");setStep(3);}}>
                  Continuă →
                </button>
              </div>
            </>
          )}

          {/* Step 3 — participants */}
          {step === 3 && (
            <>
              <div style={{fontSize:13,color:"#555",marginBottom:10,fontWeight:600}}>
                Pasul 3: Participanți — {selected.size} selectați
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                {LEVELS.map(lvl => {
                  const count = participants.filter(p => p.level === lvl).length;
                  if (!count) return null;
                  return (
                    <button key={lvl} className={`btn btn-sm btn-outline b-${lvl}`}
                      style={{fontSize:11}}
                      onClick={() => toggleAll(lvl)}>
                      {lvl} ({count})
                    </button>
                  );
                })}
                <button className="btn btn-sm btn-ghost" onClick={() => setSelected(new Set())}>Niciunul</button>
              </div>
              <div className="checklist" style={{marginBottom:14}}>
                {participants.length === 0
                  ? <div style={{padding:16,color:"#aaa",textAlign:"center",fontSize:13}}>Niciun participant înregistrat.</div>
                  : participants.map(p => (
                    <label key={p.id} className={`checklist-row${selected.has(p.id)?" selected":""}`}
                      onClick={() => toggleOne(p.id)}>
                      <input type="checkbox" checked={selected.has(p.id)} readOnly/>
                      <span className={`badge b-${p.level}`} style={{fontSize:10}}>{p.level}</span>
                      <div>
                        <div style={{fontWeight:700,color:"#0f172a",fontSize:13}}>{p.name}</div>
                        <div style={{fontSize:11,color:"#888"}}>{p.school} · {p.county}</div>
                      </div>
                    </label>
                  ))
                }
              </div>
              <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setErr("");setStep(2);}}>← Înapoi</button>
                <button className="btn btn-primary btn-sm" onClick={create}>
                  Creează sesiunea ✓
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── EditModal ─────────────────────────────────────────────────────────────────
function EditModal({ group, exams, participants, onClose, onSaved }) {
  const [duration, setDuration]  = useState(String(group.duration));
  const [selected, setSelected]  = useState(new Set(group.participantIds || []));
  const [err,      setErr]        = useState("");

  const fixedDur = FIXED_DUR[group.sessionType] || null;
  const selExam  = exams.find(e => e.id === group.examId) || null;

  const toggleOne = (id) => {
    setSelected(prev => {
      const s = new Set(prev); s.has(id) ? s.delete(id) : s.add(id); return s;
    });
  };

  const save = () => {
    setErr("");
    const dur = fixedDur || parseInt(duration);
    if (!dur || dur < 1) { setErr("Durată invalidă."); return; }

    const prevIds = group.participantIds || [];
    const nextIds = [...selected];
    const toAdd   = nextIds.filter(id => !prevIds.includes(id));
    const toRemove = prevIds.filter(id => !nextIds.includes(id));

    CPEEN.updateGroupSession(group.id, { duration: dur });
    if (selExam && toAdd.length)    CPEEN.addParticipantsToGroup(group.id, toAdd, selExam);
    toRemove.forEach(id => CPEEN.removeParticipantFromGroup(group.id, id));
    onSaved();
    onClose();
  };

  return (
    <div className="modal-overlay">
      <div className="modal-box modal-box-sm">
        <div className="modal-head modal-head-dark">
          <div>
            <h3>Editează sesiunea</h3>
            <p>{group.sessionType} · {selExam?.title || group.examId}</p>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {err && <div className="alert alert-err" style={{marginBottom:12}}>{err}</div>}
          <div className="fg">
            <label>Durată (minute){fixedDur ? " — fixă" : ""}</label>
            <input className="inp" type="number" min="1" max="300"
              value={fixedDur ? String(fixedDur) : duration}
              disabled={!!fixedDur}
              onChange={e => setDuration(e.target.value)}/>
          </div>
          <div style={{fontSize:13,fontWeight:600,color:"#555",marginBottom:8}}>
            Participanți — {selected.size} selectați
          </div>
          <div className="checklist" style={{marginBottom:16}}>
            {participants.map(p => (
              <label key={p.id} className={`checklist-row${selected.has(p.id)?" selected":""}`}
                onClick={() => toggleOne(p.id)}>
                <input type="checkbox" checked={selected.has(p.id)} readOnly/>
                <span className={`badge b-${p.level}`} style={{fontSize:10}}>{p.level}</span>
                <div>
                  <div style={{fontWeight:700,color:"#0f172a",fontSize:13}}>{p.name}</div>
                  <div style={{fontSize:11,color:"#888"}}>{p.school}</div>
                </div>
              </label>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
            <button className="btn btn-ghost btn-sm" onClick={onClose}>Anulează</button>
            <button className="btn btn-primary btn-sm" onClick={save}>Salvează ✓</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ResultsModal ──────────────────────────────────────────────────────────────
function ResultsModal({ group, exams, participants, sessions, onClose }) {
  const exam = exams.find(e => e.id === group.examId);
  const expired = group.finishedAt && (Date.now() - group.finishedAt) > 24*60*60*1000;

  const rows = useMemo(() => {
    return (group.participantIds || []).map(pid => {
      const p = participants.find(x => x.id === pid) || {};
      const s = sessions.find(x => x.participantId === pid && x.groupId === group.id) || null;
      return { p, s };
    });
  }, [group, participants, sessions]);

  const exportCSV = () => {
    const BOM = "﻿";
    const header = "Participant,Scoala,Judet,Nivel,Status,Scor,Nota";
    const lines = rows.map(({p,s}) => {
      const score = s?.result?.total ?? "";
      const grade = score !== "" ? (score/10).toFixed(2) : "";
      const status = !s ? "Nealocat" : s.status === "submitted" ? "Trimis" : s.status === "in_progress" ? "In desfasurare" : "Pending";
      return [p.name||"",p.school||"",p.county||"",p.level||"",status,score,grade]
        .map(v => `"${String(v).replace(/"/g,'""')}"`)
        .join(",");
    });
    const csv = BOM + header + "\n" + lines.join("\n");
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = `echo_rezultate_${group.id}.csv`;
    a.click();
  };

  return (
    <div className="modal-overlay">
      <div className="modal-box">
        <div className="modal-head modal-head-dark">
          <div>
            <h3>Rezultate — {group.sessionType}</h3>
            <p>{exam?.title || group.examId} · {rows.length} participanți</p>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {expired
            ? <div className="alert alert-warn">Rezultatele au expirat (mai mult de 24h de la finalizare).</div>
            : (
              <>
                <div style={{overflowX:"auto",marginBottom:14}}>
                  <table className="tbl">
                    <thead>
                      <tr><th>Participant</th><th>Școală</th><th>Nivel</th><th>Status</th><th>Scor</th><th>Notă</th></tr>
                    </thead>
                    <tbody>
                      {rows.map(({p,s},i) => {
                        const score = s?.result?.total;
                        const submitted = s?.status === "submitted";
                        return (
                          <tr key={i}>
                            <td style={{fontWeight:700,fontSize:13}}>{p.name||"—"}</td>
                            <td style={{fontSize:12,color:"#666"}}>{p.school||"—"}</td>
                            <td><span className={`badge b-${p.level}`}>{p.level}</span></td>
                            <td>
                              {submitted
                                ? <span className="status-finished">Trimis</span>
                                : s?.status === "in_progress"
                                  ? <span className="status-active">Activ</span>
                                  : <span className="status-pending">{s ? "Pending" : "—"}</span>
                              }
                            </td>
                            <td style={{fontWeight:700,fontFamily:"monospace"}}>
                              {submitted && score !== undefined ? score : "—"}
                            </td>
                            <td style={{fontWeight:700,color:"#2563eb"}}>
                              {submitted && score !== undefined ? (score/10).toFixed(2) : "—"}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <button className="btn btn-success btn-sm" onClick={exportCSV}>⬇ Export CSV</button>
              </>
            )
          }
        </div>
      </div>
    </div>
  );
}

// ── SessionCard ───────────────────────────────────────────────────────────────
function SessionCard({ group, exams, participants, sessions, tick, onStart, onStop, onDelete, onEdit, onResults }) {
  const exam = exams.find(e => e.id === group.examId);
  const pCount = (group.participantIds || []).length;
  const typeInfo = SESSION_TYPES.find(t => t.v === group.sessionType) || {l:group.sessionType,cls:"b-gray"};

  const hasResults = sessions.some(s => s.groupId === group.id && s.status === "submitted");
  const resultsExpired = group.finishedAt && (Date.now() - group.finishedAt) > 24*60*60*1000;

  let countdownEl = null;
  if (group.status === "active" && group.endsAt) {
    const ms = group.endsAt - Date.now();
    const urgent = ms < 5 * 60 * 1000;
    countdownEl = <span className={`countdown${urgent?" urgent":""}`}>{fmtTime(ms)}</span>;
  }

  return (
    <div style={{background:"#fff",borderRadius:10,border:"1px solid #e2e8f0",marginBottom:12,padding:"14px 18px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
          <span className={`badge ${typeInfo.cls}`}>{typeInfo.l}</span>
          <div style={{minWidth:0}}>
            <div style={{fontWeight:700,color:"#0f172a",fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {exam?.title || group.examId || "—"}
            </div>
            <div style={{fontSize:11,color:"#888"}}>
              {pCount} participanți · {group.duration} min · creat {fmtHM(group.createdAt)}
            </div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {countdownEl}
          {group.status === "pending"   && <span className="status-pending">Programată</span>}
          {group.status === "active"    && <span className="status-active">● Activă</span>}
          {group.status === "finished"  && <span className="status-finished">Finalizată</span>}
          {group.status === "pending" && <>
            <button className="btn btn-success btn-sm" onClick={onStart}>▶ Start</button>
            <button className="btn btn-outline btn-sm" onClick={onEdit}>✏ Edit</button>
          </>}
          {group.status === "active" && <>
            <button className="btn btn-danger btn-sm" onClick={onStop}>■ Stop</button>
          </>}
          {(hasResults && !resultsExpired) && (
            <button className="btn btn-mid btn-sm" onClick={onResults}>📊 Rezultate</button>
          )}
          <button className="btn btn-danger btn-sm" onClick={onDelete}>✕</button>
        </div>
      </div>
    </div>
  );
}

// ── SessionsPage ──────────────────────────────────────────────────────────────
function SessionsPage() {
  if (!ADMIN.isAuthed()) { window.location.replace("index.html"); return null; }
  CPEEN.seedInitialData();

  const [groups,   setGroups]   = useState(() => CPEEN.getGroupSessions());
  const [tick,     setTick]     = useState(0);
  const [showWiz,  setShowWiz]  = useState(false);
  const [editGrp,  setEditGrp]  = useState(null);
  const [resGrp,   setResGrp]   = useState(null);
  const [toDelete, setToDelete] = useState(null);

  const exams        = CPEEN.getExams();
  const participants = CPEEN.getParticipants();
  const sessions     = CPEEN.getSessions();

  const reload = () => setGroups(CPEEN.getGroupSessions());

  // 1-second tick for countdowns + auto-finish
  useEffect(() => {
    const id = setInterval(() => {
      setTick(t => t + 1);
      // auto-finish expired active sessions
      const gs = CPEEN.getGroupSessions();
      gs.forEach(g => {
        if (g.status === "active" && g.endsAt && Date.now() > g.endsAt) {
          CPEEN.finishGroupSession(g.id);
        }
      });
      setGroups(CPEEN.getGroupSessions());
    }, 1000);
    return () => clearInterval(id);
  }, []);

  const doDelete = (id) => {
    CPEEN.deleteGroupSession(id);
    setToDelete(null);
    reload();
  };

  const pending  = groups.filter(g => g.status === "pending");
  const active   = groups.filter(g => g.status === "active");
  const finished = groups.filter(g => g.status === "finished");

  const cardFor = (g) => (
    <SessionCard key={g.id} group={g} exams={exams} participants={participants}
      sessions={sessions} tick={tick}
      onStart={() => { CPEEN.startGroupSession(g.id); reload(); }}
      onStop={() => { CPEEN.finishGroupSession(g.id); reload(); }}
      onDelete={() => setToDelete(g.id)}
      onEdit={() => setEditGrp(g)}
      onResults={() => setResGrp(g)}
    />
  );

  return (
    <div style={{minHeight:"100vh",background:"#f8fafc"}}>
      <ADMIN.Nav active="sessions"/>
      <div className="page"><div className="container">

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
          <div>
            <h2 style={{color:"#0f172a",fontSize:18}}>Sesiuni de examen</h2>
            <div style={{fontSize:12,color:"#888"}}>{groups.length} sesiuni în total</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-mid btn-sm" onClick={reload}>↻ Actualizează</button>
            <button className="btn btn-primary btn-sm" onClick={() => setShowWiz(true)}>+ Sesiune nouă</button>
          </div>
        </div>

        {/* Confirm delete modal */}

        {/* Active sessions */}
        {active.length > 0 && (
          <div style={{marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:"#2563eb",marginBottom:8,letterSpacing:.5}}>● SESIUNI ACTIVE</div>
            {active.map(cardFor)}
          </div>
        )}

        {/* Pending sessions */}
        {pending.length > 0 && (
          <div style={{marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:8,letterSpacing:.5}}>PROGRAMATE</div>
            {pending.map(cardFor)}
          </div>
        )}

        {/* Finished sessions */}
        {finished.length > 0 && (
          <div style={{marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:"#27AE60",marginBottom:8,letterSpacing:.5}}>FINALIZATE</div>
            {finished.map(cardFor)}
          </div>
        )}

        {groups.length === 0 && (
          <div style={{background:"#fff",borderRadius:10,padding:48,textAlign:"center",color:"#aaa",border:"1px solid #e2e8f0"}}>
            <div style={{fontSize:32,marginBottom:10}}>📋</div>
            <div style={{marginBottom:16}}>Nicio sesiune creată.</div>
            <button className="btn btn-primary" onClick={() => setShowWiz(true)}>+ Creează prima sesiune</button>
          </div>
        )}

        <div style={{textAlign:"center",color:"#aaa",fontSize:11,paddingBottom:24,paddingTop:16}}>ECHO · englishgrammarchallenge.ro</div>
      </div></div>

      {toDelete && (()=>{
        const g = groups.find(x => x.id === toDelete);
        return (
          <div className="modal-overlay">
            <div className="modal-box modal-box-sm">
              <div className="modal-head modal-head-dark">
                <div>
                  <h3>Confirmare ștergere</h3>
                  <p>{g?.sessionType}</p>
                </div>
                <button className="modal-close" onClick={() => setToDelete(null)}>✕</button>
              </div>
              <div className="modal-body">
                <div className="alert alert-warn" style={{marginBottom:14}}>
                  Se vor șterge și sesiunile individuale ale participanților alocați.
                </div>
                <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
                  <button className="btn btn-ghost btn-sm" onClick={() => setToDelete(null)}>Anulează</button>
                  <button className="btn btn-danger btn-sm" onClick={() => doDelete(toDelete)}>✕ Șterge</button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {showWiz && (
        <Wizard exams={exams} participants={participants}
          onClose={() => setShowWiz(false)}
          onCreated={reload}/>
      )}

      {editGrp && (
        <EditModal group={editGrp} exams={exams} participants={participants}
          onClose={() => setEditGrp(null)}
          onSaved={() => { reload(); setEditGrp(null); }}/>
      )}

      {resGrp && (
        <ResultsModal group={resGrp} exams={exams} participants={participants}
          sessions={sessions}
          onClose={() => setResGrp(null)}/>
      )}
    </div>
  );
}

document.getElementById("root").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,system-ui,sans-serif;color:#2563eb;font-size:14px;">Se încarcă…</div>';
CPEEN.init().then(() => ReactDOM.createRoot(document.getElementById("root")).render(<SessionsPage/>));
</script>
</body>
</html>
